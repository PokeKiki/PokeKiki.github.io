<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Satellite Feed</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        #sat-image { border: 2px solid #333; margin-top: 20px; max-width: 90%; }
        .info { color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Daily Satellite Snapshot</h1>
    <p class="info">Fetching data from NASA GIBS (Global Imagery Browse Services)</p>
    
    <img id="sat-image" src="" alt="Satellite imagery loading...">

    <script>
        // Satellite data is usually processed with a 1-day delay for public APIs
        const date = new Date();
        date.setDate(date.getDate() - 1);
        const dateString = date.toISOString().split('T')[0];

        // NASA API URL for a specific 'tile' of the Earth
        // Parameters: Layer=MODIS_Terra_CorrectedReflectance_TrueColor, TileMatrixSet=WebMercatorQuad
        const nasaUrl = `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/${dateString}/GoogleMapsCompatible_Level9/0/0/0.jpg`;

        document.getElementById('sat-image').src = nasaUrl;
    </script>

</body>
</html>
