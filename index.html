<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <title>KYAN ULTRA PROXY v3</title>
    <style>
        :root { --red: #e50914; --teal: #00e5b0; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        #hud {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: #0a0a0a; display: flex; align-items: center;
            padding: 0 15px; gap: 15px; z-index: 1000; border-bottom: 2px solid var(--teal);
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 5px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        #p-btn { background: var(--teal); color: #000; }
        #reset-btn { background: #333; color: #fff; margin-left: auto; }
        
        #viewport-master { width: 100vw; height: calc(100vh - 60px); margin-top: 60px; position: relative; }
        
        /* The Secret Sauce: No more "about:blank" */
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; pointer-events: none;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #111;
            border-top: 5px solid var(--teal); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="hud">
    <button class="btn" id="p-btn" onclick="proxyLaunch('https://poxel.io')">Play Poxel.io</button>
    <button class="btn" id="reset-btn" onclick="location.reload()">Reset Engine</button>
</div>

<div id="viewport-master">
    <div id="loader"><div class="spinner"></div><p>Tunneling Encrypted Assets...</p></div>
    <iframe id="main-view" src="about:blank"></iframe>
</div>

<script>
    const view = document.getElementById('main-view');
    const loader = document.getElementById('loader');

    function proxyLaunch(target) {
        loader.style.display = 'block';
        
        /* Direct Fetching (your old method) is being blocked by Poxel's Firewall.
           We are switching to a "Web Proxy URL" format. 
           This uses a public Ultraviolet/Corrosion node to handle the 99% load.
        */
        const proxyNode = "https://p.weserv.nl/?url="; // Example of an image/asset proxy
        
        // FOR GAMES: Use a public Womginx or Ultraviolet instance 
        // Note: You can replace this URL with any active 'Unblocked' link you find
        const unblockedGateway = "https://api.codetabs.com/v1/proxy/?quest=";
        
        // This is the most reliable way to bypass without a custom server:
        // Direct Frame Redirection with a Base Rewrite
        view.src = unblockedGateway + encodeURIComponent(target);

        view.onload = () => {
            loader.style.display = 'none';
            // Trigger focus for keyboard controls
            view.focus();
        };
    }
</script>
</body>
</html>
