<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Moto Drift</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #joystick-zone {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 150px;
            height: 150px;
            z-index: 10;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MOTO 3D</h1>
        <p>Use the Joystick to Drive & Drift</p>
    </div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // --- THE TRACK (Circular with Walls) ---
        const trackGroup = new THREE.Group();
        const innerRadius = 40;
        const outerRadius = 60;
        
        // Road surface
        const trackGeo = new THREE.RingGeometry(innerRadius, outerRadius, 64);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = Math.PI / 2;
        trackGroup.add(track);

        // Walls (To keep you in)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xff4444, transparent: true, opacity: 0.3 });
        
        const innerWallGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, 2, 64, 1, true);
        const innerWall = new THREE.Mesh(innerWallGeo, wallMat);
        trackGroup.add(innerWall);

        const outerWallGeo = new THREE.CylinderGeometry(outerRadius, outerRadius, 2, 64, 1, true);
        const outerWall = new THREE.Mesh(outerWallGeo, wallMat);
        trackGroup.add(outerWall);

        scene.add(trackGroup);

        // --- THE MOTORCYCLE ---
        const bike = new THREE.Group();
        
        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 1.5), new THREE.MeshStandardMaterial({color: 0x0077ff}));
        body.position.y = 0.6;
        bike.add(body);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111});
        const frontWheel = new THREE.Mesh(wheelGeo, wheelMat);
        frontWheel.rotation.z = Math.PI / 2;
        frontWheel.position.set(0, 0.4, 0.7);
        bike.add(frontWheel);

        const backWheel = frontWheel.clone();
        backWheel.position.z = -0.7;
        bike.add(backWheel);

        bike.position.set(50, 0, 0); // Start on the track
        scene.add(bike);

        // --- CONTROLS STATE ---
        let input = { x: 0, y: 0 };
        let speed = 0;
        const maxSpeed = 0.5;
        const friction = 0.98;
        const turnSpeed = 0.04;

        // --- JOYSTICK INITIALIZATION ---
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '75px', bottom: '75px' },
            color: 'white'
        });

        manager.on('move', (evt, data) => {
            // Normalize joystick data
            const dist = data.distance / 75;
            const angle = data.angle.radians;
            input.x = Math.cos(angle) * dist;
            input.y = Math.sin(angle) * dist;
        });

        manager.on('end', () => {
            input.x = 0;
            input.y = 0;
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Movement Logic
            if (Math.abs(input.y) > 0.1) {
                speed += input.y * 0.02;
            }
            speed *= friction;
            speed = Math.max(Math.min(speed, maxSpeed), -maxSpeed);

            // 2. Steering & Drifting
            if (Math.abs(speed) > 0.01) {
                bike.rotation.y -= input.x * turnSpeed;
                
                // Visual Lean (Drift Effect)
                const targetLean = -input.x * 0.6;
                bike.rotation.z = THREE.MathUtils.lerp(bike.rotation.z, targetLean, 0.1);
            }

            bike.translateZ(speed);

            // 3. Boundary Constraint (Keep on track)
            const distFromCenter = Math.sqrt(bike.position.x**2 + bike.position.z**2);
            if (distFromCenter < innerRadius + 0.5) {
                const angle = Math.atan2(bike.position.z, bike.position.x);
                bike.position.x = Math.cos(angle) * (innerRadius + 0.5);
                bike.position.z = Math.sin(angle) * (innerRadius + 0.5);
            }
            if (distFromCenter > outerRadius - 0.5) {
                const angle = Math.atan2(bike.position.z, bike.position.x);
                bike.position.x = Math.cos(angle) * (outerRadius - 0.5);
                bike.position.z = Math.sin(angle) * (outerRadius - 0.5);
            }

            // 4. Camera Follow
            const relativeCameraOffset = new THREE.Vector3(0, 3, -7);
            const cameraOffset = relativeCameraOffset.applyMatrix4(bike.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(bike.position);

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
