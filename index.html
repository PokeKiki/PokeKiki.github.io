<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto GP: Real Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a2a1a; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        #menu-container { position: absolute; top: 20px; left: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn { padding: 12px 20px; font-size: 1rem; border-radius: 8px; border: 2px solid white; cursor: pointer; color: white; text-align: center; }
        #race-btn { background: #ff0000; font-size: 1.2rem; border: 3px solid white; }
        #create-btn { background: #0088ff; }
        #join-btn { background: #00aa44; }
        #room-tag { position: absolute; top: 20px; left: 240px; z-index: 300; font-size: 0.9rem; color: #00ffcc; background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; display: none; }
        #end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 400; }
        #hud { position: absolute; top: 180px; left: 20px; z-index: 10; visibility: hidden; }
        #rank-display { position: absolute; top: 20px; right: 20px; font-size: 3rem; color: #ff0000; font-style: italic; visibility: hidden; }
        #speedometer { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 90px; background: rgba(0,0,0,0.9); border: 4px solid #555; border-radius: 90px 90px 0 0; text-align: center; }
        #speed-text { font-size: 2.5rem; display: block; margin-top: 15px; color: #00ffcc; }
        #light-system { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); display: none; gap: 20px; z-index: 100; }
        .light { width: 60px; height: 60px; border-radius: 50%; background: #222; border: 4px solid #444; }
        .red { background: #ff0000; box-shadow: 0 0 30px #ff0000; }
        .yellow { background: #ffaa00; box-shadow: 0 0 30px #ffaa00; }
        .green { background: #00ff00; box-shadow: 0 0 30px #00ff00; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255, 255, 255, 0.1); border: 5px solid rgba(255, 255, 255, 0.3); border-radius: 50%; z-index: 100; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 70px; height: 70px; background: radial-gradient(circle, #fff, #888); border-radius: 50%; }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="race-btn" class="menu-btn" onclick="startRaceSequence()">PRESS TO START</div>
        <div id="create-btn" class="menu-btn" onclick="initMultiplayer('create')">CREATE A ROOM</div>
        <div id="join-btn" class="menu-btn" onclick="initMultiplayer('join')">JOIN A ROOM</div>
    </div>

    <div id="room-tag">ROOM ID: <span id="current-room">...</span></div>

    <div id="end-screen">
        <h1 style="font-size: 4rem;">FINISH!</h1>
        <h2 id="final-rank" style="color: yellow; font-size: 2.5rem;">RANK: 1st</h2>
        <button style="padding: 15px 30px; font-size: 1.5rem;" onclick="location.reload()">REPLAY</button>
    </div>

    <div id="light-system"><div id="l1" class="light"></div><div id="l2" class="light"></div><div id="l3" class="light"></div></div>
    <div id="hud"><div>LAP <span id="lap-display" style="color: yellow;">1/3</span></div><div id="timer">00:00:00</div></div>
    <div id="rank-display">1st</div>
    <div id="speedometer"><span id="speed-text">0</span><span style="font-size: 0.7rem; color: #888;">KM/H</span></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="container"></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- MULTIPLAYER P2P ENGINE ---
        let peer, conn;
        const remotePlayers = {};

        window.initMultiplayer = (mode) => {
            peer = new Peer();
            peer.on('open', (id) => {
                if(mode === 'create') {
                    prompt("Your Room ID (Give this to friend):", id);
                    document.getElementById('current-room').innerText = id;
                    document.getElementById('room-tag').style.display = 'block';
                } else {
                    const friendID = prompt("Enter Friend's Room ID:");
                    conn = peer.connect(friendID);
                    setupConn(conn);
                }
            });
            peer.on('connection', (c) => { 
                conn = c; 
                setupConn(c);
                document.getElementById('room-tag').style.display = 'block';
                document.getElementById('current-room').innerText = "CONNECTED";
            });
            document.getElementById('create-btn').style.display = 'none';
            document.getElementById('join-btn').style.display = 'none';
        };

        function setupConn(c) {
            c.on('data', (data) => {
                if(!remotePlayers["friend"]) {
                    remotePlayers["friend"] = createMoto(0x00ffff);
                    scene.add(remotePlayers["friend"]);
                }
                remotePlayers["friend"].position.set(data.x, data.y, data.z);
                remotePlayers["friend"].rotation.set(data.rx, data.ry, data.rz);
            });
        }

        // --- 1. ENGINE & TRACK ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(150, 200, 100);
        scene.add(sun);

        const innerR = 130, outerR = 190, centerR = 160;
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshStandardMaterial({color: 0x2d4d2d}));
        grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1;
        scene.add(grass);

        const road = new THREE.Mesh(new THREE.RingGeometry(innerR, outerR, 128), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        road.rotation.x = -Math.PI / 2; road.position.y = 0.02;
        scene.add(road);

        // Curbs
        for(let i=0; i<180; i++) {
            const angle = (i/180) * Math.PI * 2;
            const mat = new THREE.MeshStandardMaterial({ color: i%2===0 ? 0xdd0000 : 0xffffff });
            const cIn = new THREE.Mesh(new THREE.BoxGeometry(8, 0.6, 2.5), mat); 
            cIn.position.set(Math.cos(angle)*innerR, 0.1, Math.sin(angle)*innerR); cIn.rotation.y = -angle; scene.add(cIn);
            const cOut = cIn.clone(); cOut.position.set(Math.cos(angle)*outerR, 0.1, Math.sin(angle)*outerR); scene.add(cOut);
        }

        // --- 2. BIKES & SMOKE ---
        function createMoto(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 1.8), new THREE.MeshStandardMaterial({color}));
            body.position.y = 0.8; g.add(body);
            const wGeo = new THREE.TorusGeometry(0.4, 0.15, 12, 24);
            const wMat = new THREE.MeshStandardMaterial({color: 0x000});
            const fw = new THREE.Mesh(wGeo, wMat); fw.position.set(0, 0.4, 0.8); g.add(fw);
            const bw = fw.clone(); bw.position.z = -0.8; g.add(bw);
            return g;
        }

        const player = createMoto(0xff0000);
        player.position.set(centerR, 0, -15);
        scene.add(player);

        // SMOKE POOL (RESTORED)
        const smokePool = [];
        for(let i=0; i<40; i++) {
            const s = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5}));
            s.visible = false; scene.add(s); smokePool.push(s);
        }
        let smokeIdx = 0;

        // --- 3. CONTROLS ---
        const base = document.getElementById('joy-base'), stick = document.getElementById('joy-stick');
        let inX = 0, inY = 0, touching = false;
        base.addEventListener('touchstart', (e) => { touching = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => {
            if(!touching) return;
            const t = e.touches[0], r = base.getBoundingClientRect();
            let dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const dist = Math.sqrt(dx*dx+dy*dy);
            if(dist > 55) { dx *= 55/dist; dy *= 55/dist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inX = dx/55; inY = -dy/55;
        }, {passive: false});
        window.addEventListener('touchend', () => { touching = false; stick.style.transform = 'translate(0,0)'; inX = 0; inY = 0; });

        // --- 4. ENGINE ---
        let velocity = 0, raceActive = false, lap = 1, checkpoint = false;

        window.startRaceSequence = () => {
            document.getElementById('race-btn').style.display = 'none';
            document.getElementById('light-system').style.display = 'flex';
            setTimeout(() => document.getElementById('l1').className = 'light red', 800);
            setTimeout(() => document.getElementById('l2').className = 'light yellow', 1600);
            setTimeout(() => {
                document.getElementById('l3').className = 'light green';
                raceActive = true;
                document.getElementById('hud').style.visibility = 'visible';
                setTimeout(() => document.getElementById('light-system').style.display = 'none', 1000);
            }, 2400);
        };

        function animate() {
            requestAnimationFrame(animate);

            // Physics
            if (Math.abs(inY) > 0.1) velocity += inY * 0.025;
            velocity *= 0.98;

            player.rotation.y -= inX * 0.06 * (Math.abs(velocity)/1.5);
            player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -inX * 0.8, 0.1);
            player.translateZ(velocity);

            // DRIFT SMOKE LOGIC
            if(Math.abs(inX) > 0.6 && Math.abs(velocity) > 0.5) {
                const s = smokePool[smokeIdx];
                s.visible = true; s.scale.setScalar(1);
                s.position.set(player.position.x + (Math.random()-0.5), 0.2, player.position.z + (Math.random()-0.5));
                smokeIdx = (smokeIdx + 1) % smokePool.length;
            }
            smokePool.forEach(s => { if(s.visible) { s.scale.multiplyScalar(0.92); if(s.scale.x < 0.1) s.visible = false; } });

            // Multiplayer Sync
            if(conn && conn.open) {
                conn.send({
                    x: player.position.x, y: player.position.y, z: player.position.z,
                    rx: player.rotation.x, ry: player.rotation.y, rz: player.rotation.z
                });
            }

            document.getElementById('speed-text').innerText = Math.round(Math.abs(velocity)*200);
            camera.position.lerp(new THREE.Vector3(0, 6, -12).applyMatrix4(player.matrixWorld), 0.1);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
