<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Moto Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a24; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* Speedometer UI */
        #ui-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 140px;
            height: 140px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            border: 4px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #speed-num { font-size: 2rem; font-weight: bold; color: #fff; margin: 0; }
        #speed-unit { font-size: 0.7rem; color: #ff0000; letter-spacing: 1px; }

        /* Joystick UI */
        #joy-base { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 130px; height: 130px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; 
            z-index: 100;
        }
        #joy-stick { 
            position: absolute; top: 35px; left: 35px; 
            width: 60px; height: 60px; 
            background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="speed-num">0</div>
        <div id="speed-unit">KM/H</div>
    </div>
    
    <div id="joy-base">
        <div id="joy-stick"></div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222233);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- 2. TRACK & SIDES ---
        const innerR = 45;
        const outerR = 75;

        // Dark Asphalt
        const roadGeo = new THREE.RingGeometry(innerR, outerR, 128);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Red & White Curbing (The sides)
        const curbCount = 100;
        for(let i=0; i < curbCount; i++) {
            const angle = (i / curbCount) * Math.PI * 2;
            const isRed = i % 2 === 0;
            const mat = new THREE.MeshStandardMaterial({ color: isRed ? 0xcc0000 : 0xffffff });
            
            // Outer Curb
            const curbOut = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 2), mat);
            curbOut.position.set(Math.cos(angle) * (outerR + 0.5), 0.15, Math.sin(angle) * (outerR + 0.5));
            curbOut.rotation.y = -angle;
            scene.add(curbOut);

            // Inner Curb
            const curbIn = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 1.5), mat);
            curbIn.position.set(Math.cos(angle) * (innerR - 0.5), 0.15, Math.sin(angle) * (innerR - 0.5));
            curbIn.rotation.y = -angle;
            scene.add(curbIn);
        }

        // Grass Background
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x1a2e1a}));
        grass.rotation.x = -Math.PI / 2;
        grass.position.y = -0.1;
        scene.add(grass);

        // --- 3. THE MOTORCYCLE ---
        const moto = new THREE.Group();
        
        // Main Body (Frame)
        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 1.4), new THREE.MeshStandardMaterial({color: 0x111111}));
        frame.position.y = 0.6;
        moto.add(frame);

        // Fairing (The colorful part)
        const fairing = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.8), new THREE.MeshStandardMaterial({color: 0xff0000}));
        fairing.position.set(0, 0.8, 0.2);
        moto.add(fairing);

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(0.35, 0.12, 12, 24);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x050505});
        const frontW = new THREE.Mesh(wheelGeo, wheelMat);
        frontW.position.set(0, 0.35, 0.7);
        moto.add(frontW);
        const backW = frontW.clone();
        backW.position.z = -0.7;
        moto.add(backW);

        // Handlebars
        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshStandardMaterial({color: 0x333333}));
        bar.rotation.z = Math.PI / 2;
        bar.position.set(0, 0.9, 0.5);
        moto.add(bar);

        moto.position.set(60, 0, 0);
        scene.add(moto);

        // --- 4. JOYSTICK LOGIC ---
        const base = document.getElementById('joy-base');
        const stick = document.getElementById('joy-stick');
        let inputX = 0, inputY = 0, isTouching = false;

        const handleInput = (e) => {
            if(!isTouching) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = base.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const limit = 50;
            if(dist > limit) { dx *= limit/dist; dy *= limit/dist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inputX = dx / limit;
            inputY = -dy / limit; 
        };

        base.addEventListener('touchstart', (e) => { isTouching = true; handleInput(e); });
        window.addEventListener('touchmove', handleInput, { passive: false });
        window.addEventListener('touchend', () => {
            isTouching = false;
            stick.style.transform = `translate(0px, 0px)`;
            inputX = 0; inputY = 0;
        });

        // --- 5. GAME LOOP ---
        let velocity = 0;
        const maxV = 1.3;

        function animate() {
            requestAnimationFrame(animate);

            // Speed Logic
            if (Math.abs(inputY) > 0.1) velocity += inputY * 0.025;
            velocity *= 0.96; // Friction
            velocity = Math.max(Math.min(velocity, maxV), -maxV/2);

            // Steering & Lean Logic
            if (Math.abs(velocity) > 0.05) {
                moto.rotation.y -= inputX * 0.045;
                // Lean is based on steering speed and intensity
                const targetLean = -inputX * 0.8 * (Math.abs(velocity)/maxV);
                moto.rotation.z = THREE.MathUtils.lerp(moto.rotation.z, targetLean, 0.1);
            } else {
                moto.rotation.z = THREE.MathUtils.lerp(moto.rotation.z, 0, 0.1);
            }

            moto.translateZ(velocity);

            // Keep in Track Bounds
            const d = Math.sqrt(moto.position.x**2 + moto.position.z**2);
            if (d < innerR + 1 || d > outerR - 1) {
                velocity *= 0.7; // Wall friction
                const angle = Math.atan2(moto.position.z, moto.position.x);
                const clamp = Math.max(innerR + 1, Math.min(d, outerR - 1));
                moto.position.x = Math.cos(angle) * clamp;
                moto.position.z = Math.sin(angle) * clamp;
            }

            // UI Speed Update
            document.getElementById('speed-num').innerText = Math.round(Math.abs(velocity) * 210);

            // Camera Chase
            const camOffset = new THREE.Vector3(0, 3.5, -8).applyMatrix4(moto.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(moto.position.x, moto.position.y + 1, moto.position.z);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
