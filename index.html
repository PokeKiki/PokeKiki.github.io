<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Poxel.io</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif}
body{display:flex;flex-direction:column}

#bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;height:46px;flex-shrink:0;
  background:#0a0a0e;border-bottom:1px solid #1e1e28;
}
#bar-title{
  font-size:17px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(90deg,#00e5b0,#6ee7ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#bar-right{display:flex;align-items:center;gap:8px}
#fullscreen-btn{
  background:#1a1a24;border:1px solid #25252f;color:#aaa;
  padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
}
#fullscreen-btn:active{background:#25252f}
#status{font-size:11px;color:#4a4a62}

#frame-wrap{flex:1;position:relative}
#game-frame{
  position:absolute;inset:0;width:100%;height:100%;border:none;
}
#loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:#0e0e12;z-index:10;
}
#loading.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid #1e1e28;border-top-color:#00e5b0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-text{font-size:14px;color:#4a4a62}
#load-sub{font-size:11px;color:#2a2a3a;text-align:center;max-width:260px;line-height:1.6}
</style>
</head>
<body>

<div id="bar">
  <div id="bar-title">&#127918; Poxel.io</div>
  <div id="bar-right">
    <span id="status">Loading...</span>
    <button id="fullscreen-btn" onclick="goFullscreen()">&#x26F6; Fullscreen</button>
  </div>
</div>

<div id="frame-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-text">Loading Poxel.io...</div>
    <div id="load-sub">This may take a few seconds on first load</div>
  </div>
  <iframe
    id="game-frame"
    src="https://www.miniplay.com/embed/poxel-io"
    allow="fullscreen *; autoplay *; gamepad *; accelerometer *; gyroscope *; clipboard-write *; pointer-lock *"
    allowfullscreen
    scrolling="no">
  </iframe>
</div>

<script>
var fr = document.getElementById('game-frame');
var loading = document.getElementById('loading');
var status = document.getElementById('status');

fr.addEventListener('load', function() {
  loading.classList.add('hidden');
  status.textContent = 'Ready';
  status.style.color = '#00e5b0';
});

// Fallback — hide spinner after 12s regardless
setTimeout(function() {
  loading.classList.add('hidden');
  status.textContent = 'Ready';
  status.style.color = '#00e5b0';
}, 12000);

function goFullscreen() {
  var el = document.getElementById('frame-wrap');
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}
</script>
</body>
</html>
