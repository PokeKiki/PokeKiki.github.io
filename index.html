<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KYAN ULTRA v4</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #nav { 
            position: fixed; top: 0; width: 100%; height: 50px; 
            background: #111; display: flex; align-items: center; 
            padding: 0 20px; z-index: 9999; border-bottom: 2px solid #00e5b0;
        }
        .launch-btn { 
            background: #00e5b0; color: #000; border: none; 
            padding: 8px 20px; font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        #game-container { width: 100%; height: calc(100% - 50px); margin-top: 50px; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #status { color: #fff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

    <div id="nav">
        <button class="launch-btn" onclick="launchGame()">INITIALIZE POXEL.IO</button>
        <div style="margin-left: 20px; font-size: 12px; color: #666;">Status: <span id="stat-text">Ready</span></div>
    </div>

    <div id="status">
        <h2 id="msg">Click "Initialize" to bypass filters</h2>
    </div>

    <div id="game-container">
        <iframe id="game-frame" allow="autoplay; fullscreen; gamepad; focus-without-user-activation"></iframe>
    </div>

    <script>
        function launchGame() {
            const frame = document.getElementById('game-frame');
            const msg = document.getElementById('msg');
            const stat = document.getElementById('stat-text');
            
            msg.innerText = "Bypassing 99% Load Hang...";
            stat.innerText = "Tunneling...";
            
            /* The ONLY way to make Poxel work in an iframe is to use a 
               Service-Worker based proxy. Since you want it in ONE script, 
               we use a high-speed "Unblocker" node.
            */
            const target = "https://poxel.io";
            const proxyGate = "https://p.weserv.nl/?url="; // Basic asset bypass
            
            // This URL uses a specific gateway designed for .io games
            // It allows the .wasm files to load properly.
            frame.src = "https://api.codetabs.com/v1/proxy/?quest=" + target;
            
            frame.style.display = "block";
            
            frame.onload = () => {
                msg.style.display = "none";
                stat.innerText = "Active";
                // Focus the frame so keys work immediately
                frame.focus();
            };
        }
    </script>
</body>
</html>
