<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScreenCast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0b0b10;--s:#14141c;--b:#1f1f2e;--a:#00e5ff;--r:#ff6060;--t:#e8e8f0;--m:#55557a;--g:#00ffa3}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'DM Mono',monospace;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:28px 14px}
header{text-align:center;margin-bottom:26px}
.logo{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,36px);font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:4px}
.li{width:30px;height:30px;background:var(--a);border-radius:7px;display:flex;
  align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 18px #00e5ff44}
.logo em{color:var(--a);font-style:normal}
.sub{color:var(--m);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.tabs{display:flex;background:var(--s);border:1px solid var(--b);border-radius:11px;
  padding:3px;gap:3px;margin-bottom:22px}
.tab{padding:9px 24px;border-radius:9px;border:none;background:transparent;
  color:var(--m);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;transition:.2s all}
.tab.on{background:var(--a);color:#000;font-weight:500;box-shadow:0 0 14px #00e5ff33}
.panel{display:none;width:100%;max-width:500px;flex-direction:column;gap:11px}
.panel.on{display:flex}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:17px}
.ct{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:11px}
.code-box{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border:1px solid #00e5ff33;border-radius:9px;padding:11px 15px}
.cv{font-size:26px;letter-spacing:8px;color:var(--a);font-weight:500}
.btn{padding:9px 16px;border-radius:9px;border:none;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
  transition:.2s all;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--a);color:#000;box-shadow:0 0 12px #00e5ff22}
.bp:hover:not(:disabled){background:#2cf}
.bg{background:var(--b);color:var(--t)}
.br{background:#ff606015;color:var(--r);border:1px solid #ff606030}
.btn:disabled{opacity:.4;cursor:not-allowed}
.row{display:flex;gap:7px;flex-wrap:wrap}
.sb{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:9px;
  background:var(--bg);border:1px solid var(--b);font-size:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--m);flex-shrink:0;transition:.3s}
.dot.on{background:var(--g);box-shadow:0 0 7px #00ffa355}
.dot.sp{background:var(--a);animation:pu 1s infinite}
.dot.er{background:var(--r)}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
video{width:100%;border-radius:9px;background:#000;border:1px solid var(--b);
  max-height:280px;object-fit:contain;display:block}
.vw{position:relative;min-height:70px}
.vo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;color:var(--m);font-size:11px;background:#000;
  border-radius:9px;pointer-events:none}
.vo .ic{font-size:28px;opacity:.3}
.log{background:var(--bg);border:1px solid var(--b);border-radius:9px;
  padding:8px 11px;font-size:10.5px;max-height:85px;overflow-y:auto;line-height:2;margin-top:9px}
.l{color:var(--m)}.l.i{color:var(--a)}.l.ok{color:var(--g)}.l.e{color:var(--r)}
.hint{font-size:11px;color:var(--m);line-height:1.7;margin-top:7px}
input{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:9px;
  padding:10px 13px;color:var(--t);font-family:'DM Mono',monospace;font-size:15px;
  outline:none;letter-spacing:4px;text-transform:uppercase;transition:.2s border-color}
input:focus{border-color:var(--a)}
input::placeholder{letter-spacing:0;font-size:12px;color:var(--m)}
.ir{display:flex;gap:7px}
hr{border:none;border-top:1px solid var(--b);margin:9px 0}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="li">⬡</div>Screen<em>Cast</em></div>
  <div class="sub">WebRTC · Peer to peer</div>
</header>
<div class="tabs">
  <button class="tab on" id="ts" onclick="sw('s')">📱 Share</button>
  <button class="tab" id="tv" onclick="sw('v')">🖥 View</button>
</div>

<!-- SHARE PANEL -->
<div class="panel on" id="ps">
  <div class="card">
    <div class="ct">Room Code</div>
    <div class="code-box">
      <div class="cv" id="scode">——</div>
      <button class="btn bg" onclick="cp()">📋 Copy</button>
    </div>
    <div class="hint">Share this code with the viewer, then tap <b>Start Sharing</b>.</div>
  </div>
  <div class="card">
    <div class="sb"><div class="dot" id="sd"></div><span id="ss">Ready</span></div>
  </div>
  <div class="card">
    <div class="ct">Preview</div>
    <div class="vw">
      <video id="sv" autoplay muted playsinline></video>
      <div class="vo" id="svo"><div class="ic">📱</div><span>Preview appears here</span></div>
    </div>
  </div>
  <div class="card">
    <div class="row">
      <button class="btn bp" id="bstart" onclick="startShare()">▶ Start Sharing</button>
      <button class="btn br" id="bstop" onclick="stopShare()" disabled>■ Stop</button>
    </div>
    <div class="log" id="sl"></div>
  </div>
</div>

<!-- VIEW PANEL -->
<div class="panel" id="pv">
  <div class="card">
    <div class="ct">Enter Room Code</div>
    <div class="ir">
      <input id="vc" placeholder="6-char code" maxlength="6"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinRoom()" />
      <button class="btn bp" onclick="joinRoom()">Connect</button>
    </div>
  </div>
  <div class="card">
    <div class="sb"><div class="dot" id="vd"></div><span id="vs">Enter a code above</span></div>
  </div>
  <div class="card">
    <div class="ct">Incoming Screen</div>
    <div class="vw">
      <video id="vv" autoplay playsinline></video>
      <div class="vo" id="vvo"><div class="ic">🖥</div><span>Waiting for stream…</span></div>
    </div>
  </div>
  <div class="card">
    <div class="row">
      <button class="btn br" id="bdisc" onclick="viewDisc()" disabled>■ Disconnect</button>
      <button class="btn bg" onclick="fscr()">⛶ Fullscreen</button>
    </div>
    <div class="log" id="vl"></div>
  </div>
</div>

<script>
// =============================================================
// Signaling via ntfy.sh (free, no account, public pub/sub)
// ICE: Google STUN + metered.ca free TURN (cross-NAT support)
// =============================================================
const NTFY = 'https://ntfy.sh';
const ICE  = { iceServers: [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun.cloudflare.com:3478'},
  {urls:'turn:a.relay.metered.ca:80',    username:'83e14e09a3d6f1c68af5',credential:'O+MjMBhF+1+QHbH4'},
  {urls:'turn:a.relay.metered.ca:443',   username:'83e14e09a3d6f1c68af5',credential:'O+MjMBhF+1+QHbH4'},
  {urls:'turn:a.relay.metered.ca:443?transport=tcp',username:'83e14e09a3d6f1c68af5',credential:'O+MjMBhF+1+QHbH4'},
]};

let myCode='', pc=null, localStream=null, pollTimer=null;

function gc(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function lg(id,m,c=''){const e=document.getElementById(id+'l'),d=document.createElement('div');d.className='l '+c;d.textContent='['+new Date().toLocaleTimeString('en',{hour12:false})+'] '+m;e.appendChild(d);e.scrollTop=e.scrollHeight;}
function st(id,c,t){document.getElementById(id+'d').className='dot '+c;document.getElementById(id+'s').textContent=t;}
function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))));}
function dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))));}

// ---- SHARER ----
async function startShare(){
  const btn=document.getElementById('bstart');
  btn.disabled=true;btn.textContent='⏳ Requesting…';
  try{
    localStream = navigator.mediaDevices.getDisplayMedia
      ? await navigator.mediaDevices.getDisplayMedia({video:{cursor:'always',frameRate:30},audio:false})
      : await navigator.mediaDevices.getUserMedia({video:true,audio:false});
  }catch(e){
    lg('s','Capture failed: '+e.message,'e');st('s','er','Permission denied');
    btn.disabled=false;btn.textContent='▶ Start Sharing';return;
  }
  myCode=gc();
  document.getElementById('scode').textContent=myCode;
  const vid=document.getElementById('sv');
  vid.srcObject=localStream;
  document.getElementById('svo').style.display='none';
  lg('s','Screen captured ✓','ok');
  localStream.getVideoTracks()[0].addEventListener('ended',stopShare);

  pc=new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  let iceBuf=[];
  pc.onicecandidate=({candidate})=>{if(candidate)iceBuf.push(candidate.toJSON());};
  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    lg('s','ICE: '+s,s==='connected'||s==='completed'?'ok':s==='failed'?'e':'i');
    if(s==='connected'||s==='completed'){st('s','on','Streaming ✓');clearInterval(pollTimer);}
    if(s==='failed'||s==='disconnected')st('s','er','Viewer disconnected');
  };

  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  st('s','sp','Gathering ICE…');lg('s','Gathering connection info (up to 4s)…','i');
  await new Promise(r=>{
    if(pc.iceGatheringState==='complete'){r();return;}
    pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete')r();};
    setTimeout(r,4000);
  });

  const payload=enc({offer:{sdp:pc.localDescription.sdp,type:pc.localDescription.type},ice:iceBuf});
  lg('s','Publishing room '+myCode+'…','i');st('s','sp','Publishing…');

  try{
    const r=await fetch(`${NTFY}/screenshare-offer-${myCode}`,{method:'POST',body:payload,headers:{'Content-Type':'text/plain','Title':'offer'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    lg('s','Room live! Code: '+myCode,'ok');
    st('s','sp','Waiting for viewer…');
    document.getElementById('bstop').disabled=false;
    btn.textContent='🔴 Live';
  }catch(e){
    lg('s','Publish failed: '+e.message+'. ntfy.sh may be blocked on your network.','e');
    st('s','er','Signaling failed');btn.disabled=false;btn.textContent='▶ Start Sharing';return;
  }

  // Poll for viewer answer
  let lastId='';
  pollTimer=setInterval(async()=>{
    if(!pc)return;
    try{
      const r=await fetch(`${NTFY}/screenshare-answer-${myCode}/json?poll=1&since=10m`,{headers:{Accept:'application/json'}});
      const text=await r.text();
      const lines=text.trim().split('\n').filter(Boolean);
      if(!lines.length)return;
      const last=JSON.parse(lines[lines.length-1]);
      if(last.id===lastId)return;
      lastId=last.id;
      const data=dec(last.message);
      if(!data?.answer)return;
      clearInterval(pollTimer);
      if(pc.signalingState!=='have-local-offer')return;
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      lg('s','Viewer answered! Connecting…','ok');
      for(const c of(data.ice||[])){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}
    }catch(e){}
  },2500);
}

async function stopShare(){
  clearInterval(pollTimer);
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(pc){pc.close();pc=null;}
  document.getElementById('sv').srcObject=null;
  document.getElementById('svo').style.display='flex';
  st('s','','Stopped');lg('s','Stopped.','e');
  const btn=document.getElementById('bstart');btn.disabled=false;btn.textContent='▶ Start Sharing';
  document.getElementById('bstop').disabled=true;
}

// ---- VIEWER ----
async function joinRoom(){
  const code=document.getElementById('vc').value.trim().toUpperCase();
  if(code.length<4){alert('Enter the room code from the sharing device.');return;}
  viewDisc();
  st('v','sp','Fetching offer for '+code+'…');lg('v','Connecting to room: '+code,'i');

  let offerData;
  try{
    const r=await fetch(`${NTFY}/screenshare-offer-${code}/json?poll=1&since=15m`,{headers:{Accept:'application/json'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const text=await r.text();
    const lines=text.trim().split('\n').filter(Boolean);
    if(!lines.length)throw new Error('Room not found. Is the sharer live?');
    const last=JSON.parse(lines[lines.length-1]);
    offerData=dec(last.message);
  }catch(e){
    lg('v','Error: '+e.message,'e');st('v','er','Room not found — check the code');return;
  }

  if(!offerData?.offer){lg('v','Invalid offer data','e');return;}
  lg('v','Offer received ✓','ok');

  pc=new RTCPeerConnection(ICE);
  let iceBuf=[];
  pc.onicecandidate=({candidate})=>{if(candidate)iceBuf.push(candidate.toJSON());};
  pc.ontrack=({streams})=>{
    const v=document.getElementById('vv');v.srcObject=streams[0];
    document.getElementById('vvo').style.display='none';
    st('v','on','Connected ✓');lg('v','Receiving stream! ✓','ok');
    document.getElementById('bdisc').disabled=false;
  };
  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    lg('v','ICE: '+s,s==='connected'||s==='completed'?'ok':s==='failed'?'e':'i');
    if(s==='failed')st('v','er','Connection failed — retry');
    if(s==='disconnected')st('v','er','Stream ended');
  };

  await pc.setRemoteDescription(new RTCSessionDescription(offerData.offer));
  for(const c of(offerData.ice||[])){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(e){}}

  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);

  st('v','sp','Gathering ICE…');
  await new Promise(r=>{
    if(pc.iceGatheringState==='complete'){r();return;}
    pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete')r();};
    setTimeout(r,4000);
  });

  const payload=enc({answer:{sdp:pc.localDescription.sdp,type:pc.localDescription.type},ice:iceBuf});
  try{
    const r=await fetch(`${NTFY}/screenshare-answer-${code}`,{method:'POST',body:payload,headers:{'Content-Type':'text/plain'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    lg('v','Answer sent. Handshaking…','i');st('v','sp','Connecting…');
  }catch(e){
    lg('v','Failed to send answer: '+e.message,'e');st('v','er','Signaling failed');
  }
}

function viewDisc(){
  if(pc){pc.close();pc=null;}
  document.getElementById('vv').srcObject=null;
  document.getElementById('vvo').style.display='flex';
  document.getElementById('bdisc').disabled=true;
  st('v','','Disconnected');
}

// ---- Util ----
function cp(){
  const code=document.getElementById('scode').textContent;
  navigator.clipboard?.writeText(code)
    .then(()=>{const b=document.querySelector('#ps .bg');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='📋 Copy',2000);})
    .catch(()=>prompt('Your room code:',code));
}
function sw(t){
  ['s','v'].forEach(x=>{
    document.getElementById('t'+x).classList.toggle('on',x===t);
    document.getElementById('p'+x).classList.toggle('on',x===t);
  });
}
function fscr(){
  const v=document.getElementById('vv');
  (v.requestFullscreen||v.webkitRequestFullscreen||v.mozRequestFullScreen)?.call(v);
}

lg('s','Ready. Tap Start Sharing once the viewer has this page open.','i');
lg('v','Ready. Enter the room code shown on the sharing device.','i');
</script>
</body>
</html>
