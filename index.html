<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Neon Moto Pro</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Courier New', Courier, monospace;
            /* Critical: Prevents the screen from acting weird when you touch the joystick */
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #joystick-zone {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 200px;
            height: 200px;
            z-index: 100;
            background: rgba(0, 242, 255, 0.1); /* Visible light blue area */
            border: 3px solid #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 20px #00f2ff;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #00f2ff;
            pointer-events: none;
            z-index: 10;
        }
        .speed-box {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="speed-box" id="speed-display">0 KM/H</div>
        <p>DRAG WITHIN THE CIRCLE TO MOVE</p>
    </div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 100);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const hemi = new THREE.HemisphereLight(0xffffff, 0x000000, 1);
        scene.add(hemi);
        const bikeLight = new THREE.PointLight(0x00f2ff, 10, 20);
        scene.add(bikeLight);

        // --- NEON TRACK ---
        const innerRadius = 50;
        const outerRadius = 80;

        const trackGeo = new THREE.RingGeometry(innerRadius, outerRadius, 64);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = Math.PI / 2;
        scene.add(track);

        // Floor Grid for speed sensation
        const grid = new THREE.GridHelper(500, 100, 0x00f2ff, 0x222222);
        grid.position.y = -0.1;
        scene.add(grid);

        // --- BIKE MODEL ---
        const bike = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 1.8), new THREE.MeshStandardMaterial({color: 0x00f2ff}));
        body.position.y = 0.5;
        bike.add(body);
        
        const wheelGeo = new THREE.TorusGeometry(0.4, 0.1, 16, 32);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0xffffff});
        const w1 = new THREE.Mesh(wheelGeo, wheelMat);
        w1.position.set(0, 0.4, 0.8);
        bike.add(w1);
        const w2 = w1.clone();
        w2.position.z = -0.8;
        bike.add(w2);

        bike.position.set(65, 0, 0);
        scene.add(bike);

        // --- CONTROLS ---
        let inputX = 0, inputY = 0, velocity = 0;
        const friction = 0.96;
        const maxSpeed = 1.5;

        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '100px', bottom: '100px' },
            color: '#00f2ff',
            size: 150
        });

        manager.on('move', (evt, data) => {
            const dist = data.distance / 75; 
            inputX = Math.cos(data.angle.radians) * dist;
            inputY = Math.sin(data.angle.radians) * dist;
        });

        manager.on('end', () => { inputX = 0; inputY = 0; });

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);

            // Forward/Back Power
            if (Math.abs(inputY) > 0.1) {
                velocity += inputY * 0.03;
            }
            velocity *= friction;
            velocity = Math.max(Math.min(velocity, maxSpeed), -maxSpeed);

            // Turn & Lean
            if (Math.abs(velocity) > 0.1) {
                bike.rotation.y -= inputX * 0.05;
                bike.rotation.z = THREE.MathUtils.lerp(bike.rotation.z, -inputX * 0.8, 0.1);
            }

            bike.translateZ(velocity);

            // Boundary Logic
            const dist = Math.sqrt(bike.position.x**2 + bike.position.z**2);
            if (dist < innerRadius + 1 || dist > outerRadius - 1) {
                velocity *= 0.8; // Slow down on wall hit
                const angle = Math.atan2(bike.position.z, bike.position.x);
                const clamp = Math.max(innerRadius + 1, Math.min(dist, outerRadius - 1));
                bike.position.x = Math.cos(angle) * clamp;
                bike.position.z = Math.sin(angle) * clamp;
            }

            // UI & Camera
            document.getElementById('speed-display').innerText = Math.round(Math.abs(velocity) * 150) + " KM/H";
            bikeLight.position.copy(bike.position);
            
            const camPos = new THREE.Vector3(0, 5, -10).applyMatrix4(bike.matrixWorld);
            camera.position.lerp(camPos, 0.1);
            camera.lookAt(bike.position);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
