<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyan AI | Interactive Voice Assistant</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #app-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        
        .settings {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        select, input, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        input {
            width: 70%;
            background: #334155;
            color: white;
        }

        button {
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #chat-log {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding: 10px;
            background: #0f172a;
            border-radius: 10px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .user { background: var(--primary); align-self: flex-end; }
        .ai { background: #475569; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="app-container">
        <h1>Kyan AI</h1>
        <p>Voice-enabled Intelligence</p>

        <div class="settings">
            <select id="lang-select">
                <option value="en-US">English</option>
                <option value="fr-FR">Français</option>
            </select>
        </div>

        <div id="chat-log">
            <div class="msg ai">Hello! I am Kyan AI. How can I help you today?</div>
        </div>

        <div style="display: flex; gap: 5px;">
            <input type="text" id="user-input" placeholder="Type your question...">
            <button onclick="askKyan()">Ask</button>
        </div>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const userInput = document.getElementById('user-input');
        const langSelect = document.getElementById('lang-select');
        const synth = window.speechSynthesis;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = langSelect.value;
            // Find a voice that matches the language
            const voices = synth.getVoices();
            utterance.voice = voices.find(v => v.lang.includes(langSelect.value)) || voices[0];
            synth.speak(utterance);
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'ai'}`;
            div.textContent = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function askKyan() {
            const query = userInput.value.trim();
            if (!query) return;

            addMessage(query, true);
            userInput.value = '';

            // SIMULATED AI RESPONSE 
            // In a real app, you would fetch() from an API like Gemini or OpenAI here.
            let response = "";
            if (langSelect.value === "fr-FR") {
                response = "C'est une excellente question ! En tant que Kyan AI, je suis là pour vous aider.";
            } else {
                response = "That is a great question! As Kyan AI, I am here to help you.";
            }

            setTimeout(() => {
                addMessage(response, false);
                speak(response);
            }, 600);
        }

        // Allow 'Enter' key to send
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") askKyan();
        });
    </script>
</body>
</html>
