<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto GP: Pro Championship</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a2a1a; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        #menu-container { position: absolute; top: 20px; left: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn { padding: 12px 20px; font-size: 1rem; border-radius: 8px; border: 2px solid white; cursor: pointer; color: white; text-align: center; font-weight: bold; }
        #race-btn { background: #ff0000; font-size: 1.2rem; border: 3px solid white; display: none; }
        #create-btn { background: #0088ff; }
        #join-btn { background: #00aa44; }
        #ready-ui { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; z-index: 300; min-width: 170px; border: 2px solid #444; display: none; }
        .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin-right: 8px; }
        .is-ready { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        #ready-toggle-btn { background: #ffaa00; margin-top: 10px; width: 100%; border: 1px solid white; }
        #hud { position: absolute; top: 180px; left: 20px; z-index: 10; visibility: hidden; }
        #rank-display { position: absolute; top: 20px; right: 210px; font-size: 3.5rem; color: #ffcc00; font-style: italic; visibility: hidden; text-shadow: 2px 2px 5px #000; }
        #speedometer { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 90px; background: rgba(0,0,0,0.9); border: 4px solid #555; border-radius: 90px 90px 0 0; text-align: center; }
        #speed-text { font-size: 2.5rem; display: block; margin-top: 15px; color: #00ffcc; }
        #crash-alert { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; color: #ff0000; display: none; z-index: 150; font-weight: 900; text-shadow: 0 0 20px #000; pointer-events: none; }
        #finish-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 5px solid yellow; border-radius: 20px; text-align: center; display: none; z-index: 1000; min-width: 300px; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border: 5px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 100; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 70px; height: 70px; background: radial-gradient(circle, #fff, #888); border-radius: 50%; }
        #light-system { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); display: none; gap: 20px; z-index: 100; }
        .light { width: 55px; height: 55px; border-radius: 50%; background: #222; border: 4px solid #444; }
        .red { background: #ff0000; box-shadow: 0 0 25px #ff0000; }
        .yellow { background: #ffaa00; box-shadow: 0 0 25px #ffaa00; }
        .green { background: #00ff00; box-shadow: 0 0 25px #00ff00; }
    </style>
</head>
<body>
    <div id="menu-container">
        <div id="create-btn" class="menu-btn" onclick="initMultiplayer('create')">CREATE ROOM</div>
        <div id="join-btn" class="menu-btn" onclick="initMultiplayer('join')">JOIN ROOM</div>
        <div id="race-btn" class="menu-btn" onclick="startRaceSequence()">START RACE</div>
    </div>
    <div id="ready-ui">
        <div><span class="status-dot" id="my-dot"></span> You: <span id="my-ready-text">WAITING</span></div>
        <div id="remote-status" style="margin-top:8px; display:none;"><span class="status-dot" id="friend-dot"></span> Friend: <span id="friend-ready-text">WAITING</span></div>
        <button id="ready-toggle-btn" class="menu-btn" onclick="toggleReady()">READY UP</button>
    </div>
    <div id="finish-screen">
        <h1 style="color: yellow; font-size: 3rem; margin: 0;">RACE FINISHED!</h1>
        <p id="final-rank" style="font-size: 4rem; margin: 10px 0;">1st</p>
        <p id="final-time" style="font-size: 1.5rem; color: #00ffcc;">TIME: 00:00:00</p>
        <div class="menu-btn" style="background: white; color: black;" onclick="location.reload()">PLAY AGAIN</div>
    </div>
    <div id="crash-alert">CRASHED!</div>
    <div id="light-system"><div id="l1" class="light"></div><div id="l2" class="light"></div><div id="l3" class="light"></div></div>
    <div id="hud">
        <div style="font-size: 1.5rem;">LAP <span id="lap-display" style="color: yellow;">0/3</span></div>
        <div id="timer" style="font-family: monospace;">0.00S</div>
    </div>
    <div id="rank-display">1st</div>
    <div id="speedometer"><span id="speed-text">0</span><span style="font-size: 0.7rem; color: #888;">KM/H</span></div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="container"></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        let peer, conn, myName = "Player", iAmReady = false, friendIsReady = false;
        let raceStarted = false, raceFinished = false, raceInProgress = false, time = 0, lap = 0, checkpointPassed = false;
        const remotePlayers = {};

        window.initMultiplayer = (mode) => {
            myName = prompt("Enter your name:") || "Racer";
            if (mode === 'create') {
                const code = String(Math.floor(1000 + Math.random() * 9000));
                peer = new Peer('motogp-' + code);
                peer.on('open', () => {
                    alert("Share this code with your friend: " + code);
                    document.getElementById('ready-ui').style.display = 'block';
                });
                peer.on('connection', (c) => { conn = c; setupConnection(c); });
            } else {
                const code = prompt("Enter 4-digit room code:");
                if (!code) return;
                peer = new Peer();
                peer.on('open', () => {
                    conn = peer.connect('motogp-' + code);
                    setupConnection(conn);
                    document.getElementById('ready-ui').style.display = 'block';
                });
            }
            document.getElementById('create-btn').style.display = 'none';
            document.getElementById('join-btn').style.display = 'none';
        };

        function setupConnection(c) {
            c.on('open', () => {
                document.getElementById('remote-status').style.display = 'block';
                c.on('data', (d) => {
                    if (d.type === 'ready') { friendIsReady = d.ready; updateUI(); }
                    else if (d.type === 'start') executeRaceStart();
                    else if (d.type === 'move') {
                        if (!remotePlayers["friend"]) { remotePlayers["friend"] = createMoto(0x00ffff, d.name); scene.add(remotePlayers["friend"]); }
                        remotePlayers["friend"].position.set(d.x, d.y, d.z);
                        remotePlayers["friend"].rotation.set(d.rx, d.ry, d.rz);
                        remotePlayers["friend"].progress = d.progress;
                    }
                });
            });
        }

        window.toggleReady = () => {
            iAmReady = !iAmReady;
            if(conn) conn.send({ type: 'ready', ready: iAmReady });
            updateUI();
        };

        function updateUI() {
            document.getElementById('my-dot').className = iAmReady ? "status-dot is-ready" : "status-dot";
            document.getElementById('friend-dot').className = friendIsReady ? "status-dot is-ready" : "status-dot";
            document.getElementById('race-btn').style.display = (iAmReady && friendIsReady) ? "block" : "none";
        }

        // SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 400, 900);
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        // LIGHTING
        const sun = new THREE.DirectionalLight(0xffffff, 1.4);
        sun.position.set(200, 300, 100);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.HemisphereLight(0xadd8e6, 0x444422, 0.8));

        const innerR = 130, outerR = 190, centerR = 160;

        // GRASS - green with slight texture feel
        const grass = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000),
            new THREE.MeshStandardMaterial({ color: 0x3a7d3a })
        );
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // TRACK - dark asphalt
        const road = new THREE.Mesh(
            new THREE.RingGeometry(innerR, outerR, 128),
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
        );
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.02;
        scene.add(road);

        // TRACK CENTER (inner grass)
        const innerGrass = new THREE.Mesh(
            new THREE.CircleGeometry(innerR - 1, 128),
            new THREE.MeshStandardMaterial({ color: 0x2d6e2d })
        );
        innerGrass.rotation.x = -Math.PI / 2;
        innerGrass.position.y = 0.01;
        scene.add(innerGrass);

        // KERBS - red/white alternating around inner and outer
        for (let i = 0; i < 180; i++) {
            const a = (i / 180) * Math.PI * 2;
            const mat = new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0xdd0000 : 0xffffff });
            const cI = new THREE.Mesh(new THREE.BoxGeometry(8, 1.0, 3), mat);
            cI.position.set(Math.cos(a) * innerR, 0.5, Math.sin(a) * innerR);
            cI.rotation.y = -a;
            scene.add(cI);
            const cO = new THREE.Mesh(new THREE.BoxGeometry(8, 1.0, 3), mat);
            cO.position.set(Math.cos(a) * outerR, 0.5, Math.sin(a) * outerR);
            cO.rotation.y = -a;
            scene.add(cO);
        }

        // TRACK DASHED CENTER LINE
        for (let i = 0; i < 60; i++) {
            const a = (i / 60) * Math.PI * 2;
            if (i % 2 === 0) {
                const dash = new THREE.Mesh(
                    new THREE.PlaneGeometry(3, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(Math.cos(a) * centerR, 0.03, Math.sin(a) * centerR);
                dash.rotation.z = -a;
                scene.add(dash);
            }
        }

        // START/FINISH LINE (white wide stripe - this is the lap trigger line)
        const finishLine = new THREE.Mesh(
            new THREE.BoxGeometry(outerR - innerR, 0.15, 6),
            new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        finishLine.position.set(centerR, 0.07, 0);
        scene.add(finishLine);

        // Checkered pattern on finish line
        for (let i = 0; i < 8; i++) {
            const checker = new THREE.Mesh(
                new THREE.BoxGeometry(7, 0.16, 3),
                new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x000000 : 0xffffff })
            );
            checker.position.set(innerR + 4 + i * 7.5, 0.08, 0);
            scene.add(checker);
        }

        // ARMCO BARRIERS (metal guard rails around outer edge)
        for (let i = 0; i < 90; i++) {
            const a = (i / 90) * Math.PI * 2;
            const barrier = new THREE.Mesh(
                new THREE.BoxGeometry(14, 1.2, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.8, roughness: 0.3 })
            );
            barrier.position.set(Math.cos(a) * (outerR + 10), 0.6, Math.sin(a) * (outerR + 10));
            barrier.rotation.y = -a;
            scene.add(barrier);
        }

        // TIRE BARRIERS (inner wall)
        for (let i = 0; i < 60; i++) {
            const a = (i / 60) * Math.PI * 2;
            const tire = new THREE.Mesh(
                new THREE.TorusGeometry(1.2, 0.6, 8, 12),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            tire.position.set(Math.cos(a) * (innerR - 8), 0.6, Math.sin(a) * (innerR - 8));
            tire.rotation.x = Math.PI / 2;
            scene.add(tire);
        }

        // GRANDSTANDS — all around the track, facing inward
        const standColors = [0x2255aa, 0xaa2222, 0x2255aa, 0xaa2222, 0x2255aa, 0xaa2222, 0x2255aa, 0xaa2222, 0x2255aa, 0xaa2222, 0x2255aa, 0xaa2222];
        for (let si = 0; si < 12; si++) {
            const angle = (si / 12) * Math.PI * 2;
            const g = new THREE.Group();
            for (let row = 0; row < 5; row++) {
                const seat = new THREE.Mesh(
                    new THREE.BoxGeometry(40, 2, 6),
                    new THREE.MeshStandardMaterial({ color: standColors[si] })
                );
                seat.position.set(0, 2 + row * 2.2, row * 6);
                g.add(seat);
                for (let s = 0; s < 10; s++) {
                    const spec = new THREE.Mesh(
                        new THREE.BoxGeometry(2, 2, 1),
                        new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0xff4400 : 0x0044ff })
                    );
                    spec.position.set(-18 + s * 4, 3.5 + row * 2.2, row * 6);
                    g.add(spec);
                }
            }
            // place outside the track
            g.position.set(Math.cos(angle) * (outerR + 15), 0, Math.sin(angle) * (outerR + 15));
            // front of group (+Z) must point toward origin (inward)
            // the group is at angle from origin, so rotate by angle + PI so +Z faces -angle direction = inward
            g.rotation.y = -(angle + Math.PI);
            scene.add(g);
        }

        // OBSTACLES - spread so they avoid the start line area (angle 0 = start)
        const obstacles = [];
        for (let i = 0; i < 30; i++) {
            const a = 0.4 + (i / 30) * (Math.PI * 2 - 0.8);
            const l = centerR + (Math.random() - 0.5) * 40;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(6, 5, 6),
                new THREE.MeshStandardMaterial({ color: 0xff1100 })
            );
            b.position.set(Math.cos(a) * l, 2.5, Math.sin(a) * l);
            scene.add(b);
            obstacles.push(b);
        }

        // DETAILED MOTORCYCLE builder
        function createMoto(color, label = "") {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.4 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.3 });
            const chromeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1.0, roughness: 0.1 });
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

            // MAIN FAIRING (body)
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.55, 1.9), mat);
            body.position.set(0, 0.95, 0);
            g.add(body);

            // NOSE FAIRING (front pointy bit)
            const noseFairing = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.32, 0.7, 8), mat);
            noseFairing.rotation.x = Math.PI / 2;
            noseFairing.position.set(0, 0.85, 1.2);
            g.add(noseFairing);

            // SEAT / TAIL
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.3, 0.9), mat);
            tail.position.set(0, 1.2, -0.8);
            g.add(tail);

            // FUEL TANK
            const tank = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.35, 0.7), mat);
            tank.position.set(0, 1.28, 0.2);
            g.add(tank);

            // WINDSCREEN
            const windscreen = new THREE.Mesh(
                new THREE.BoxGeometry(0.55, 0.35, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5 })
            );
            windscreen.position.set(0, 1.22, 1.0);
            windscreen.rotation.x = -0.3;
            g.add(windscreen);

            // FRAME / CHASSIS
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 1.4), darkMat);
            frame.position.set(0, 0.6, 0);
            g.add(frame);

            // ENGINE block
            const engine = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.38, 0.55), darkMat);
            engine.position.set(0, 0.52, 0.1);
            g.add(engine);

            // EXHAUST pipes
            const exMat = new THREE.MeshStandardMaterial({ color: 0xcc8800, metalness: 0.9, roughness: 0.2 });
            const ex1 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.1, 8), exMat);
            ex1.rotation.x = Math.PI / 2 + 0.15;
            ex1.position.set(0.28, 0.45, -0.35);
            g.add(ex1);
            const ex2 = ex1.clone();
            ex2.position.set(-0.28, 0.45, -0.35);
            g.add(ex2);

            // SWINGARM
            const swingarm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.8), darkMat);
            swingarm.position.set(0, 0.42, -0.7);
            g.add(swingarm);

            // FRONT FORKS
            const fork1 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.65, 8), chromeMat);
            fork1.position.set(0.14, 0.55, 0.85);
            g.add(fork1);
            const fork2 = fork1.clone();
            fork2.position.set(-0.14, 0.55, 0.85);
            g.add(fork2);

            // WHEELS (torus = tire + cylinder = rim)
            function makeWheel(posZ) {
                const wg = new THREE.Group();
                const tire = new THREE.Mesh(new THREE.TorusGeometry(0.42, 0.14, 16, 32), tireMat);
                wg.add(tire);
                const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.1, 12), chromeMat);
                rim.rotation.x = Math.PI / 2;
                wg.add(rim);
                // spokes
                for (let s = 0; s < 6; s++) {
                    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.56, 0.04), chromeMat);
                    spoke.rotation.z = (s / 6) * Math.PI;
                    wg.add(spoke);
                }
                wg.rotation.x = Math.PI / 2;
                wg.position.set(0, 0.42, posZ);
                return wg;
            }
            g.add(makeWheel(0.85));
            g.add(makeWheel(-0.85));

            // HANDLEBAR
            const bar = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.07, 0.07), chromeMat);
            bar.position.set(0, 1.18, 0.72);
            g.add(bar);

            // RIDER
            const riderMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const suitMat = new THREE.MeshStandardMaterial({ color });
            // torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.5, 0.55), suitMat);
            torso.position.set(0, 1.45, 0.05);
            torso.rotation.x = 0.55;
            g.add(torso);
            // helmet
            const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), new THREE.MeshStandardMaterial({ color: 0xff2200, metalness: 0.3 }));
            helmet.position.set(0, 1.82, 0.38);
            g.add(helmet);
            // visor
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.05), new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 }));
            visor.position.set(0, 1.82, 0.59);
            g.add(visor);
            // arms
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.38), suitMat);
            arm.position.set(0.25, 1.52, 0.5); arm.rotation.x = 0.5;
            g.add(arm);
            const arm2 = arm.clone(); arm2.position.set(-0.25, 1.52, 0.5);
            g.add(arm2);
            // legs
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.44, 0.16), suitMat);
            leg.position.set(0.2, 1.05, -0.22);
            g.add(leg);
            const leg2 = leg.clone(); leg2.position.set(-0.2, 1.05, -0.22);
            g.add(leg2);

            // NAME LABEL
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'bold 32px Arial'; ctx.textAlign = 'center';
            ctx.fillText(label, 128, 45);
            const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            s.position.y = 2.5; s.scale.set(3, 0.75, 1);
            g.add(s);

            g.collisionSphere = new THREE.Sphere(new THREE.Vector3(), 1.6);
            g.progress = 0;
            return g;
        }

        const player = createMoto(0xff0000, "YOU");
        player.position.set(centerR - 10, 0, 50);
        scene.add(player);

        // SMOKE POOL
        const smokePool = [];
        for (let i = 0; i < 30; i++) {
            const s = new THREE.Mesh(
                new THREE.SphereGeometry(0.4, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 })
            );
            s.visible = false; scene.add(s); smokePool.push(s);
        }
        let smokeIdx = 0;

        // JOYSTICK
        let velocity = 0, inX = 0, inY = 0;
        const stick = document.getElementById('joy-stick'), base = document.getElementById('joy-base');
        window.addEventListener('touchmove', (e) => {
            const t = e.touches[0], r = base.getBoundingClientRect();
            let dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 55) { dx *= 55 / d; dy *= 55 / d; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inX = dx / 55; inY = -dy / 55;
        });
        window.addEventListener('touchend', () => { stick.style.transform = 'translate(0,0)'; inX = 0; inY = 0; });

        window.startRaceSequence = () => {
            document.getElementById('race-btn').style.display = 'none';
            document.getElementById('ready-ui').style.display = 'none';
            if (conn) conn.send({ type: 'start' });
            executeRaceStart();
        };

        function executeRaceStart() {
            raceStarted = false; raceFinished = false; raceInProgress = true;
            lap = 0; time = 0; checkpointPassed = false;
            velocity = 0; inX = 0; inY = 0;
            document.getElementById('lap-display').innerText = '0/3';
            document.getElementById('race-btn').style.display = 'none';
            document.getElementById('ready-ui').style.display = 'none';
            player.position.set(centerR + 2, 0, -10);
            player.rotation.set(0, 0, 0);
            const ls = document.getElementById('light-system'); ls.style.display = 'flex';
            document.getElementById('l1').className = 'light';
            document.getElementById('l2').className = 'light';
            document.getElementById('l3').className = 'light';
            setTimeout(() => document.getElementById('l1').className = 'light red', 800);
            setTimeout(() => document.getElementById('l2').className = 'light yellow', 1600);
            setTimeout(() => {
                document.getElementById('l3').className = 'light green';
                raceStarted = true;
                document.getElementById('hud').style.visibility = 'visible';
                document.getElementById('rank-display').style.visibility = 'visible';
                setTimeout(() => ls.style.display = 'none', 1000);
            }, 2400);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dWorld = Math.sqrt(player.position.x ** 2 + player.position.z ** 2);
            if (dWorld < innerR + 1.5 || dWorld > outerR - 1.5) velocity *= 0.85;

            let crashed = false;
            player.collisionSphere.center.copy(player.position);
            obstacles.forEach(o => { if (new THREE.Box3().setFromObject(o).intersectsSphere(player.collisionSphere)) crashed = true; });

            if (crashed) { velocity = 0.05; document.getElementById('crash-alert').style.display = 'block'; }
            else if (raceInProgress && !raceStarted) {
                // START pressed but green light not yet — lock movement
                velocity = 0;
                document.getElementById('crash-alert').style.display = 'none';
            } else if (!raceFinished) {
                document.getElementById('crash-alert').style.display = 'none';
                if (Math.abs(inY) > 0.1) velocity += inY * 0.026;
                velocity *= 0.978;
            } else { velocity *= 0.95; }

            player.rotation.y -= inX * 0.06 * (Math.abs(velocity) / 1.5);
            player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -inX * 0.8, 0.1);
            player.translateZ(velocity);

            // LAP LOGIC — finish line is at z=0 on the POSITIVE X side (x > 0)
            // Player starts just behind it (z = -10, x = centerR)
            // They must go around (z becomes positive = half lap checkpoint done)
            // Then when they cross back to z < 0 AND they are on the positive X side = lap complete
            const onFinishSide = player.position.x > 0;
            if (player.position.z > 5 && !checkpointPassed) checkpointPassed = true;
            if (player.position.z < 0 && checkpointPassed && onFinishSide && raceStarted) {
                checkpointPassed = false;
                if (lap < 3) {
                    lap++;
                    document.getElementById('lap-display').innerText = lap + '/3';
                    if (lap === 3 && !raceFinished) {
                        raceFinished = true;
                        document.getElementById('finish-screen').style.display = 'block';
                        document.getElementById('final-rank').innerText = document.getElementById('rank-display').innerText;
                        document.getElementById('final-time').innerText = "TIME: " + time.toFixed(2) + "S";
                    }
                }
            }

            // RANKING
            let angle = Math.atan2(player.position.z, player.position.x);
            player.progress = lap * 10 + (angle < 0 ? angle + Math.PI * 2 : angle);
            if (remotePlayers["friend"]) {
                const rank = player.progress > remotePlayers["friend"].progress ? "1st" : "2nd";
                document.getElementById('rank-display').innerText = rank;
            }

            // SMOKE
            if (Math.abs(inX) > 0.7 && Math.abs(velocity) > 0.6) {
                const s = smokePool[smokeIdx]; s.visible = true; s.scale.setScalar(1);
                s.position.set(player.position.x, 0.2, player.position.z);
                smokeIdx = (smokeIdx + 1) % smokePool.length;
            }
            smokePool.forEach(s => { if (s.visible) { s.scale.multiplyScalar(0.92); if (s.scale.x < 0.1) s.visible = false; } });

            if (raceStarted && !raceFinished) { time += 1 / 60; document.getElementById('timer').innerText = time.toFixed(2) + "S"; }
            if (conn && conn.open) conn.send({ type: 'move', name: myName, x: player.position.x, y: player.position.y, z: player.position.z, rx: player.rotation.x, ry: player.rotation.y, rz: player.rotation.z, progress: player.progress });

            document.getElementById('speed-text').innerText = Math.round(Math.abs(velocity) * 210);
            camera.position.lerp(new THREE.Vector3(0, 6, -12).applyMatrix4(player.matrixWorld), 0.1);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
