<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maze Runner: Glade & The Maze</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none; /* Improves touch control on mobile */
        }
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        .status-bar {
            background: rgba(0,0,0,0.7);
            color: #ffd966;
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            pointer-events: auto;
        }
        .status-item {
            background: #2c2c2c;
            padding: 4px 12px;
            border-radius: 16px;
            color: #f5c542;
        }
        .camp-resources {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
        }
        #message-area {
            background: rgba(0,0,0,0.8);
            color: #ffaa44;
            padding: 8px;
            margin-top: 5px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            max-width: 90%;
        }
        .map-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            border-radius: 16px;
            padding: 12px;
            width: 140px;
            backdrop-filter: blur(8px);
            border: 1px solid #c9a03d;
            pointer-events: auto;
            font-size: 10px;
            color: #eee;
            text-align: center;
            z-index: 200;
        }
        .map-panel h4 {
            margin: 0 0 5px;
            font-size: 12px;
            color: #ffbb66;
        }
        .map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            background: #1e2a1a;
            padding: 6px;
            border-radius: 8px;
        }
        .map-cell {
            aspect-ratio: 1 / 1;
            background: #3a2a1a;
            border-radius: 2px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bda46b;
        }
        .map-cell.discovered {
            background: #5f7a3c;
            color: #ffeaac;
            box-shadow: 0 0 4px gold;
        }
        .map-cell.current {
            background: #e09d32;
            color: black;
            font-weight: bold;
        }
        .action-buttons {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
            z-index: 150;
        }
        .action-btn {
            background: #3a2a1f;
            border: none;
            color: #f7d44a;
            padding: 12px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 12px black;
            transition: 0.1s linear;
            cursor: pointer;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: scale(0.96);
            background: #1e3a1e;
        }
        #night-warning {
            background: #aa2e1e;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        @media (max-width: 700px) {
            .action-btn { padding: 8px 14px; font-size: 12px; }
            .map-panel { width: 110px; padding: 6px; }
            .status-bar { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="status-bar">
            <div>🌞 DAY/NIGHT: <span id="time-status">DAY</span> | ⏱️ <span id="timer">5:00</span></div>
            <div class="camp-resources">
                <span>🍎 Food: <span id="food-count">5</span></span>
                <span>💧 Water: <span id="water-count">3</span><span style="font-size:10px">/day</span></span>
            </div>
            <div>🚪 Maze Door: <span id="door-status">OPEN</span></div>
        </div>
        <div id="message-area">🌿 Welcome, Glader! Explore camp, grow food. Maze open in daytime. Night = monsters & maze changes!</div>
    </div>
    <div class="map-panel" id="mapPanel">
        <h4>🗺️ DISCOVERED MAZE</h4>
        <div class="map-grid" id="mapGrid"></div>
        <div style="font-size:8px; margin-top:4px;">⬆️ forward = reveal</div>
    </div>
    <div class="action-buttons">
        <button class="action-btn" id="harvestBtn">🌾 Harvest Plant</button>
        <button class="action-btn" id="waterBtn">💧 Get Water</button>
        <button class="action-btn" id="plantBtn">🌱 Plant Seeds</button>
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Game Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x071a3b); // night sky default
        scene.fog = new THREE.FogExp2(0x071a3b, 0.008);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 8, 20);
        camera.rotation.order = 'YXZ';
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // CSS2 for simple labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Controls with mobile touch support
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.maxPolarAngle = Math.PI / 2.4;
        controls.target.set(0, 2, 0);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffdd99, 1.2);
        sunLight.position.set(30, 25, 10);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        scene.add(sunLight);
        const fillLight = new THREE.PointLight(0x5577aa, 0.4);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // Ground plane (camp area)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7645, roughness: 0.8 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- CAMP WALLS (HUGE)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.4 });
        function addWall(x, z, rx, rz, w, h, d) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, h/2, z);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        }
        // Outer Camp Walls (square)
        const campSize = 24;
        const wallH = 6;
        addWall(0, -campSize/2, 0,0, campSize, wallH, 1.2);
        addWall(0, campSize/2, 0,0, campSize, wallH, 1.2);
        addWall(-campSize/2, 0, 0,0, 1.2, wallH, campSize);
        addWall(campSize/2, 0, 0,0, 1.2, wallH, campSize);
        
        // Maze Door (HUGE) at positive Z side
        const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(5, 8, 1.5), new THREE.MeshStandardMaterial({ color: 0xbd7a3a, metalness: 0.7 }));
        doorFrame.position.set(0, 4, campSize/2 - 0.8);
        scene.add(doorFrame);
        const doorPanel = new THREE.Mesh(new THREE.BoxGeometry(4.2, 6.8, 0.3), new THREE.MeshStandardMaterial({ color: 0xac8e5a, emissive: 0x221100 }));
        doorPanel.position.set(0, 3.4, campSize/2 - 0.2);
        scene.add(doorPanel);
        let doorOpen = true;
        const doorClosedPosZ = campSize/2 - 0.2;
        const doorOpenPosZ = campSize/2 + 1.5;
        doorPanel.position.z = doorOpenPosZ;
        
        // --- Maze Generation (procedural block maze that changes at midnight)
        const mazeSize = 45; // world extends from -25 to 25 approx
        const cellSize = 3.2;
        const mazeGridW = 15;
        const mazeGridH = 15;
        let mazeWalls = []; // store wall meshes
        let currentMazeLayout = []; // 2d boolean (true = wall)
        
        function generateMazeLayout(seedOffset = 0) {
            // simple randomized DFS-based maze with some variation each midnight
            const width = mazeGridW, height = mazeGridH;
            let grid = Array(height).fill().map(() => Array(width).fill(true));
            // make paths: carve
            const stack = [];
            const startX = 1, startY = 1;
            grid[startY][startX] = false;
            stack.push([startX, startY]);
            const dirs = [[0, -2],[2,0],[0,2],[-2,0]];
            while(stack.length) {
                const [cx, cy] = stack[stack.length-1];
                const neighbours = [];
                for(let [dx, dy] of dirs) {
                    const nx = cx+dx, ny = cy+dy;
                    if(nx>0 && nx<width-1 && ny>0 && ny<height-1 && grid[ny][nx] === true) neighbours.push([nx, ny, dx/2, dy/2]);
                }
                if(neighbours.length) {
                    const [nx, ny, wx, wy] = neighbours[Math.floor(Math.random() * neighbours.length)];
                    grid[ny][nx] = false;
                    grid[cy+wy][cx+wx] = false;
                    stack.push([nx, ny]);
                } else stack.pop();
            }
            // add extra random walls for variation based on seed (time)
            for(let i=0;i<40 + seedOffset % 70; i++) {
                const rx = Math.floor(Math.random() * width);
                const ry = Math.floor(Math.random() * height);
                if(!(rx===1 && ry===1) && !(rx===width-2 && ry===height-2) && Math.random()>0.4) grid[ry][rx] = true;
            }
            // ensure entrance from camp: portal at grid coords (0,7) -> actual world
            return grid;
        }
        
        function rebuildMaze(layout) {
            // remove old walls
            mazeWalls.forEach(w => scene.remove(w));
            mazeWalls = [];
            const wallMatMaze = new THREE.MeshStandardMaterial({ color: 0xa5845e, roughness: 0.3 });
            const startXOffset = - (mazeGridW * cellSize)/2 + cellSize/2;
            const startZOffset = campSize/2 + 3; // just beyond door
            for(let i=0; i<mazeGridH; i++) {
                for(let j=0; j<mazeGridW; j++) {
                    if(layout[i][j] === true) {
                        const w = cellSize;
                        const h = 4.5;
                        const d = cellSize;
                        const x = startXOffset + j * cellSize;
                        const z = startZOffset + i * cellSize;
                        const wallBlock = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMatMaze);
                        wallBlock.position.set(x, h/2, z);
                        wallBlock.castShadow = true;
                        wallBlock.receiveShadow = true;
                        scene.add(wallBlock);
                        mazeWalls.push(wallBlock);
                    }
                }
            }
        }
        
        // initial maze
        let currentLayout = generateMazeLayout(0);
        rebuildMaze(currentLayout);
        
        // --- Monsters (simple orb + pursuit)
        const monsters = [];
        function createMonster(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), new THREE.MeshStandardMaterial({ color: 0xaa3333, emissive: 0x441111 }));
            body.castShadow = true;
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
            eyeL.position.set(-0.3, 0.2, 0.7);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
            eyeR.position.set(0.3, 0.2, 0.7);
            group.add(body, eyeL, eyeR);
            group.position.set(x, 0.5, z);
            scene.add(group);
            return { mesh: group, speed: 1.8, active: false };
        }
        // spawn 4 monsters inside maze region
        const monsterList = [];
        for(let i=0;i<5;i++) {
            const x = (Math.random() - 0.5) * 40 + 10;
            const z = (Math.random() - 0.5) * 40 + 35;
            monsterList.push(createMonster(x, z));
        }
        
        // --- Camp resources
        let food = 5;
        let water = 3;
        let waterUsedToday = 0;
        let dayCounter = 0;
        let plantedCount = 0; // each plant gives 2-3 food after harvest
        
        // Simple plant indicators (CSS2D)
        const plantLabels = [];
        function updateResourceUI() {
            document.getElementById('food-count').innerText = food;
            document.getElementById('water-count').innerText = water;
        }
        
        // Garden patches
        const gardenPositions = [[-5, 0.1, -6], [5, 0.1, -5], [0, 0.1, -7], [-3,0.1,-3]];
        gardenPositions.forEach((pos) => {
            const patch = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.2, 8), new THREE.MeshStandardMaterial({ color: 0x6b4c3b }));
            patch.position.set(pos[0], pos[1], pos[2]);
            patch.receiveShadow = true;
            scene.add(patch);
            const div = document.createElement('div');
            div.textContent = '🌱 Empty';
            div.style.backgroundColor = 'rgba(0,0,0,0.6)';
            div.style.color = '#bada55';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '12px';
            div.style.fontSize = '10px';
            const label = new CSS2DObject(div);
            label.position.set(pos[0], pos[1]+0.5, pos[2]);
            scene.add(label);
            plantLabels.push({ label, pos, hasPlant: false, growTimer: null });
        });
        
        function harvestFromPatch(idx) {
            const p = plantLabels[idx];
            if(p.hasPlant) {
                const yieldAmt = Math.floor(Math.random() * 3) + 2;
                food += yieldAmt;
                updateResourceUI();
                p.hasPlant = false;
                p.label.element.textContent = '🌱 Empty';
                showMessage(`+${yieldAmt} food harvested!`);
                if(p.growTimer) clearTimeout(p.growTimer);
            } else { showMessage("Nothing to harvest, plant seeds first!"); }
        }
        
        function plantSeed(idx) {
            const p = plantLabels[idx];
            if(!p.hasPlant && food >= 2) {
                food -= 2;
                updateResourceUI();
                p.hasPlant = true;
                p.label.element.textContent = '🌿 Growing...';
                showMessage("Planted! It will grow in 30 sec.");
                p.growTimer = setTimeout(() => {
                    if(p.hasPlant) {
                        p.label.element.textContent = '🍎 Ready!';
                        showMessage("Your plant is ready to harvest!");
                    }
                }, 30000);
            } else if(food<2) showMessage("Need 2 food to plant seeds!");
            else showMessage("Already growing here!");
        }
        
        function getWater() {
            if(waterUsedToday < 3) {
                water += 1;
                waterUsedToday++;
                updateResourceUI();
                showMessage(`Watered! (${waterUsedToday}/3 per day)`);
            } else {
                showMessage("No more water today! Wait for next day.");
            }
        }
        
        function showMessage(msg) {
            const msgDiv = document.getElementById('message-area');
            msgDiv.innerText = msg;
            setTimeout(() => {
                if(document.getElementById('message-area').innerText === msg)
                    document.getElementById('message-area').innerText = "🌙 Day/Night cycle active.";
            }, 3000);
        }
        
        // --- Day/Night Cycle (5 min each)
        let timeRemaining = 300; // seconds (5min)
        let isDay = true;
        const timerEl = document.getElementById('timer');
        const timeStatusEl = document.getElementById('time-status');
        const doorStatusEl = document.getElementById('door-status');
        
        function updateDayNight() {
            if(isDay) {
                scene.background.setHex(0x87CEEB);
                sunLight.intensity = 1.1;
                ambientLight.intensity = 0.5;
                fillLight.intensity = 0.3;
                timeStatusEl.innerText = "🌞 DAY";
                doorStatusEl.innerText = "OPEN";
                // open door
                doorPanel.position.z = doorOpenPosZ;
                doorOpen = true;
                // disable monsters aggro
                monsterList.forEach(m => m.active = false);
                // show message
                if(timeRemaining <= 295) showMessage("Maze door open! Enter before night.");
            } else {
                scene.background.setHex(0x071a3b);
                sunLight.intensity = 0.05;
                ambientLight.intensity = 0.2;
                fillLight.intensity = 0.6;
                timeStatusEl.innerText = "🌙 NIGHT";
                doorStatusEl.innerText = "CLOSED";
                doorPanel.position.z = doorClosedPosZ;
                doorOpen = false;
                // monsters active if player inside maze (check)
                monsterList.forEach(m => m.active = true);
                showMessage("⚠️ Night has fallen! Maze door locked. Monsters hunt!");
            }
        }
        
        let gameClock = setInterval(() => {
            if(timeRemaining <= 0) {
                // switch day/night
                isDay = !isDay;
                if(isDay) {
                    timeRemaining = 300;
                    // reset water usage & maze changes at midnight also happens at start of day? requirement: maze changes at midnight
                    // Actually midnight = end of night / start of day, change maze layout and then revert next morning. Wait: "MAZE CHANGES AT MIDNIGHT AND THE NEXT MORNING IT GOES BACK"
                    // So at midnight (end of day? confusing). Let's implement: At the moment night becomes day (midnight) -> maze changes, and then when day ends it reverts? no: "changes at midnight and next morning it goes back"
                    // simpler: at each midnight (when night transitions to day) generate new maze, when day transitions to night revert to original? But movie-like: changes during night. But I'll do: every midnight (start of day) maze randomizes, then at start of night it reverts? that breaks consistency. 
                    // Better: At the moment night starts (sunset) maze changes to deadly version, then at dawn reverts. But spec: "maze changes at midnight and next morning it goes back". Since midnight is middle of night, but for gameplay: at start of night we change, at start of day revert.
                    // adjusting: at start of Night: change maze, at start of Day: revert to original base maze.
                    if(!isDay) { // entering night
                        const newLayout = generateMazeLayout(Math.floor(Date.now()/1000));
                        rebuildMaze(newLayout);
                        currentLayout = newLayout;
                    } else { // entering day
                        const originalLayout = generateMazeLayout(0); // default
                        rebuildMaze(originalLayout);
                        currentLayout = originalLayout;
                    }
                    waterUsedToday = 0;
                    updateResourceUI();
                    showMessage("Morning! Maze reset. Water refilled.");
                } else {
                    timeRemaining = 300;
                }
                updateDayNight();
            } else {
                timeRemaining--;
            }
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            timerEl.innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        }, 1000);
        
        updateDayNight();
        
        // --- MAP DISCOVERY SYSTEM (Checkpoint forward)
        const mapSize = 5; // 5x5 grid (represents zones)
        let discoveredMap = Array(mapSize).fill().map(() => Array(mapSize).fill(false));
        let playerMapX = 2, playerMapZ = 2; // center camp zone
        discoveredMap[2][2] = true;
        
        function updateMapUI() {
            const gridDiv = document.getElementById('mapGrid');
            gridDiv.innerHTML = '';
            for(let i=0;i<mapSize;i++) {
                for(let j=0;j<mapSize;j++) {
                    const cell = document.createElement('div');
                    cell.className = 'map-cell';
                    if(discoveredMap[i][j]) cell.classList.add('discovered');
                    if(playerMapX === j && playerMapZ === i) cell.classList.add('current');
                    cell.innerText = discoveredMap[i][j] ? '◉' : '?';
                    gridDiv.appendChild(cell);
                }
            }
        }
        
        // detect player position relative to maze/camp: We'll base on camera target or actual position?
        // simpler: use controls target or camera position to determine "forward progress" into maze
        let lastForwardZone = 0;
        function updateDiscoveryByPosition() {
            const camX = camera.position.x;
            const camZ = camera.position.z;
            // maze zone starts beyond door: z > 16
            let zoneX = 2, zoneZ = 2;
            if(camZ > 16) { // inside maze
                const mazeRelX = (camX + 20) / 10; // 0-4 range
                const mazeRelZ = (camZ - 16) / 10;
                zoneX = Math.min(4, Math.max(0, Math.floor(mazeRelX)));
                zoneZ = Math.min(4, Math.max(0, Math.floor(mazeRelZ)));
                // also if at camp still
            } else {
                zoneX = 2; zoneZ = 2;
            }
            if(!discoveredMap[zoneZ][zoneX]) {
                discoveredMap[zoneZ][zoneX] = true;
                showMessage(`🗺️ Discovered maze sector ${zoneX+1},${zoneZ+1}!`);
                updateMapUI();
            }
            playerMapX = zoneX;
            playerMapZ = zoneZ;
            updateMapUI();
        }
        
        // monster pursuit during night + if player inside maze
        function updateMonsters() {
            if(!isDay) {
                const isPlayerInMaze = camera.position.z > 16 && Math.abs(camera.position.x) < 32;
                monsterList.forEach(m => {
                    if(m.active && isPlayerInMaze) {
                        const dx = camera.position.x - m.mesh.position.x;
                        const dz = camera.position.z - m.mesh.position.z;
                        const dist = Math.hypot(dx, dz);
                        if(dist > 0.3) {
                            const move = m.speed * 0.016;
                            const dirX = dx / dist;
                            const dirZ = dz / dist;
                            m.mesh.position.x += dirX * move;
                            m.mesh.position.z += dirZ * move;
                        }
                        // collision damage / game over? simple warning
                        if(dist < 1.2) {
                            showMessage("💀 MONSTER caught you! You wake up at camp...");
                            camera.position.set(0, 2, 0);
                            controls.target.set(0,2,0);
                            camera.position.set(0, 5, 3);
                            // reset monsters
                            monsterList.forEach((m,idx) => {
                                m.mesh.position.set((Math.random() - 0.5) * 40 + 10, 0.5, (Math.random() - 0.5) * 40 + 35);
                            });
                        }
                    }
                });
            }
        }
        
        // Plants growth display update & also water/harvest buttons
        document.getElementById('harvestBtn').onclick = () => {
            // find nearest patch? for simplicity harvest first empty? but we use each patch individually? improv: auto harvest nearest
            const closest = plantLabels.reduce((prev, curr, idx) => {
                const dPrev = Math.hypot(camera.position.x - prev.pos[0], camera.position.z - prev.pos[2]);
                const dCurr = Math.hypot(camera.position.x - curr.pos[0], camera.position.z - curr.pos[2]);
                return dPrev < dCurr ? prev : curr;
            });
            const idx = plantLabels.findIndex(p => p === closest);
            if(idx>=0) harvestFromPatch(idx);
        };
        document.getElementById('waterBtn').onclick = getWater;
        document.getElementById('plantBtn').onclick = () => {
            const closest = plantLabels.reduce((prev, curr, idx) => {
                const dPrev = Math.hypot(camera.position.x - prev.pos[0], camera.position.z - prev.pos[2]);
                const dCurr = Math.hypot(camera.position.x - curr.pos[0], camera.position.z - curr.pos[2]);
                return dPrev < dCurr ? prev : curr;
            });
            const idx = plantLabels.findIndex(p => p === closest);
            if(idx>=0) plantSeed(idx);
        };
        
        // Add decorative campfire
        const fireLight = new THREE.PointLight(0xff6600, 0.8, 12);
        fireLight.position.set(0, 0.5, -3);
        scene.add(fireLight);
        
        // Apple trees simple
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x6b4c3b });
        for(let i=0;i<6;i++) {
            const treeTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.7,1.5), treeMat);
            treeTrunk.position.set(-12 + i*4, 0, -8);
            treeTrunk.castShadow = true;
            scene.add(treeTrunk);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // update camera and target
            updateDiscoveryByPosition();
            updateMonsters();
            // Day night glow for door/fire
            fireLight.intensity = isDay ? 0.3 : 0.9;
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // initial map display
        updateMapUI();
        showMessage("Use mouse/finger to look around. Enter maze in daytime!");
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
