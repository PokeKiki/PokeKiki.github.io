<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Navigateur</title>
<style>
  :root {
    --ink: #14110d;
    --paper: #f3ede1;
    --accent: #c0533a;
    --line: #d4c9b4;
    --muted: #7a6f5d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .brand {
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-right: 6px;
    white-space: nowrap;
  }
  .brand span { color: var(--accent); }
  input {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 15px;
    background: #fff;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  .frame-wrap { flex: 1; position: relative; }
  iframe { width: 100%; height: 100%; border: none; background: #fff; }
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }
  .placeholder b { color: var(--ink); font-size: 17px; }
  .note {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 18px;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>
  <header>
    <div class="brand">Mon<span>Navigateur</span></div>
    <input id="url" type="text" placeholder="Colle un lien ici (ex: https://exemple.com)" />
    <button onclick="ouvrir()">Ouvrir</button>
  </header>

  <div class="frame-wrap">
    <iframe id="frame"></iframe>
    <div class="placeholder" id="ph">
      <b>Aucune page chargée</b>
      <div>Colle une URL ci-dessus et clique sur « Ouvrir ».<br>La page s'affichera ici, sans quitter ton site.</div>
    </div>
  </div>

  <div class="note">Astuce : certains sites (YouTube, Google, Facebook…) refusent d'être affichés ici pour raisons de sécurité. La plupart des autres fonctionnent.</div>

<script>
  function ouvrir() {
    let url = document.getElementById('url').value.trim();
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    document.getElementById('ph').style.display = 'none';
    document.getElementById('frame').src = url;
  }
  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') ouvrir();
  });
</script>
</body>
</html>
