<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyan AI | Ultra-Realistic Voice</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 500px; background: var(--card); padding: 2rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); text-align: center; margin-top: 0; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #chat-log { height: 250px; overflow-y: auto; background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; }
        .msg { padding: 10px; border-radius: 10px; max-width: 85%; line-height: 1.4; }
        .user { background: var(--primary); align-self: flex-end; }
        .ai { background: #334155; align-self: flex-start; }
        .status { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <h1>Kyan AI</h1>
    
    <div class="input-group">
        <input type="password" id="gemini-key" placeholder="Gemini API Key">
        <input type="password" id="eleven-key" placeholder="ElevenLabs API Key">
        <select id="lang-select">
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <div id="chat-log">
        <div class="msg ai">Hello! I am Kyan AI, powered by ElevenLabs. Paste your keys above to start.</div>
    </div>

    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-input" style="flex-grow: 1;" placeholder="Ask me anything...">
        <button onclick="askKyan()">Ask</button>
    </div>
    <div class="status" id="status">Ready</div>
</div>

<script>
    const chatLog = document.getElementById('chat-log');
    const status = document.getElementById('status');

    async function speakWithElevenLabs(text, apiKey, lang) {
        status.textContent = "Kyan is speaking...";
        
        // Voice IDs: These are standard ElevenLabs voices (Pre-made)
        // You can change these IDs to any voice you like from your ElevenLabs Dashboard
        const voiceId = (lang === 'fr') ? 'jBpfuIE2acCO1zAt9x9e' : 'pNInz6obpgDQGcFmaJgB'; 

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'xi-api-key': apiKey
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                })
            });

            const audioBlob = await response.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play();
            status.textContent = "Ready";
        } catch (err) {
            console.error("ElevenLabs Error:", err);
            status.textContent = "Voice Error";
        }
    }

    async function askKyan() {
        const query = document.getElementById('user-input').value;
        const geminiKey = document.getElementById('gemini-key').value;
        const elevenKey = document.getElementById('eleven-key').value;
        const lang = document.getElementById('lang-select').value;

        if (!query || !geminiKey || !elevenKey) {
            alert("Please provide your question and BOTH API keys.");
            return;
        }

        // Add user message
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.textContent = query;
        chatLog.appendChild(userDiv);
        document.getElementById('user-input').value = '';
        status.textContent = "Kyan is thinking...";

        try {
            // 1. Get Answer from Gemini
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Respond in ${lang === 'fr' ? 'French' : 'English'}. Keep it brief (2 sentences max): ${query}` }] }]
                })
            });

            const data = await geminiRes.json();
            const aiText = data.candidates[0].content.parts[0].text;

            // 2. Display Message
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            aiDiv.textContent = aiText;
            chatLog.appendChild(aiDiv);
            chatLog.scrollTop = chatLog.scrollHeight;

            // 3. Speak with ElevenLabs
            await speakWithElevenLabs(aiText, elevenKey, lang);

        } catch (error) {
            status.textContent = "Error occurred.";
            console.error(error);
        }
    }
</script>

</body>
</html>
