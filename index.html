<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <title>KYAN ULTRA PROXY</title>
    <style>
        :root { --red: #e50914; --teal: #00e5b0; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100dvh; background: var(--bg); color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        #hud {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(10,10,10,0.95); display: flex; align-items: center;
            padding: 0 15px; gap: 15px; z-index: 1000; border-bottom: 1px solid #222;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 5px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        #p-btn { background: var(--teal); color: #000; box-shadow: 0 0 15px rgba(0,229,176,0.4); }
        
        #viewport-master { width: 100vw; height: calc(100dvh - 60px); margin-top: 60px; position: relative; }
        iframe { width: 100%; height: 100%; border: none; visibility: hidden; }
        iframe.active { visibility: visible; }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid var(--teal); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="hud">
    <button class="btn" id="p-btn" onclick="inject('https://poxel.io')">Launch Poxel.io</button>
    <div style="flex:1"></div>
    <button style="background:#222; color:#fff;" class="btn" onclick="location.reload()">Reset</button>
</div>

<div id="viewport-master">
    <div id="loader"><div class="spinner"></div><p id="load-txt">Force Loading Assets...</p></div>
    <iframe id="main-view" allow="autoplay; fullscreen; gamepad; encrypted-media"></iframe>
</div>

<script>
    const view = document.getElementById('main-view');
    const loader = document.getElementById('loader');

    async function inject(target) {
        loader.style.display = 'block';
        view.classList.remove('active');

        try {
            // 1. Fetch the site content
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;
            const resp = await fetch(proxy);
            let html = await resp.text();

            // 2. THE FIX: Rewrite relative paths to absolute paths
            // This forces the game to look at poxel.io instead of your domain
            const cleanTarget = target.endsWith('/') ? target : target + '/';
            
            // Rewrite src="..." and href="..."
            html = html.replace(/(src|href)="\//g, `$1="${cleanTarget}`);
            html = html.replace(/(src|href)=' \//g, `$1='${cleanTarget}`);

            // 3. Inject into the frame
            const iframeDoc = view.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <head>
                    <base href="${cleanTarget}">
                    <script>
                        // Bypass frame-stripping security
                        window.onerror = function() { return true; }; 
                    </script>
                </head>
                <body>${html}</body>
            `);
            iframeDoc.close();

            // 4. Verification Loop
            setTimeout(() => {
                view.classList.add('active');
                loader.style.display = 'none';
            }, 3000);

        } catch (e) {
            alert("Connection failed. The proxy might be down.");
        }
    }
</script>
</body>
</html>
