<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Moto Drift 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 160px;
            height: 160px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #00f2ff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stats { position: absolute; bottom: 20px; right: 20px; color: #ff00ea; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 id="speed-display">0 KM/H</h2>
    </div>
    <div id="joystick-zone"></div>
    <div class="stats">DRIFT MODE ACTIVE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const neonLight = new THREE.PointLight(0x00f2ff, 2, 50);
        scene.add(neonLight);

        // --- COOLER TRACK ---
        const innerRadius = 50;
        const outerRadius = 80;
        
        // Floor Grid
        const gridHelper = new THREE.GridHelper(300, 100, 0xff00ea, 0x222222);
        gridHelper.position.y = -0.05;
        scene.add(gridHelper);

        // The Neon Track
        const trackGeo = new THREE.RingGeometry(innerRadius, outerRadius, 128);
        const trackMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.1, 
            metalness: 0.8,
            side: THREE.DoubleSide 
        });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = Math.PI / 2;
        scene.add(track);

        // Boundaries (Glowing Rails)
        const createRail = (radius, color) => {
            const points = [];
            for(let i=0; i<=64; i++) {
                const a = (i/64) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(a)*radius, 0.5, Math.sin(a)*radius));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: color });
            return new THREE.Line(lineGeo, lineMat);
        };
        scene.add(createRail(innerRadius, 0x00f2ff));
        scene.add(createRail(outerRadius, 0x00f2ff));

        // --- BETTER MOTORCYCLE ---
        const bikeGroup = new THREE.Group();
        
        const chassis = new THREE.Mesh(
            new THREE.BoxGeometry(0.4, 0.5, 1.6), 
            new THREE.MeshStandardMaterial({color: 0x333333, metalness: 1})
        );
        chassis.position.y = 0.6;
        bikeGroup.add(chassis);

        const glowTrim = new THREE.Mesh(
            new THREE.BoxGeometry(0.45, 0.1, 1.2),
            new THREE.MeshBasicMaterial({color: 0x00f2ff})
        );
        glowTrim.position.y = 0.8;
        bikeGroup.add(glowTrim);

        const wheelGeo = new THREE.TorusGeometry(0.4, 0.15, 16, 32);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111});
        const w1 = new THREE.Mesh(wheelGeo, wheelMat);
        w1.position.set(0, 0.4, 0.8);
        bikeGroup.add(w1);
        const w2 = w1.clone();
        w2.position.z = -0.8;
        bikeGroup.add(w2);

        bikeGroup.position.set(65, 0, 0);
        scene.add(bikeGroup);

        // --- MOVEMENT PHYSICS ---
        let joystickActive = false;
        let inputX = 0;
        let inputY = 0;
        let velocity = 0;
        const accel = 0.015;
        const friction = 0.97;
        const maxSpeed = 1.2;
        const turnSharpness = 0.05;

        // --- JOYSTICK ---
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '80px', bottom: '80px' },
            color: '#00f2ff'
        });

        manager.on('move', (evt, data) => {
            joystickActive = true;
            const dist = data.distance / 80; // normalized 0 to 1
            inputX = Math.cos(data.angle.radians) * dist;
            inputY = Math.sin(data.angle.radians) * dist;
        });

        manager.on('end', () => {
            joystickActive = false;
            inputX = 0;
            inputY = 0;
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Move logic (Vertical Joystick = Power)
            if (joystickActive) {
                velocity += inputY * accel;
            }
            velocity *= friction; // Natural drag
            
            // Limit Speed
            velocity = Math.max(Math.min(velocity, maxSpeed), -maxSpeed * 0.5);

            // 2. Turn logic (Horizontal Joystick = Steering)
            if (Math.abs(velocity) > 0.05) {
                bikeGroup.rotation.y -= inputX * turnSharpness;
                
                // Visual Lean
                const targetLean = -inputX * 0.7;
                bikeGroup.rotation.z = THREE.MathUtils.lerp(bikeGroup.rotation.z, targetLean, 0.1);
            } else {
                // Straighten up when stopped
                bikeGroup.rotation.z = THREE.MathUtils.lerp(bikeGroup.rotation.z, 0, 0.1);
            }

            bikeGroup.translateZ(velocity);

            // 3. Keep on track (Boundary Logic)
            const d = Math.sqrt(bikeGroup.position.x**2 + bikeGroup.position.z**2);
            if (d < innerRadius + 1 || d > outerRadius - 1) {
                velocity *= 0.5; // Bounce/Hit wall effect
                const angle = Math.atan2(bikeGroup.position.z, bikeGroup.position.x);
                const clampedD = Math.max(innerRadius + 1, Math.min(d, outerRadius - 1));
                bikeGroup.position.x = Math.cos(angle) * clampedD;
                bikeGroup.position.z = Math.sin(angle) * clampedD;
            }

            // 4. Update UI & Lights
            document.getElementById('speed-display').innerText = Math.round(Math.abs(velocity) * 200) + " KM/H";
            neonLight.position.copy(bikeGroup.position);
            neonLight.position.y = 2;

            // 5. Camera Follow
            const camOffset = new THREE.Vector3(0, 4, -8).applyMatrix4(bikeGroup.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(bikeGroup.position.x, bikeGroup.position.y + 1, bikeGroup.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
