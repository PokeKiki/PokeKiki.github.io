<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Arrow Keypad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
    overflow: hidden;
    touch-action: none;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .instructions {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(255,255,255,0.08);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 2;
    pointer-events: none;
    user-select: none;
  }

  /* The floating pad */
  #pad {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 16px;
    width: 176px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 24px 48px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  #pad.dragging {
    cursor: grabbing;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 40px 80px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.1);
    transform: scale(1.04);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .pad-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .pad-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .drag-handle {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .drag-handle span {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }

  .key-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .key {
    -webkit-appearance: none;
    appearance: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: #e0e0e0;
    font-family: inherit;
    font-size: 22px;
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s, transform 0.08s, border-color 0.1s;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .key:active,
  .key.pressed {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
    transform: scale(0.91);
  }

  .key.empty {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  .key svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .key-center svg {
    width: 14px;
    height: 14px;
    fill: rgba(255,255,255,0.4);
    stroke: none;
  }

  .feedback {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
    text-align: center;
    text-transform: uppercase;
    height: 18px;
    transition: color 0.2s;
  }

  .feedback.active {
    color: rgba(255,255,255,0.6);
  }

  /* Bookmarklet section */
  .bookmarklet-box {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 18px;
    width: min(340px, 90vw);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    text-align: center;
  }

  .bookmarklet-box p {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .bookmarklet-box strong {
    font-weight: 600;
    color: rgba(255,255,255,0.6);
  }

  .steps {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    line-height: 1.9;
    text-align: left;
    list-style: none;
  }

  .steps li::before {
    content: attr(data-n) '. ';
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<div class="instructions">
  drag the keypad<br>anywhere on screen
</div>

<!-- Floating keypad -->
<div id="pad">
  <div class="pad-header">
    <span class="pad-title">Keys</span>
    <div class="drag-handle">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="key-grid">
    <!-- Row 1: empty, up, empty -->
    <div class="key empty"></div>
    <button class="key" id="btn-up" data-key="ArrowUp" aria-label="Up">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <div class="key empty"></div>

    <!-- Row 2: left, center, right -->
    <button class="key" id="btn-left" data-key="ArrowLeft" aria-label="Left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="key key-center" id="btn-center" data-key="Enter" aria-label="Enter">
      <svg viewBox="0 0 8 8"><circle cx="4" cy="4" r="3"/></svg>
    </button>
    <button class="key" id="btn-right" data-key="ArrowRight" aria-label="Right">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Row 3: empty, down, empty -->
    <div class="key empty"></div>
    <button class="key" id="btn-down" data-key="ArrowDown" aria-label="Down">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="key empty"></div>
  </div>

  <div class="feedback" id="feedback">tap a key</div>
</div>

<!-- How to use on any website -->
<div class="bookmarklet-box">
  <p><strong>How to use on any website</strong></p>
  <ol class="steps">
    <li data-n="1">Open this file in Safari</li>
    <li data-n="2">Tap Share → <strong>Add to Home Screen</strong></li>
    <li data-n="3">Open it from your home screen — it'll open as a full app window</li>
    <li data-n="4">Use iPad Split View or Slide Over to float it alongside any app</li>
  </ol>
</div>

<script>
  const pad = document.getElementById('pad');
  const feedback = document.getElementById('feedback');
  let feedbackTimer;

  // ── Drag (mouse + touch) ──────────────────────────────
  let dragging = false;
  let startX, startY, padLeft, padTop;

  function getPos(e) {
    return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                     : { x: e.clientX, y: e.clientY };
  }

  pad.addEventListener('mousedown', startDrag);
  pad.addEventListener('touchstart', startDrag, { passive: false });

  function startDrag(e) {
    if (e.target.closest('button')) return;
    e.preventDefault();
    dragging = true;
    pad.classList.add('dragging');

    const pos = getPos(e);
    const rect = pad.getBoundingClientRect();
    startX = pos.x - rect.left;
    startY = pos.y - rect.top;
    padLeft = rect.left;
    padTop  = rect.top;

    pad.style.transform = 'none';
    pad.style.left = padLeft + 'px';
    pad.style.top  = padTop  + 'px';
  }

  document.addEventListener('mousemove', onDrag);
  document.addEventListener('touchmove', onDrag, { passive: false });

  function onDrag(e) {
    if (!dragging) return;
    e.preventDefault();
    const pos = getPos(e);
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = pad.offsetWidth, h = pad.offsetHeight;
    let nx = pos.x - startX;
    let ny = pos.y - startY;
    nx = Math.max(0, Math.min(nx, vw - w));
    ny = Math.max(0, Math.min(ny, vh - h));
    pad.style.left = nx + 'px';
    pad.style.top  = ny + 'px';
  }

  document.addEventListener('mouseup',  endDrag);
  document.addEventListener('touchend', endDrag);

  function endDrag() {
    if (!dragging) return;
    dragging = false;
    pad.classList.remove('dragging');
  }

  // ── Key press ─────────────────────────────────────────
  const keyLabels = {
    ArrowUp: '↑  UP',
    ArrowDown: '↓  DOWN',
    ArrowLeft: '←  LEFT',
    ArrowRight: '→  RIGHT',
    Enter: '·  ENTER'
  };

  document.querySelectorAll('.key[data-key]').forEach(btn => {
    btn.addEventListener('pointerdown', e => {
      e.stopPropagation();
    });

    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      // Show feedback
      feedback.textContent = keyLabels[key] || key;
      feedback.classList.add('active');
      clearTimeout(feedbackTimer);
      feedbackTimer = setTimeout(() => {
        feedback.textContent = 'tap a key';
        feedback.classList.remove('active');
      }, 1200);

      // Flash button
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 150);

      // Dispatch real keyboard event to the parent page
      try {
        window.top.document.dispatchEvent(new KeyboardEvent('keydown', {
          key, code: key, bubbles: true, cancelable: true
        }));
      } catch(err) {
        // cross-origin blocked — normal when embedded on other sites
      }
    });
  });
</script>
</body>
</html>
