<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FNAF: Survival Office</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; user-select: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Stats */
        .stat-box { position: absolute; color: #fff; text-shadow: 2px 2px #000; pointer-events: auto; }
        #clock { top: 20px; right: 30px; font-size: 2.5rem; }
        #power-container { bottom: 20px; left: 30px; font-size: 1.5rem; }
        #usage { color: #0f0; font-size: 1rem; }

        /* Door/Light Controls */
        .btn-panel { position: absolute; top: 40%; width: 60px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        #left-btns { left: 5%; }
        #right-btns { right: 5%; }
        .btn { width: 50px; height: 50px; border: 3px solid #444; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; border-radius: 5px; }
        .btn-door { background: #700; }
        .btn-light { background: #770; }
        .active-door { background: #f00; box-shadow: 0 0 15px #f00; }
        .active-light { background: #ff0; box-shadow: 0 0 15px #ff0; color: #000; }

        /* Camera Toggle */
        #cam-trigger { position: absolute; bottom: 0; left: 25%; width: 50%; height: 40px; background: rgba(255,255,255,0.1); border: 2px solid #fff; pointer-events: auto; cursor: pointer; transition: 0.2s; }
        #cam-trigger:hover { background: rgba(255,255,255,0.3); }

        #cam-view { position: absolute; inset: 0; background: rgba(0,20,0,0.4); display: none; border: 30px solid #111; pointer-events: auto; }
        #static { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWU0WMrQmZpG60/giphy.gif'); opacity: 0.1; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="clock" class="stat-box">12 AM</div>
        <div id="power-container" class="stat-box">
            Power: <span id="power-val">100</span>%<br>
            <span id="usage">Usage: <span id="use-dots">●</span></span>
        </div>

        <div id="left-btns" class="btn-panel">
            <div id="btn-door-L" class="btn btn-door" onclick="toggleDoor('L')">DOOR</div>
            <div id="btn-light-L" class="btn btn-light" onmousedown="toggleLight('L', true)" onmouseup="toggleLight('L', false)">LIGHT</div>
        </div>

        <div id="right-btns" class="btn-panel">
            <div id="btn-door-R" class="btn btn-door" onclick="toggleDoor('R')">DOOR</div>
            <div id="btn-light-R" class="btn btn-light" onmousedown="toggleLight('R', true)" onmouseup="toggleLight('R', false)">LIGHT</div>
        </div>

        <div id="cam-trigger" onclick="toggleCam()"></div>
        
        <div id="cam-view">
            <div id="static"></div>
            <div style="color:#0f0; padding:20px;">CAM 1A - SHOWSTAGE</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, leftDoor, rightDoor, lLight, rLight;
        let power = 100, hour = 0, usage = 1;
        let doorL = false, doorR = false, lightL = false, lightR = false, camOpen = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Office Walls
            const room = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 10), new THREE.MeshStandardMaterial({color: 0x151515, side: THREE.BackSide}));
            scene.add(room);

            // Left & Right Door Meshes
            leftDoor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 3), new THREE.MeshStandardMaterial({color: 0x333333}));
            leftDoor.position.set(-5.8, 5, -1); // Start open (up)
            scene.add(leftDoor);

            rightDoor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 3), new THREE.MeshStandardMaterial({color: 0x333333}));
            rightDoor.position.set(5.8, 5, -1); 
            scene.add(rightDoor);

            // Hall Lights
            lLight = new THREE.PointLight(0xffffff, 0, 5); lLight.position.set(-5, 0, -1); scene.add(lLight);
            rLight = new THREE.PointLight(0xffffff, 0, 5); rLight.position.set(5, 0, -1); scene.add(rLight);

            const officeLight = new THREE.PointLight(0x4444ff, 0.5, 10); officeLight.position.set(0, 2, 0); scene.add(officeLight);

            camera.position.z = 2;
            
            document.addEventListener('mousemove', (e) => {
                if(!camOpen) {
                    camera.rotation.y = -((e.clientX / window.innerWidth) - 0.5) * 0.8;
                }
            });

            loop();
            setInterval(updateGame, 3000); // Drain power
            setInterval(updateClock, 45000); // 45s = 1 hour
        }

        function toggleDoor(side) {
            if(side === 'L') { 
                doorL = !doorL; 
                document.getElementById('btn-door-L').classList.toggle('active-door');
            } else { 
                doorR = !doorR; 
                document.getElementById('btn-door-R').classList.toggle('active-door');
            }
            calculateUsage();
        }

        function toggleLight(side, state) {
            if(side === 'L') { lightL = state; lLight.intensity = state ? 2 : 0; document.getElementById('btn-light-L').classList.toggle('active-light', state); }
            else { lightR = state; rLight.intensity = state ? 2 : 0; document.getElementById('btn-light-R').classList.toggle('active-light', state); }
            calculateUsage();
        }

        function toggleCam() {
            camOpen = !camOpen;
            document.getElementById('cam-view').style.display = camOpen ? 'block' : 'none';
            calculateUsage();
        }

        function calculateUsage() {
            usage = 1 + (doorL?1:0) + (doorR?1:0) + (lightL?1:0) + (lightR?1:0) + (camOpen?1:0);
            let dots = ""; for(let i=0; i<usage; i++) dots += "●";
            document.getElementById('use-dots').innerText = dots;
            document.getElementById('use-dots').style.color = usage > 3 ? "red" : "#0f0";
        }

        function updateGame() {
            if(power > 0) {
                power -= (usage * 0.5);
                document.getElementById('power-val').innerText = Math.max(0, Math.floor(power));
            } else {
                // Game Over: Power Outage
                scene.children.forEach(c => { if(c.intensity) c.intensity = 0; });
                document.getElementById('ui').innerHTML = "<h1 style='color:white; text-align:center; margin-top:20%'>POWER OUTAGE</h1>";
            }
        }

        function updateClock() {
            hour++;
            if(hour <= 6) document.getElementById('clock').innerText = hour + " AM";
            if(hour === 6) alert("WINNER!");
        }

        function loop() {
            requestAnimationFrame(loop);
            // Animate door movement
            leftDoor.position.y = THREE.MathUtils.lerp(leftDoor.position.y, doorL ? 0 : 5, 0.1);
            rightDoor.position.y = THREE.MathUtils.lerp(rightDoor.position.y, doorR ? 0 : 5, 0.1);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
