<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Kyan Browser - Ultra Edition</title>
<style>
:root{--bg:#0e0e12;--surface:#13131a;--border:#25252f;--accent:#00e5b0;--txt:#eeeef5;--muted:#4a4a62;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100dvh;overflow:hidden;font-family:sans-serif;background:var(--bg);color:var(--txt)}
body{display:flex;flex-direction:column}

/* UI NAVIGATION */
#navbar{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface);border-bottom:1px solid var(--border);z-index:100;}
#urlinput{flex:1;background:var(--bg);border:1px solid var(--border);padding:8px 15px;border-radius:20px;color:#fff;outline:none;}
.btn{background:var(--accent);border:none;padding:8px 15px;border-radius:20px;font-weight:bold;cursor:pointer;}

/* THE VIEWPORT */
#vpwrap{flex:1;position:relative;background:#000;}
iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;
    background:#000;display:none;
    /* Hardware acceleration fix */
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
}
iframe.active{display:block;}

/* NEW TAB PAGE */
#ntp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:10;}
.ntp-logo{font-size:50px;font-weight:800;color:var(--accent);text-shadow:0 0 20px rgba(0,229,176,0.3);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;width:90%;max-width:400px;}
.g-item{background:var(--surface);padding:20px;border-radius:15px;text-align:center;border:1px solid var(--border);}
</style>
</head>
<body>

<div id="navbar">
    <button class="btn" onclick="goHome()">⌂</button>
    <input id="urlinput" type="text" placeholder="Enter URL (e.g. poxel.io)"/>
    <button class="btn" onclick="manualNav()">GO</button>
</div>

<div id="vpwrap">
    <div id="ntp">
        <div class="ntp-logo">KYAN</div>
        <div class="grid">
            <div class="g-item" onclick="loadGame('https://poxel.io')">🎮 Poxel.io</div>
            <div class="g-item" onclick="loadGame('https://poki.com')">⭐ Poki</div>
            <div class="g-item" onclick="loadGame('https://slither.io')">🐍 Slither</div>
            <div class="g-item" onclick="loadGame('https://google.com')">🔍 Google</div>
        </div>
    </div>
    <iframe id="main-fr" allow="gamepad; fullscreen; accelerometer; gyroscope"></iframe>
</div>

<script>
const frame = document.getElementById('main-fr');
const ntp = document.getElementById('ntp');
const input = document.getElementById('urlinput');

async function loadGame(targetUrl) {
    if(!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
    
    ntp.style.display = 'none';
    frame.classList.add('active');
    frame.src = 'about:blank'; // Reset

    // WE USE A DIFFERENT PROXY STRATEGY HERE
    // Instead of just setting SRC, we fetch the site data
    try {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
        
        // This tricks the browser into thinking the game is local
        frame.src = proxyUrl; 

        // Fix for iOS Black Screen
        setTimeout(() => {
            frame.style.display = 'none';
            frame.offsetHeight; // force reflow
            frame.style.display = 'block';
        }, 500);

    } catch (e) {
        alert("Failed to load. Try a different URL.");
        goHome();
    }
}

function manualNav() {
    loadGame(input.value);
}

function goHome() {
    ntp.style.display = 'flex';
    frame.classList.remove('active');
    frame.src = 'about:blank';
}

// Handle Enter Key
input.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') manualNav();
});
</script>
</body>
</html>
