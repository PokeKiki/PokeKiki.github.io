<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto GP: Ultra Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a2a1a; font-family: 'Arial Black', sans-serif; touch-action: none; color: white; user-select: none; }
        
        /* Overlays */
        #overlay, #end-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(5px); }
        #end-screen { display: none; }
        .btn { padding: 25px 50px; font-size: 1.8rem; background: #ff0000; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 0 20px #ff0000; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; text-shadow: 3px 3px #000; }
        #rank-display { position: absolute; top: 20px; right: 20px; font-size: 3rem; color: #ff0000; font-style: italic; text-shadow: 2px 2px 10px rgba(255,0,0,0.5); }
        #crash-alert { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; color: #ff0000; display: none; z-index: 150; text-shadow: 0 0 30px #000; font-weight: 900; pointer-events: none; }
        
        /* Speedometer */
        #speedometer { position: absolute; bottom: 30px; right: 30px; width: 180px; height: 90px; background: rgba(0,0,0,0.9); border: 4px solid #555; border-radius: 90px 90px 0 0; text-align: center; border-bottom: none; }
        #speed-text { font-size: 2.5rem; display: block; margin-top: 15px; color: #00ffcc; }
        
        /* Starting Lights */
        #light-system { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); display: none; gap: 20px; z-index: 100; }
        .light { width: 60px; height: 60px; border-radius: 50%; background: #222; border: 4px solid #444; }
        .red { background: #ff0000; box-shadow: 0 0 30px #ff0000; }
        .yellow { background: #ffaa00; box-shadow: 0 0 30px #ffaa00; }
        .green { background: #00ff00; box-shadow: 0 0 30px #00ff00; }

        /* Joystick */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 140px; height: 140px; background: rgba(255, 255, 255, 0.05); border: 5px solid rgba(255, 255, 255, 0.3); border-radius: 50%; visibility: hidden; z-index: 100; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 70px; height: 70px; background: radial-gradient(circle, #fff, #888); border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="font-size: 4rem; margin-bottom: 20px;">MOTO <span style="color: #ff0000;">PRO</span></h1>
        <button class="btn" onclick="startRace()">RACE NOW</button>
    </div>

    <div id="end-screen">
        <h1 id="final-status" style="font-size: 4rem;">RACE OVER</h1>
        <h2 id="final-rank" style="color: yellow; font-size: 2.5rem;">RANK: 1st</h2>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <div id="crash-alert">CRASHED!</div>

    <div id="light-system">
        <div id="l1" class="light"></div>
        <div id="l2" class="light"></div>
        <div id="l3" class="light"></div>
    </div>

    <div id="hud">
        <div style="font-size: 1.8rem;">LAP <span id="lap-display" style="color: yellow;">1/3</span></div>
        <div id="timer" style="font-family: monospace; font-size: 1.2rem;">00:00:00</div>
    </div>

    <div id="rank-display">1st</div>
    <div id="speedometer"><span id="speed-text">0</span><span style="font-size: 0.7rem; color: #888;">KM/H</span></div>
    
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="container"></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ENGINE & LIGHTING ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 200, 1000);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(150, 200, 100);
        scene.add(sun);

        // --- 2. THE TRACK (Circle Track - Restored) ---
        const innerR = 130, outerR = 190, centerR = 160;
        
        // Detailed Grass
        const grassGeo = new THREE.PlaneGeometry(5000, 5000);
        const grassMat = new THREE.MeshStandardMaterial({color: 0x2d4d2d, roughness: 1});
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1;
        scene.add(grass);

        // Asphalt with "Noise"
        const road = new THREE.Mesh(new THREE.RingGeometry(innerR, outerR, 128), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }));
        road.rotation.x = -Math.PI / 2; road.position.y = 0.02;
        scene.add(road);

        const finishLine = new THREE.Mesh(new THREE.PlaneGeometry(outerR - innerR, 5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        finishLine.position.set(centerR, 0.05, 0); finishLine.rotation.x = -Math.PI / 2;
        scene.add(finishLine);

        // Checkered Curbs
        const curbSegs = 180;
        for(let i=0; i<curbSegs; i++) {
            const angle = (i/curbSegs) * Math.PI * 2;
            const mat = new THREE.MeshStandardMaterial({ color: i%2===0 ? 0xdd0000 : 0xffffff });
            const box = new THREE.BoxGeometry(8, 0.6, 2.5);
            const cIn = new THREE.Mesh(box, mat); cIn.position.set(Math.cos(angle)*innerR, 0.1, Math.sin(angle)*innerR); cIn.rotation.y = -angle; scene.add(cIn);
            const cOut = new THREE.Mesh(box, mat); cOut.position.set(Math.cos(angle)*outerR, 0.1, Math.sin(angle)*outerR); cOut.rotation.y = -angle; scene.add(cOut);
        }

        // Obstacles (Improved Blocks)
        const obstacles = [];
        for(let i=0; i<35; i++) {
            const angle = (i/35) * Math.PI * 2 + Math.random();
            const lane = centerR + (Math.random()-0.5)*50;
            const block = new THREE.Mesh(new THREE.BoxGeometry(6, 5, 6), new THREE.MeshStandardMaterial({color: 0xff1100, emissive: 0x330000}));
            block.position.set(Math.cos(angle)*lane, 2.5, Math.sin(angle)*lane);
            scene.add(block); obstacles.push(block);
        }

        // --- 3. THE PRO MOTORCYCLE ---
        function createMoto(color, isPlayer = false) {
            const g = new THREE.Group();
            // Main Frame
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 1.8), new THREE.MeshStandardMaterial({color: 0x050505, metalness: 1, roughness: 0.1}));
            frame.position.y = 0.6; g.add(frame);
            // Aerodynamic Shell
            const shell = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 1.2), new THREE.MeshStandardMaterial({color, metalness: 0.9, roughness: 0.2}));
            shell.position.set(0, 1.0, 0.1); g.add(shell);
            // Wheels
            const wGeo = new THREE.TorusGeometry(0.42, 0.16, 16, 32);
            const wMat = new THREE.MeshStandardMaterial({color: 0x000000, roughness: 0.5});
            const fw = new THREE.Mesh(wGeo, wMat); fw.position.set(0, 0.42, 0.9); g.add(fw);
            const bw = fw.clone(); bw.position.z = -0.9; g.add(bw);
            if(isPlayer) g.collisionSphere = new THREE.Sphere(new THREE.Vector3(), 1.6);
            return g;
        }

        const player = createMoto(0xff0000, true);
        player.position.set(centerR, 0, -15);
        scene.add(player);

        // Smoke Particle Pool
        const smokePool = [];
        for(let i=0; i<30; i++) {
            const s = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.6}));
            s.visible = false; scene.add(s); smokePool.push(s);
        }
        let smokeIdx = 0;

        const bots = [];
        [0x00ff00, 0x0044ff, 0xffee00].forEach((c, i) => {
            const bot = createMoto(c);
            bot.userData = { angle: -0.15 - (i*0.1), speed: 0.004 + Math.random()*0.002, lane: centerR + (i-1)*18 };
            scene.add(bot); bots.push(bot);
        });

        // --- 4. ENGINE LOGIC ---
        let raceStarted = false, isFinished = false, velocity = 0, lap = 1, checkpoint = false, time = 0;

        window.startRace = () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('light-system').style.display = 'flex';
            setTimeout(() => document.getElementById('l1').classList.add('red'), 800);
            setTimeout(() => document.getElementById('l2').classList.add('yellow'), 1600);
            setTimeout(() => {
                document.getElementById('l3').classList.add('green'); raceStarted = true;
                document.getElementById('joy-base').style.visibility = 'visible';
                setTimeout(() => document.getElementById('light-system').style.display = 'none', 1000);
            }, 2400);
        };

        const base = document.getElementById('joy-base'), stick = document.getElementById('joy-stick');
        let inX = 0, inY = 0, touching = false;
        base.addEventListener('touchstart', (e) => { touching = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => {
            if(!touching) return;
            const t = e.touches[0], r = base.getBoundingClientRect();
            let dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            if(Math.sqrt(dx*dx+dy*dy) > 55) { const d = 55/Math.sqrt(dx*dx+dy*dy); dx *= d; dy *= d; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inX = dx/55; inY = -dy/55;
            e.preventDefault();
        }, {passive: false});
        window.addEventListener('touchend', () => { touching = false; stick.style.transform = 'translate(0,0)'; inX = 0; inY = 0; });

        function animate() {
            requestAnimationFrame(animate);
            if(raceStarted && !isFinished) {
                // Collision
                let crash = false;
                player.collisionSphere.center.copy(player.position);
                obstacles.forEach(ob => { if(new THREE.Box3().setFromObject(ob).intersectsSphere(player.collisionSphere)) crash = true; });

                if(crash) {
                    velocity = 0.04; document.getElementById('crash-alert').style.display = 'block';
                } else {
                    document.getElementById('crash-alert').style.display = 'none';
                    if (Math.abs(inY) > 0.1) velocity += inY * 0.028;
                    velocity *= 0.975;
                }

                // DRIFT & LEANING
                player.rotation.y -= inX * 0.065 * (Math.abs(velocity)/1.6);
                player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -inX * 1.2 * (Math.abs(velocity)/1.6), 0.12);
                player.translateZ(velocity);

                // Particle Effect
                if(Math.abs(inX) > 0.7 && Math.abs(velocity) > 0.6) {
                    const p = smokePool[smokeIdx]; p.visible = true;
                    p.position.set(player.position.x + (Math.random()-0.5), 0.2, player.position.z + (Math.random()-0.5));
                    p.scale.setScalar(1);
                    smokeIdx = (smokeIdx + 1) % smokePool.length;
                }
                smokePool.forEach(s => { if(s.visible) { s.scale.multiplyScalar(0.9); if(s.scale.x < 0.1) s.visible = false; } });

                // Bounds
                const d = Math.sqrt(player.position.x**2 + player.position.z**2);
                if (d < innerR + 1.5 || d > outerR - 1.5) velocity *= 0.92;

                // Bots AI
                bots.forEach(b => {
                    b.userData.angle += b.userData.speed;
                    b.position.set(Math.cos(b.userData.angle)*b.userData.lane, 0, Math.sin(b.userData.angle)*b.userData.lane);
                    b.rotation.y = -b.userData.angle + Math.PI;
                });

                // Laps/Ranking
                const pA = Math.atan2(player.position.z, player.position.x);
                if(pA > 3 || pA < -3) checkpoint = true;
                if(checkpoint && pA > -0.1 && pA < 0.1 && player.position.x > 0) {
                    checkpoint = false;
                    if(lap === 3) {
                        isFinished = true;
                        document.getElementById('end-screen').style.display = 'flex';
                        document.getElementById('final-rank').innerText = "RANK: " + document.getElementById('rank-display').innerText;
                    } else { lap++; document.getElementById('lap-display').innerText = lap + "/3"; }
                }

                let rank = 1;
                bots.forEach(b => { if(b.userData.angle > (lap-1)*Math.PI*2 + (pA<0?pA+Math.PI*2:pA)) rank++; });
                document.getElementById('rank-display').innerText = rank + (["st","nd","rd","th"][rank-1] || "th");
                
                time += 1/60; document.getElementById('timer').innerText = time.toFixed(2) + "S";
            }
            
            document.getElementById('speed-text').innerText = Math.round(Math.abs(velocity)*215);
            
            // Pro Camera Chase
            const camOffset = new THREE.Vector3(0, 6, -11).applyMatrix4(player.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
