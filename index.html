<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Moto Avoidance</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Bahnschrift', sans-serif; touch-action: none; user-select: none; }
        
        /* Speedometer UI (Restored and Made Better) */
        #ui-container {
            position: absolute; bottom: 20px; right: 20px; width: 140px; height: 140px;
            background: rgba(0,0,0,0.8); border-radius: 50%; border: 4px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #speed-num { font-size: 2rem; font-weight: bold; color: #fff; margin: 0; text-shadow: 0 0 10px #00f2ff; }
        #speed-unit { font-size: 0.7rem; color: #ff0000; letter-spacing: 1px; }

        /* Joystick UI */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; background: rgba(0, 242, 255, 0.1); border: 2px solid #00f2ff; border-radius: 50%; z-index: 100; box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* Crash Prompt */
        #crash-prompt { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: #ff0000; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #ff0000; display: none; z-index: 150; pointer-events: none; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="crash-prompt">CRASH!</div>

    <div id="ui-container">
        <div id="speed-num">0</div>
        <div id="speed-unit">KM/H</div>
    </div>
    
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ENGINE & SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a); // Dark Cyberpunk feel
        scene.fog = new THREE.Fog(0x000000, 20, 100); // Fog for visibility control

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x00f2ff, 3, 50); // Following light
        scene.add(pointLight);

        // --- 2. MASSIVE SPRAWLING TRACK ---
        const innerR = 80;  // Way bigger
        const outerR = 150; // Way bigger
        const centerR = (innerR + outerR) / 2;

        // Dark Asphalt with subtle grid
        const roadGeo = new THREE.RingGeometry(innerR, outerR, 128);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1, metalness: 0 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Visible Grid (for visual speed)
        const grid = new THREE.GridHelper(500, 100, 0x00f2ff, 0x111111);
        grid.position.y = -0.1;
        scene.add(grid);

        // Curbs (Red and white checkered sides)
        const curbSegs = 200;
        for(let i=0; i<curbSegs; i++) {
            const angle = (i/curbSegs) * Math.PI * 2;
            const mat = new THREE.MeshStandardMaterial({ color: i%2===0 ? 0xcc0000 : 0xffffff });
            const box = new THREE.BoxGeometry(6, 0.3, 2);
            
            const curbIn = new THREE.Mesh(box, mat);
            curbIn.position.set(Math.cos(angle)*innerR, 0.15, Math.sin(angle)*innerR);
            curbIn.rotation.y = -angle;
            scene.add(curbIn);
            
            const curbOut = new THREE.Mesh(box, mat);
            curbOut.position.set(Math.cos(angle)*outerR, 0.15, Math.sin(angle)*outerR);
            curbOut.rotation.y = -angle;
            scene.add(curbOut);
        }

        // --- 3. DYNAMIC OBSTACLES (RED BLOCKS) ---
        const obstacles = [];
        const obstacleCount = 20;
        const obstacleMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 });
        
        for(let i=0; i<obstacleCount; i++) {
            const angle = (i/obstacleCount) * Math.PI * 2 + Math.random();
            const laneOffset = (Math.random() - 0.5) * (outerR - innerR - 10);
            
            const block = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 6), obstacleMat);
            block.position.set(Math.cos(angle)*(centerR + laneOffset), 2, Math.sin(angle)*(centerR + laneOffset));
            scene.add(block);
            obstacles.push(block);
        }

        // --- 4. IMPROVED MOTORCYCLE MODEL ---
        const moto = new THREE.Group();
        moto.collisionSphere = new THREE.Sphere(new THREE.Vector3(0,0,0), 1.2); // Collision volume
        
        // Chassis (Frame)
        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 1.4), new THREE.MeshStandardMaterial({color: 0x111111}));
        frame.position.y = 0.6; moto.add(frame);

        // Colorful Fairing (Body)
        const fairing = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.5, 0.8), new THREE.MeshStandardMaterial({color: 0x0077ff, metalness: 0.8}));
        fairing.position.set(0, 0.8, 0.2); moto.add(fairing);

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(0.35, 0.12, 12, 24);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x050505, roughness: 1});
        const frontW = new THREE.Mesh(wheelGeo, wheelMat); frontW.position.set(0, 0.35, 0.7); moto.add(frontW);
        const backW = frontW.clone(); backW.position.z = -0.7; moto.add(backW);

        moto.position.set(centerR, 0, 0); // Start on the track
        scene.add(moto);

        // --- 5. JOYSTICK LOGIC (NATIVE JS) ---
        const base = document.getElementById('joy-base'), stick = document.getElementById('joy-stick');
        let inX = 0, inY = 0, isTouching = false;
        const limit = 50;

        const handleInput = (e) => {
            if(!isTouching) return;
            const t = e.touches ? e.touches[0] : e;
            const r = base.getBoundingClientRect();
            let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.sqrt(dx*dx + dy*dy);
            if(d > limit) { dx *= limit/d; dy *= limit/d; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inX = dx / limit; // Horizontal (Steering)
            inY = -dy / limit; // Vertical (Power)
        };

        base.addEventListener('touchstart', (e) => { isTouching = true; handleInput(e); });
        window.addEventListener('touchmove', handleInput, { passive: false });
        window.addEventListener('touchend', () => { isTouching = false; stick.style.transform = 'translate(0,0)'; inX = 0; inY = 0; });

        // --- 6. GAME LOOP ---
        let velocity = 0;
        let isCrashed = false;
        const crashPrompt = document.getElementById('crash-prompt');

        function animate() {
            requestAnimationFrame(animate);

            // Forward/Back Movement
            if (!isCrashed) {
                if (Math.abs(inY) > 0.1) velocity += inY * 0.03;
                velocity *= 0.96; // Friction
                velocity = Math.max(Math.min(velocity, 1.4), -0.7);
            } else {
                // Crashed state logic
                velocity *= 0.9; // Fast friction
                if (velocity < 0.1) velocity = 0.05; // Force extremely slow movement
            }

            // Steering & Leaning
            if (Math.abs(velocity) > 0.01) {
                moto.rotation.y -= inX * 0.05;
                const targetLean = -inX * 0.8 * (velocity/1.4);
                moto.rotation.z = THREE.MathUtils.lerp(moto.rotation.z, targetLean, 0.1);
            }

            moto.translateZ(velocity);

            // Update internal collision sphere position
            moto.collisionSphere.center.copy(moto.position);
            moto.collisionSphere.center.y = 1; // Collision volume center height

            // Boundary Logic (Keep in massive track bounds)
            const d = Math.sqrt(moto.position.x**2 + moto.position.z**2);
            if (d < innerR + 1 || d > outerR - 1) {
                velocity *= 0.7; // Bounce/Hit wall effect
                const angle = Math.atan2(moto.position.z, moto.position.x);
                const clamp = Math.max(innerR + 1, Math.min(d, outerR - 1));
                moto.position.x = Math.cos(angle) * clamp;
                moto.position.z = Math.sin(angle) * clamp;
            }

            // --- COLLISION DETECTION (Obstacles) ---
            let collisionDetected = false;
            for(let block of obstacles) {
                const box = new THREE.Box3().setFromObject(block); // Build block volume
                if (box.intersectsSphere(moto.collisionSphere)) {
                    collisionDetected = true;
                    break; 
                }
            }

            if (collisionDetected && !isCrashed) {
                isCrashed = true;
                velocity = 0.01; // Mandatory stall speed
                crashPrompt.style.display = 'block';
            } else if (!collisionDetected && isCrashed) {
                // If you are no longer in contact, and can actually move away
                isCrashed = false;
                crashPrompt.style.display = 'none';
            }

            // UI & Lighting Update
            document.getElementById('speed-num').innerText = Math.round(Math.abs(velocity) * 200);
            pointLight.position.copy(moto.position);
            pointLight.position.y = 5;

            // Camera Chase (3rd Person)
            const camOffset = new THREE.Vector3(0, 4, -9).applyMatrix4(moto.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(moto.position.x, moto.position.y + 1, moto.position.z);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
