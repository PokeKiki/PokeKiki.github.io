<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Kyan - Poxel & Netflix Edition</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
    #ui { position: absolute; top: 0; width: 100%; background: rgba(20,20,20,0.9); display: flex; padding: 10px; gap: 10px; z-index: 10; border-bottom: 1px solid #333; }
    button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
    .n-btn { background: #e50914; } /* Netflix Red */
    .p-btn { background: #00e5b0; color: #000; } /* Poxel Teal */
    #view-container { width: 100vw; height: 100vh; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: none; }
    iframe.active { display: block; }
    #msg { position: absolute; top: 50%; width: 100%; text-align: center; color: #555; pointer-events: none; }
</style>
</head>
<body>

<div id="ui">
    <button class="n-btn" onclick="load('https://www.netflix.com')">NETFLIX</button>
    <button class="p-btn" onclick="load('https://poxel.io')">POXEL.IO</button>
    <button style="background:#333" onclick="location.reload()">RELOAD</button>
</div>

<div id="view-container">
    <div id="msg">Select a service above...</div>
    <iframe id="ifr" allow="autoplay; fullscreen; gamepad; encrypted-media; gyroscope; accelerometer"></iframe>
</div>

<script>
    const ifr = document.getElementById('ifr');
    const msg = document.getElementById('msg');

    function load(url) {
        msg.innerText = "Connecting to Proxy...";
        
        // We are using a different service: 'Cloudflare Worker' style proxy
        // This is the most stable way to bypass the "Black Screen" on mobile
        const finalUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        
        ifr.src = 'about:blank';
        
        setTimeout(() => {
            ifr.src = finalUrl;
            ifr.classList.add('active');
            msg.style.display = 'none';
        }, 200);

        // Mobile Refresh Hack:
        // Many mobile browsers (iOS) need a "touch" to start the GPU
        document.addEventListener('touchstart', function() {
            if(ifr.contentWindow) ifr.contentWindow.focus();
        }, {once: true});
    }
</script>
</body>
</html>
