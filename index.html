<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabs vs Terrorist</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui-layer { text-align: center; background: #333; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 10; }
        canvas { background: #111; border: 2px solid #555; display: none; cursor: none; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #c0392b; }
        .hidden { display: none; }
        #status-bar { position: absolute; top: 10px; left: 10px; display: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- LOBBY UI -->
    <div id="ui-layer">
        <h1 id="title">ARABS</h1>
        <div id="name-screen">
            <input type="text" id="username" placeholder="Enter Your Name..." maxlength="12">
            <br>
            <button onclick="showLobby()">Continue</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <p>Welcome, <span id="display-name"></span></p>
            <input type="text" id="room-code" placeholder="Enter Room Code...">
            <br>
            <button onclick="startGame('create')">Create Room</button>
            <button onclick="startGame('join')">Join Room</button>
        </div>
    </div>

    <!-- GAMEPLAY -->
    <div id="status-bar">
        Role: <span id="role-text">Arabs</span> | Room: <span id="room-id-text">None</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui-layer');
        let playerName = "";
        let role = "Arab";
        let players = []; 
        let isPlaying = false;

        // Player Object
        const player = {
            x: 400,
            y: 300,
            size: 30,
            speed: 4,
            color: '#3498db',
            name: ""
        };

        const keys = {};

        function showLobby() {
            playerName = document.getElementById('username').value;
            if (playerName.trim() === "") return alert("Please enter a name");
            
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = playerName;
        }

        function startGame(type) {
            const code = document.getElementById('room-code').value;
            if (type === 'join' && code.trim() === "") return alert("Enter a room code");
            
            // Logic for Role Assignment
            role = Math.random() > 0.8 ? "Terrorist" : "Arab";
            
            // UI Transition
            ui.style.display = "none";
            canvas.style.display = "block";
            document.getElementById('status-bar').style.display = "block";
            document.getElementById('role-text').innerText = role;
            document.getElementById('role-text').style.color = (role === "Terrorist") ? "red" : "#3498db";
            document.getElementById('room-id-text').innerText = type === 'create' ? "HOST-123" : code;

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            isPlaying = true;
            gameLoop();
        }

        // Input Listeners
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
            if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Map Grid (Simple)
            ctx.strokeStyle = "#333";
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=50) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Draw Name Label
            ctx.fillStyle = "white";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(playerName, player.x + player.size/2, player.y - 10);
            
            // Instructions for Prototype
            ctx.globalAlpha = 0.5;
            ctx.fillText("WASD to Move", 100, canvas.height - 20);
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() {
            if (!isPlaying) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            if(isPlaying) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

    </script>
</body>
</html>
