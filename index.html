<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Unblocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:#ff2020; --red2:#b00;
      --bg:#0d0d0d; --card:#161616; --card2:#1f1f1f;
      --border:#282828; --text:#f0f0f0; --muted:#666;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

    /* HEADER */
    header{height:58px;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.4rem;gap:1rem;position:sticky;top:0;z-index:99;}
    .logo{display:flex;align-items:center;gap:7px;font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.05em;flex-shrink:0;}
    .lbox{width:30px;height:30px;background:var(--red);border-radius:6px;display:grid;place-items:center;}
    .lbox::after{content:'';border-left:11px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px;}
    .logo em{color:var(--red);font-style:normal;}
    .hsearch{flex:1;display:flex;gap:.4rem;max-width:520px;}
    .hsearch input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:7px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;}
    .hsearch input::placeholder{color:#444;}
    .hsearch input:focus{border-color:var(--red);}
    .rbtn{background:var(--red);border:none;border-radius:7px;padding:7px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s;}
    .rbtn:hover{background:var(--red2);}

    /* LAYOUT */
    .page{max-width:1280px;margin:0 auto;padding:1.4rem;display:grid;grid-template-columns:1fr 290px;gap:1.4rem;}

    /* PLAYER */
    .player-wrap{border-radius:14px;overflow:hidden;aspect-ratio:16/9;background:#000;border:1px solid var(--border);position:relative;}

    /* The actual iframe — always in DOM, src set on play */
    #yt{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;z-index:2;}

    /* cover shown until user plays */
    #cover{position:absolute;inset:0;z-index:3;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;text-align:center;padding:2rem;transition:opacity .3s;}
    #cover.hidden{opacity:0;pointer-events:none;}
    .pring{width:64px;height:64px;background:rgba(255,32,32,.12);border:2px solid rgba(255,32,32,.3);border-radius:50%;display:grid;place-items:center;}
    .pring::after{content:'';border-left:22px solid var(--red);border-top:13px solid transparent;border-bottom:13px solid transparent;margin-left:3px;}
    #cover p{font-size:.88rem;color:var(--muted);}
    #cover small{font-size:.72rem;color:#333;}

    /* video meta */
    .vmeta{margin-top:.9rem;display:none;}
    .vmeta h2{font-size:1rem;font-weight:600;line-height:1.4;}
    .vtag{margin-top:.35rem;display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:100px;padding:3px 11px;font-size:.75rem;color:var(--muted);}
    .vdot{width:6px;height:6px;border-radius:50%;background:var(--red);}

    /* PASTE BOX */
    .paste{margin-top:.9rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;}
    .paste label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.5rem;}
    .prow{display:flex;gap:.4rem;}
    .prow input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;outline:none;}
    .prow input:focus{border-color:var(--red);}
    .prow input::placeholder{color:#333;}

    /* steps */
    .steps{margin-top:.7rem;display:flex;flex-direction:column;gap:.35rem;}
    .step{display:flex;align-items:flex-start;gap:.5rem;font-size:.77rem;color:#886;}
    .step b{color:#ff9090;}
    .snum{background:var(--red);color:#fff;border-radius:50%;min-width:17px;height:17px;font-size:.62rem;font-weight:700;display:grid;place-items:center;margin-top:1px;}

    /* SIDEBAR */
    .stitle{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:7px;margin-bottom:.7rem;}
    .stitle::after{content:'';flex:1;height:1px;background:var(--border);}
    .hlist{display:flex;flex-direction:column;gap:.4rem;}
    .hcard{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden;display:flex;cursor:pointer;transition:border-color .12s,transform .12s;animation:up .2s ease both;}
    @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .hcard:hover{border-color:var(--red);transform:translateX(2px);}
    .hcard.on{border-color:var(--red);background:#180f0f;}
    .hthumb{width:90px;min-width:90px;height:54px;object-fit:cover;background:var(--card2);}
    .hinfo{padding:.4rem .55rem;overflow:hidden;}
    .htitle{font-size:.74rem;font-weight:500;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .hch{font-size:.67rem;color:var(--muted);margin-top:2px;}
    .hempty{text-align:center;padding:2rem 1rem;color:#333;font-size:.8rem;line-height:1.7;}
    .hempty span{font-size:1.8rem;display:block;margin-bottom:.4rem;}

    /* TOAST */
    #toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(56px);background:var(--card2);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:.81rem;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    #toast.on{transform:translateX(-50%) translateY(0);}

    @media(max-width:820px){
      .page{grid-template-columns:1fr;}
      .sidebar{order:-1;}
      .hlist{flex-direction:row;overflow-x:auto;padding-bottom:.3rem;}
      .hcard{min-width:180px;flex-direction:column;}
      .hthumb{width:100%;height:auto;aspect-ratio:16/9;}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="lbox"></div>
    YT&nbsp;<em>UNBLOCKED</em>
  </div>
  <div class="hsearch">
    <input id="sq" type="text" placeholder="Search YouTube…" autocomplete="off"/>
    <button class="rbtn" id="sbtn">Search ↗</button>
  </div>
</header>

<div class="page">

  <!-- LEFT -->
  <div>
    <div class="player-wrap">
      <!-- iframe always present; src="" until play -->
      <iframe id="yt" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share">
      </iframe>
      <div id="cover">
        <div class="pring"></div>
        <p>Paste a YouTube link below and hit Play</p>
        <small>Or use Search ↗ to find a video, copy its URL, paste here</small>
      </div>
    </div>

    <div class="vmeta" id="vmeta">
      <h2 id="vtitle"></h2>
      <div class="vtag"><span class="vdot"></span><span id="vch"></span></div>
    </div>

    <div class="paste">
      <label>▶ YouTube URL or Video ID</label>
      <div class="prow">
        <input id="uin" type="text" placeholder="https://youtube.com/watch?v=…  or  youtu.be/…  or  11-char ID"/>
        <button class="rbtn" id="pbtn">▶ Play</button>
      </div>
      <div class="steps">
        <div class="step"><span class="snum">1</span><span>Click <b>Search ↗</b> — YouTube opens in a new tab</span></div>
        <div class="step"><span class="snum">2</span><span>Pick a video — <b>copy the URL</b> from the address bar</span></div>
        <div class="step"><span class="snum">3</span><span>Paste it above and press <b>▶ Play</b></span></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="stitle">Recently Played</div>
    <div class="hlist" id="hlist">
      <div class="hempty"><span>🎬</span>Videos you watch<br>will appear here</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
  const yt     = document.getElementById('yt');
  const cover  = document.getElementById('cover');
  const vmeta  = document.getElementById('vmeta');
  const vtitle = document.getElementById('vtitle');
  const vch    = document.getElementById('vch');
  const uin    = document.getElementById('uin');
  const pbtn   = document.getElementById('pbtn');
  const sq     = document.getElementById('sq');
  const sbtn   = document.getElementById('sbtn');
  const hlist  = document.getElementById('hlist');

  let history  = [];
  let activeId = null;

  /* ── toast ── */
  function toast(msg, dur=2600){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('on');
    setTimeout(()=>t.classList.remove('on'),dur);
  }

  /* ── extract 11-char video ID from any YT URL ── */
  function getId(raw){
    raw=(raw||'').trim();
    const pats=[
      /[?&]v=([A-Za-z0-9_-]{11})/,
      /youtu\.be\/([A-Za-z0-9_-]{11})/,
      /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
      /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
      /^([A-Za-z0-9_-]{11})$/
    ];
    for(const p of pats){const m=raw.match(p);if(m)return m[1];}
    return null;
  }

  /* ── fetch real title via YouTube oEmbed (no API key) ── */
  async function getMeta(id){
    try{
      const r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
      if(!r.ok)return null;
      return await r.json();
    }catch{return null;}
  }

  /* ── play ── */
  async function play(id){
    if(!id)return;
    activeId=id;

    // Hide cover
    cover.classList.add('hidden');

    // Set iframe src — use standard embed URL
    yt.src=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;

    // Fetch meta in background
    getMeta(id).then(info=>{
      const title  = info?.title       || '';
      const author = info?.author_name || '';
      const thumb  = info?.thumbnail_url || `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;

      if(title){ vtitle.textContent=title; vch.textContent=author; vmeta.style.display='block'; }

      // Add to history
      if(!history.find(h=>h.id===id)){
        history.unshift({id,title:title||id,author,thumb});
        renderHistory();
      }
      markActive();
    });

    if(window.innerWidth<820) document.querySelector('.player-wrap').scrollIntoView({behavior:'smooth'});
  }

  /* ── render sidebar ── */
  function renderHistory(){
    if(!history.length)return;
    hlist.innerHTML='';
    history.forEach((v,i)=>{
      const c=document.createElement('div');
      c.className='hcard'+(v.id===activeId?' on':'');
      c.dataset.id=v.id;
      c.style.animationDelay=`${i*20}ms`;
      c.innerHTML=`<img class="hthumb" src="${v.thumb}" loading="lazy" onerror="this.style.background='#222'"/>
        <div class="hinfo"><div class="htitle">${esc(v.title)}</div><div class="hch">${esc(v.author)}</div></div>`;
      c.addEventListener('click',()=>play(v.id));
      hlist.appendChild(c);
    });
  }
  function markActive(){document.querySelectorAll('.hcard').forEach(c=>c.classList.toggle('on',c.dataset.id===activeId));}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* ── play button ── */
  pbtn.addEventListener('click',()=>{
    const id=getId(uin.value);
    if(!id){toast('⚠️ Paste a valid YouTube URL or video ID');return;}
    play(id);
    uin.value='';
    toast('▶ Loading…');
  });
  uin.addEventListener('keydown',e=>{if(e.key==='Enter')pbtn.click();});

  /* ── search — opens YouTube in new tab ── */
  sbtn.addEventListener('click',()=>{
    const q=sq.value.trim();
    const url=q?`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`:'https://www.youtube.com';
    window.open(url,'_blank');
    toast('YouTube opened! Copy a video URL and paste it here ↓');
  });
  sq.addEventListener('keydown',e=>{if(e.key==='Enter')sbtn.click();});
</script>
</body>
</html>
