<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Kyan Browser - Private Proxy Edition</title>
<style>
:root {
  --bg: #050505;
  --panel: #111111;
  --accent: #e50914; /* Netflix Red */
  --poxel: #00e5b0; /* Poxel Teal */
  --txt: #ffffff;
  --border: #222222;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body, html { 
    height: 100dvh; 
    background: var(--bg); 
    color: var(--txt); 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* TOP NAVIGATION */
#nav-bar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    z-index: 100;
}

#address-field {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 25px;
    padding: 10px 20px;
    color: #fff;
    outline: none;
    font-size: 14px;
    transition: border-color 0.3s;
}

#address-field:focus { border-color: var(--poxel); }

.control-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* VIEWPORT ENGINE */
#browser-engine {
    flex: 1;
    position: relative;
    background: #000;
}

iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #000;
    display: none;
    /* Hardware acceleration for Poxel WebGL */
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
}

iframe.active { display: block; }

/* HOME / START PAGE */
#home-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: radial-gradient(circle at center, #111 0%, #050505 100%);
}

.logo {
    font-size: 60px;
    font-weight: 900;
    letter-spacing: -3px;
    margin-bottom: 40px;
    background: linear-gradient(to right, var(--accent), var(--poxel));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.proxy-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 90%;
    max-width: 500px;
}

.card {
    background: #151515;
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 30px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
}

.card:active { transform: scale(0.95); }
.card.netflix { border-color: var(--accent); }
.card.poxel { border-color: var(--poxel); }

.card i { font-size: 40px; display: block; margin-bottom: 10px; }
.card span { font-weight: bold; font-size: 16px; }

#loader {
    position: absolute;
    bottom: 40px;
    font-size: 12px;
    color: #444;
    display: none;
}
</style>
</head>
<body>

<div id="nav-bar">
    <button class="control-btn" onclick="exitProxy()">⌂</button>
    <input id="address-field" type="text" placeholder="Proxy restricted to Netflix & Poxel..." readonly />
    <button class="control-btn" onclick="location.reload()">↻</button>
</div>

<div id="browser-engine">
    <div id="home-screen">
        <div class="logo">KYAN</div>
        <div class="proxy-cards">
            <div class="card netflix" onclick="launchProxy('https://netflix.com')">
                <i>🎬</i>
                <span>Netflix Proxy</span>
            </div>
            <div class="card poxel" onclick="launchProxy('https://poxel.io')">
                <i>🎮</i>
                <span>Poxel Game Mode</span>
            </div>
        </div>
        <div id="loader">Injecting Proxy...</div>
    </div>
    <iframe id="viewport" allow="autoplay; fullscreen; gamepad; encrypted-media;"></iframe>
</div>

<script>
const viewport = document.getElementById('viewport');
const home = document.getElementById('home-screen');
const addressBar = document.getElementById('address-field');
const loader = document.getElementById('loader');

async function launchProxy(target) {
    loader.style.display = 'block';
    addressBar.value = "Proxying: " + target;

    // The AllOrigins Proxy allows us to bypass "X-Frame-Options" 
    // which usually causes the black screen on Netflix/Poxel
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`;

    try {
        const response = await fetch(proxyUrl);
        const html = await response.text();

        // THE SECRET SAUCE: 
        // We inject a <base> tag into the site's code so it can find its assets (CSS/JS)
        // while running inside our custom Blob environment.
        const enhancedHtml = `
            <html>
                <head>
                    <base href="${target}">
                    <style>body{background:#000;}</style>
                </head>
                <body>${html}</body>
            </html>
        `;

        const blob = new Blob([enhancedHtml], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);

        viewport.src = blobUrl;
        
        // Final UI cleanup
        setTimeout(() => {
            home.style.display = 'none';
            viewport.classList.add('active');
            loader.style.display = 'none';
        }, 800);

    } catch (err) {
        alert("Proxy Error: This device is blocking the connection.");
        exitProxy();
    }
}

function exitProxy() {
    viewport.src = "about:blank";
    viewport.classList.remove('active');
    home.style.display = 'flex';
    addressBar.value = "";
}

// Optimization for phone landscape/portrait shifts
window.addEventListener('resize', () => {
    if(viewport.classList.contains('active')) {
        viewport.style.height = '100dvh';
    }
});
</script>
</body>
</html>
