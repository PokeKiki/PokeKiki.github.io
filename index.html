<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gesture Controller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.25);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --green: #4ade80;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overscroll-behavior: none; }

  body { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; min-height: 100vh; }

  header {
    width: 100%; max-width: 420px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  header h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
  header h1 span { color: var(--accent); }
  .tag { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; color: var(--muted); letter-spacing: .05em; }

  .feedback {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color .2s;
    min-height: 48px;
  }
  .feedback.lit { border-color: var(--accent); }
  .feedback .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
    transition: background .2s;
  }
  .feedback.lit .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .feedback span { font-size: 13px; color: var(--muted); transition: color .2s; }
  .feedback.lit span { color: var(--text); }

  .section { width: 100%; max-width: 420px; }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }

  /* D-PAD */
  .dpad-wrap { display: flex; justify-content: center; }
  .dpad { display: grid; grid-template-columns: repeat(3, 76px); grid-template-rows: repeat(3, 76px); gap: 6px; }
  .dpad-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px; color: var(--muted);
    transition: background .1s, border-color .1s, transform .08s, color .1s;
    -webkit-appearance: none;
  }
  .dpad-btn:active, .dpad-btn.flash {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(0.92);
  }
  .dpad-center { background: var(--surface2) !important; cursor: default; }
  .dpad-empty { visibility: hidden; }

  /* BUTTON GRIDS */
  .btn-grid { display: grid; gap: 8px; }
  .btn-grid.g2 { grid-template-columns: 1fr 1fr; }
  .btn-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
  .btn-grid.g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  .gbtn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px 4px 10px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    -webkit-appearance: none;
    transition: background .1s, border-color .1s, transform .08s;
    color: var(--muted);
  }
  .gbtn:active, .gbtn.flash {
    background: var(--surface2);
    border-color: var(--accent2);
    transform: scale(0.93);
    color: var(--accent2);
  }
  .gbtn .ico { font-size: 20px; }
  .gbtn .lbl { font-size: 10px; letter-spacing: .02em; }

  /* TARGET URL */
  .url-row {
    width: 100%; max-width: 420px;
    display: flex; gap: 8px; align-items: center;
  }
  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    transition: border-color .2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }
  .go-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--r);
    padding: 10px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .go-btn:active { opacity: 0.8; transform: scale(0.96); }

  /* IFRAME */
  .frame-wrap {
    width: 100%; max-width: 420px;
    border-radius: var(--r);
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
  }
  .frame-wrap.visible { display: block; }
  #target-frame { width: 100%; height: 300px; border: none; display: block; background: white; }

  hr { width: 100%; max-width: 420px; border: none; border-top: 1px solid var(--border); }

  footer { font-size: 10px; color: #333; padding: 8px 0; }

  /* Inline SVG icons since no CDN */
  .ico-up::before    { content: '↑'; font-size: 20px; }
  .ico-down::before  { content: '↓'; font-size: 20px; }
  .ico-left::before  { content: '←'; font-size: 20px; }
  .ico-right::before { content: '→'; font-size: 20px; }
  .ico-center::before { content: '✦'; font-size: 14px; }
  .ico-nw::before    { content: '↖'; }
  .ico-ne::before    { content: '↗'; }
  .ico-sw::before    { content: '↙'; }
  .ico-se::before    { content: '↘'; }
  .ico-zin::before   { content: '⊕'; }
  .ico-zout::before  { content: '⊖'; }
  .ico-rcw::before   { content: '↻'; }
  .ico-rccw::before  { content: '↺'; }
  .ico-hold::before  { content: '✋'; }
  .ico-tap2::before  { content: '👆'; }
  .ico-shake::before { content: '〜'; }
</style>
</head>
<body>

<header>
  <h1>Gesture<span>Ctrl</span></h1>
  <span class="tag">iPad · Safari · Chrome</span>
</header>

<div class="feedback" id="fb">
  <div class="dot"></div>
  <span id="fb-text">En attente d'un geste…</span>
</div>

<!-- URL TARGET -->
<div class="section">
  <div class="section-label">Page cible (optionnel)</div>
  <div class="url-row">
    <input class="url-input" id="url-in" type="url" placeholder="https://exemple.com" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="go-btn" onclick="loadFrame()">Charger</button>
  </div>
</div>

<div class="frame-wrap" id="frame-wrap">
  <iframe id="target-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<hr>

<!-- D-PAD -->
<div class="section">
  <div class="section-label">Glissements directionnels</div>
  <div class="dpad-wrap">
    <div class="dpad">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="g-up"    onclick="fire('up','↑ Glissement vers le haut')"><span class="ico-up"></span></button>
      <div class="dpad-empty"></div>

      <button class="dpad-btn" id="g-left"  onclick="fire('left','← Glissement vers la gauche')"><span class="ico-left"></span></button>
      <div class="dpad-btn dpad-center"><span class="ico-center"></span></div>
      <button class="dpad-btn" id="g-right" onclick="fire('right','→ Glissement vers la droite')"><span class="ico-right"></span></button>

      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="g-down"  onclick="fire('down','↓ Glissement vers le bas')"><span class="ico-down"></span></button>
      <div class="dpad-empty"></div>
    </div>
  </div>
</div>

<!-- DIAGONALS -->
<div class="section">
  <div class="section-label">Diagonales</div>
  <div class="btn-grid g4">
    <button class="gbtn" onclick="fire('nw','↖ Diagonale haut-gauche')"><span class="ico ico-nw"></span><span class="lbl">↖</span></button>
    <button class="gbtn" onclick="fire('ne','↗ Diagonale haut-droite')"><span class="ico ico-ne"></span><span class="lbl">↗</span></button>
    <button class="gbtn" onclick="fire('sw','↙ Diagonale bas-gauche')"><span class="ico ico-sw"></span><span class="lbl">↙</span></button>
    <button class="gbtn" onclick="fire('se','↘ Diagonale bas-droite')"><span class="ico ico-se"></span><span class="lbl">↘</span></button>
  </div>
</div>

<!-- ZOOM / ROTATE -->
<div class="section">
  <div class="section-label">Zoom &amp; Rotation (pinch simulé)</div>
  <div class="btn-grid g2">
    <button class="gbtn" onclick="fire('zin','⊕ Zoom avant (pinch out)')"><span class="ico ico-zin"></span><span class="lbl">Zoom avant</span></button>
    <button class="gbtn" onclick="fire('zout','⊖ Zoom arrière (pinch in)')"><span class="ico ico-zout"></span><span class="lbl">Zoom arrière</span></button>
    <button class="gbtn" onclick="fire('rcw','↻ Rotation horaire')"><span class="ico ico-rcw"></span><span class="lbl">Rot. ↻</span></button>
    <button class="gbtn" onclick="fire('rccw','↺ Rotation anti-horaire')"><span class="ico ico-rccw"></span><span class="lbl">Rot. ↺</span></button>
  </div>
</div>

<!-- SPECIAL -->
<div class="section">
  <div class="section-label">Actions spéciales</div>
  <div class="btn-grid g3">
    <button class="gbtn" onclick="fire('hold','✋ Appui long')"><span class="ico ico-hold"></span><span class="lbl">Maintenir</span></button>
    <button class="gbtn" onclick="fire('tap2','👆 Double tap')"><span class="ico ico-tap2"></span><span class="lbl">Double tap</span></button>
    <button class="gbtn" onclick="fire('shake','〜 Secouer')"><span class="ico ico-shake"></span><span class="lbl">Secouer</span></button>
  </div>
</div>

<footer>GestureCtrl — fonctionne hors-ligne · pas d'installation</footer>

<script>
let fbTimer;

function show(msg, ok) {
  const fb = document.getElementById('fb');
  const txt = document.getElementById('fb-text');
  txt.textContent = msg;
  fb.classList.toggle('lit', ok);
  clearTimeout(fbTimer);
  fbTimer = setTimeout(() => {
    txt.textContent = 'En attente d\'un geste…';
    fb.classList.remove('lit');
  }, 1800);
}

function flash(el) {
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 220);
}

function fire(id, label) {
  show(label, true);
  const btn = document.getElementById('g-' + id);
  flash(btn);

  const vectors = {
    up:    [0, -1], down:  [0, 1],
    left:  [-1, 0], right: [1, 0],
    nw: [-1,-1], ne: [1,-1], sw: [-1,1], se: [1,1]
  };

  const frameEl = document.getElementById('target-frame');
  const frameVisible = document.getElementById('frame-wrap').classList.contains('visible');
  const target = frameVisible ? frameEl : null;

  if (vectors[id]) {
    const [dx, dy] = vectors[id];
    const dist = 120;
    doSwipe(dx * dist, dy * dist, target);
    return;
  }

  if (id === 'hold') { doLongPress(target); return; }
  if (id === 'tap2') { doDoubleTap(target); return; }
  if (id === 'shake') { doShake(); return; }
  if (id === 'zin')  { doPinch(true, target); return; }
  if (id === 'zout') { doPinch(false, target); return; }
  if (id === 'rcw')  { doRotate(true, target); return; }
  if (id === 'rccw') { doRotate(false, target); return; }
}

function getCenter(target) {
  if (target && target.getBoundingClientRect) {
    const r = target.getBoundingClientRect();
    return [r.left + r.width / 2, r.top + r.height / 2];
  }
  return [window.innerWidth / 2, window.innerHeight / 2];
}

function mkTouch(id, el, x, y) {
  return new Touch({ identifier: id, target: el, clientX: x, clientY: y, screenX: x, screenY: y, pageX: x, pageY: y, radiusX: 1, radiusY: 1, rotationAngle: 0, force: 1 });
}

function dispatchTouchEvent(el, type, touches, changedTouches) {
  try {
    el.dispatchEvent(new TouchEvent(type, {
      touches, changedTouches, bubbles: true, cancelable: true, view: window
    }));
  } catch(e) {}
}

function doSwipe(dx, dy, frameEl) {
  const [cx, cy] = getCenter(frameEl);
  const el = document.elementFromPoint(cx, cy) || document.body;
  const steps = 10;
  let i = 0;
  const t = mkTouch(1, el, cx, cy);
  dispatchTouchEvent(el, 'touchstart', [t], [t]);
  const iv = setInterval(() => {
    i++;
    const px = cx + dx * (i / steps);
    const py = cy + dy * (i / steps);
    const tm = mkTouch(1, el, px, py);
    dispatchTouchEvent(el, 'touchmove', [tm], [tm]);
    if (i >= steps) {
      clearInterval(iv);
      const te = mkTouch(1, el, cx + dx, cy + dy);
      dispatchTouchEvent(el, 'touchend', [], [te]);
    }
  }, 16);
}

function doLongPress(frameEl) {
  const [cx, cy] = getCenter(frameEl);
  const el = document.elementFromPoint(cx, cy) || document.body;
  const t = mkTouch(1, el, cx, cy);
  dispatchTouchEvent(el, 'touchstart', [t], [t]);
  setTimeout(() => { dispatchTouchEvent(el, 'touchend', [], [t]); }, 800);
}

function doDoubleTap(frameEl) {
  const [cx, cy] = getCenter(frameEl);
  const el = document.elementFromPoint(cx, cy) || document.body;
  function singleTap() {
    const t = mkTouch(1, el, cx, cy);
    dispatchTouchEvent(el, 'touchstart', [t], [t]);
    setTimeout(() => dispatchTouchEvent(el, 'touchend', [], [t]), 60);
  }
  singleTap();
  setTimeout(singleTap, 150);
}

function doShake() {
  if (window.DeviceMotionEvent) {
    show('Secouer simulé (DeviceMotion)', true);
  }
  document.body.style.transition = 'transform .05s';
  let s = 0;
  const sh = setInterval(() => {
    document.body.style.transform = `translateX(${s % 2 === 0 ? 6 : -6}px)`;
    s++;
    if (s > 6) {
      clearInterval(sh);
      document.body.style.transform = '';
    }
  }, 50);
}

function doPinch(zoomIn, frameEl) {
  const [cx, cy] = getCenter(frameEl);
  const el = document.elementFromPoint(cx, cy) || document.body;
  const d = zoomIn ? 80 : -80;
  const steps = 8;
  let i = 0;
  const t1 = mkTouch(1, el, cx - 40, cy);
  const t2 = mkTouch(2, el, cx + 40, cy);
  dispatchTouchEvent(el, 'touchstart', [t1, t2], [t1, t2]);
  const iv = setInterval(() => {
    i++;
    const spread = 40 + d * (i / steps);
    const a = mkTouch(1, el, cx - spread, cy);
    const b = mkTouch(2, el, cx + spread, cy);
    dispatchTouchEvent(el, 'touchmove', [a, b], [a, b]);
    if (i >= steps) {
      clearInterval(iv);
      dispatchTouchEvent(el, 'touchend', [], [a, b]);
    }
  }, 20);
}

function doRotate(clockwise, frameEl) {
  const [cx, cy] = getCenter(frameEl);
  const el = document.elementFromPoint(cx, cy) || document.body;
  const steps = 12;
  const r = 50;
  let i = 0;
  const dir = clockwise ? 1 : -1;
  const t1 = mkTouch(1, el, cx + r, cy);
  const t2 = mkTouch(2, el, cx - r, cy);
  dispatchTouchEvent(el, 'touchstart', [t1, t2], [t1, t2]);
  const iv = setInterval(() => {
    i++;
    const angle = (Math.PI * dir * i) / steps;
    const a = mkTouch(1, el, cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    const b = mkTouch(2, el, cx - r * Math.cos(angle), cy - r * Math.sin(angle));
    dispatchTouchEvent(el, 'touchmove', [a, b], [a, b]);
    if (i >= steps) {
      clearInterval(iv);
      dispatchTouchEvent(el, 'touchend', [], [a, b]);
    }
  }, 20);
}

function loadFrame() {
  let url = document.getElementById('url-in').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  const wrap = document.getElementById('frame-wrap');
  const frame = document.getElementById('target-frame');
  frame.src = url;
  wrap.classList.add('visible');
  show('Page chargée : ' + url, true);
}
</script>
</body>
</html>
