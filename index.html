<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Subway Surfers 🛹</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
}

#game-frame {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #1a0a2e 0%, #0d1b3e 50%, #0a2a1a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
  transition: opacity .5s;
}
#splash.hidden { opacity: 0; pointer-events: none; }

.splash-emoji { font-size: 64px; animation: bounce 1s infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }

.splash-title {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -1px;
  text-shadow: 0 0 30px rgba(255,180,0,0.5);
}
.splash-title span { color: #ffb400; }

.splash-sub { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: .05em; }

.play-btn {
  margin-top: 8px;
  background: #ffb400;
  color: #000;
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: -.3px;
  box-shadow: 0 4px 24px rgba(255,180,0,0.4);
  animation: pulse 1.8s infinite;
  -webkit-appearance: none;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 24px rgba(255,180,0,0.4); }
  50% { box-shadow: 0 4px 40px rgba(255,180,0,0.75); }
}
.play-btn:active { transform: scale(0.95); }

.hint {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  line-height: 1.6;
  max-width: 260px;
}

/* ── D-PAD OVERLAY ── */
#dpad {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: none;
  touch-action: none;
  user-select: none;
}

#dpad.visible { display: block; }

.dpad-inner {
  display: grid;
  grid-template-columns: repeat(3, 72px);
  grid-template-rows: repeat(3, 72px);
  gap: 5px;
  cursor: grab;
}
.dpad-inner.dragging { cursor: grabbing; }

.db {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  -webkit-appearance: none;
  touch-action: manipulation;
  transition: transform .06s, background .08s, border-color .08s;
  color: rgba(255,255,255,0.8);
}

.db .arrow { font-size: 22px; line-height: 1; }
.db .hint-lbl { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: .04em; }

/* Direction-specific accent colors */
#btn-up    { border-color: rgba(100,220,100,0.3); }
#btn-down  { border-color: rgba(255,100,100,0.3); }
#btn-left  { border-color: rgba(100,180,255,0.3); }
#btn-right { border-color: rgba(100,180,255,0.3); }

#btn-up:active,    #btn-up.flash    { background: rgba(80,200,80,0.4);  border-color: rgba(100,255,100,0.8); transform: scale(0.88); }
#btn-down:active,  #btn-down.flash  { background: rgba(220,60,60,0.4);  border-color: rgba(255,100,100,0.8); transform: scale(0.88); }
#btn-left:active,  #btn-left.flash  { background: rgba(60,140,255,0.4); border-color: rgba(100,180,255,0.8); transform: scale(0.88); }
#btn-right:active, #btn-right.flash { background: rgba(60,140,255,0.4); border-color: rgba(100,180,255,0.8); transform: scale(0.88); }

.db-empty { visibility: hidden; }

.db-center {
  background: rgba(255,255,255,0.04) !important;
  border-color: rgba(255,255,255,0.06) !important;
  cursor: grab;
  font-size: 16px;
  color: rgba(255,255,255,0.15) !important;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 998;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
#topbar.visible { display: flex; }
#topbar .title { font-size: 13px; font-weight: 700; color: #ffb400; letter-spacing: -.3px; }
#topbar .btns { display: flex; gap: 8px; }
#topbar button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  padding: 5px 10px;
  cursor: pointer;
  -webkit-appearance: none;
}
#topbar button:active { background: rgba(255,255,255,0.18); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 12px;
  color: #fff;
  z-index: 1000;
  opacity: 0;
  transition: opacity .15s, transform .15s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-emoji">🛹</div>
  <div class="splash-title">Subway <span>Surfers</span></div>
  <div class="splash-sub">avec D-Pad intégré</div>
  <button class="play-btn" onclick="startGame()">▶ Jouer</button>
  <div class="hint">Le D-Pad apparaît automatiquement.<br>Glisse-le où tu veux sur l'écran.</div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="title">🛹 Subway Surfers</span>
  <div class="btns">
    <button onclick="toggleDpad()">🕹 D-Pad</button>
    <button onclick="goHome()">⟵ Menu</button>
  </div>
</div>

<!-- GAME IFRAME -->
<iframe id="game-frame"
  src="about:blank"
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>

<!-- D-PAD -->
<div id="dpad">
  <div class="dpad-inner" id="dpad-inner">
    <div class="db-empty"></div>
    <button class="db" id="btn-up"
      ontouchstart="pressKey('ArrowUp','↑ Sauter')"
      onclick="pressKey('ArrowUp','↑ Sauter')">
      <span class="arrow">↑</span>
      <span class="hint-lbl">SAUTER</span>
    </button>
    <div class="db-empty"></div>

    <button class="db" id="btn-left"
      ontouchstart="pressKey('ArrowLeft','← Gauche')"
      onclick="pressKey('ArrowLeft','← Gauche')">
      <span class="arrow">←</span>
      <span class="hint-lbl">GAUCHE</span>
    </button>
    <div class="db db-center" id="dpad-handle">✦</div>
    <button class="db" id="btn-right"
      ontouchstart="pressKey('ArrowRight','→ Droite')"
      onclick="pressKey('ArrowRight','→ Droite')">
      <span class="arrow">→</span>
      <span class="hint-lbl">DROITE</span>
    </button>

    <div class="db-empty"></div>
    <button class="db" id="btn-down"
      ontouchstart="pressKey('ArrowDown','↓ Glisser')"
      onclick="pressKey('ArrowDown','↓ Glisser')">
      <span class="arrow">↓</span>
      <span class="hint-lbl">GLISSER</span>
    </button>
    <div class="db-empty"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const GAME_URL = 'https://yell0wsuit.page/assets/games/subway-surfers/index.html?theme=1106-bali#google_vignette';

function startGame() {
  document.getElementById('game-frame').src = GAME_URL;
  const splash = document.getElementById('splash');
  splash.classList.add('hidden');
  setTimeout(() => { splash.style.display = 'none'; }, 500);
  document.getElementById('dpad').classList.add('visible');
  document.getElementById('topbar').classList.add('visible');
}

function goHome() {
  document.getElementById('game-frame').src = 'about:blank';
  document.getElementById('splash').style.display = '';
  requestAnimationFrame(() => document.getElementById('splash').classList.remove('hidden'));
  document.getElementById('dpad').classList.remove('visible');
  document.getElementById('topbar').classList.remove('visible');
}

function toggleDpad() {
  document.getElementById('dpad').classList.toggle('visible');
}

/* ── KEY DISPATCH ── */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 700);
}

const KC = { ArrowUp:38, ArrowDown:40, ArrowLeft:37, ArrowRight:39, Enter:13, Escape:27, ' ':32 };

function pressKey(key, label) {
  toast(label);
  const btnMap = { ArrowUp:'btn-up', ArrowDown:'btn-down', ArrowLeft:'btn-left', ArrowRight:'btn-right' };
  const el = document.getElementById(btnMap[key]);
  if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 180); }

  // 1) Send to iframe contentWindow if accessible (same-origin would work)
  const frame = document.getElementById('game-frame');
  let sent = false;
  try {
    const fw = frame.contentWindow;
    if (fw) {
      ['keydown','keyup'].forEach(type => {
        fw.document.dispatchEvent(new KeyboardEvent(type, {
          key, code: key, keyCode: KC[key]||0, which: KC[key]||0,
          bubbles: true, cancelable: true
        }));
        fw.dispatchEvent(new KeyboardEvent(type, {
          key, code: key, keyCode: KC[key]||0, which: KC[key]||0,
          bubbles: true, cancelable: true
        }));
      });
      sent = true;
    }
  } catch(e) { /* cross-origin — fallback */ }

  // 2) Swipe simulation on the iframe element itself
  sendSwipeOnFrame(frame, key);

  // 3) Also dispatch on current window (focus hack)
  ['keydown','keyup'].forEach(type => {
    window.dispatchEvent(new KeyboardEvent(type, {
      key, code: key, keyCode: KC[key]||0, which: KC[key]||0,
      bubbles: true, cancelable: true
    }));
    document.dispatchEvent(new KeyboardEvent(type, {
      key, code: key, keyCode: KC[key]||0, which: KC[key]||0,
      bubbles: true, cancelable: true
    }));
  });

  // 4) Click iframe to ensure it has focus, then re-send
  frame.focus();
  frame.click();
}

function sendSwipeOnFrame(frame, key) {
  const r = frame.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height / 2;
  const vecs = { ArrowUp:[0,-120], ArrowDown:[0,120], ArrowLeft:[-120,0], ArrowRight:[120,0] };
  if (!vecs[key]) return;
  const [dx, dy] = vecs[key];
  const steps = 10; let i = 0;
  function mk(id, x, y) {
    return new Touch({ identifier: id, target: frame, clientX: x, clientY: y,
      screenX: x, screenY: y, pageX: x, pageY: y, radiusX:2, radiusY:2, rotationAngle:0, force:1 });
  }
  function fe(type, tl, cl) {
    try { frame.dispatchEvent(new TouchEvent(type, { touches:tl, changedTouches:cl, bubbles:true, cancelable:true })); } catch(e) {}
  }
  const t0 = mk(7, cx, cy); fe('touchstart',[t0],[t0]);
  const iv = setInterval(() => {
    i++;
    const tm = mk(7, cx+dx*(i/steps), cy+dy*(i/steps));
    fe('touchmove',[tm],[tm]);
    if (i >= steps) {
      clearInterval(iv);
      const te = mk(7, cx+dx, cy+dy); fe('touchend',[],[te]);
    }
  }, 12);
}

/* ── DRAG D-PAD ── */
const dpad = document.getElementById('dpad');
const handle = document.getElementById('dpad-handle');
const inner = document.getElementById('dpad-inner');
let drag = false, sx, sy, ox, oy;

function getXY() {
  const s = dpad.style;
  const x = s.left ? parseInt(s.left) : (window.innerWidth/2 - dpad.offsetWidth/2);
  const y = s.bottom ? (window.innerHeight - dpad.offsetHeight - parseInt(s.bottom))
                     : (window.innerHeight - dpad.offsetHeight - 24);
  return [x, y];
}

handle.addEventListener('pointerdown', e => {
  drag = true; inner.classList.add('dragging');
  handle.setPointerCapture(e.pointerId);
  [ox, oy] = getXY(); sx = e.clientX; sy = e.clientY;
  dpad.style.bottom = ''; dpad.style.transform = 'none';
  dpad.style.left = ox + 'px'; dpad.style.top = oy + 'px';
});
handle.addEventListener('pointermove', e => {
  if (!drag) return;
  const nx = Math.max(0, Math.min(window.innerWidth  - dpad.offsetWidth,  ox + (e.clientX - sx)));
  const ny = Math.max(0, Math.min(window.innerHeight - dpad.offsetHeight, oy + (e.clientY - sy)));
  dpad.style.left = nx + 'px'; dpad.style.top = ny + 'px';
});
handle.addEventListener('pointerup',     () => { drag = false; inner.classList.remove('dragging'); });
handle.addEventListener('pointercancel', () => { drag = false; inner.classList.remove('dragging'); });

/* ── KEYBOARD PASSTHROUGH (physical keyboard on iPad) ── */
document.addEventListener('keydown', e => {
  const frame = document.getElementById('game-frame');
  try { frame.contentWindow.document.dispatchEvent(new KeyboardEvent('keydown', { key: e.key, code: e.code, keyCode: e.keyCode, bubbles: true, cancelable: true })); } catch(_) {}
});
</script>
</body>
</html>
