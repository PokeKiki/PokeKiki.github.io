<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Screen Share</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #007aff; }
        video {
            width: 100%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: background 0.2s;
        }
        .btn:hover { background: #0056b3; }
        .btn-receive { background: #34c759; }
        .btn-receive:hover { background: #248a3d; }
        #status { margin: 15px; color: #aaa; font-style: italic; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
</head>
<body>

    <h1>Cross-Device Screen Share</h1>
    <p>Open this exact page on both your Phone and iPad.</p>
    
    <div id="controls">
        <button class="btn" onclick="startBroadcasting()">📱 Share Phone Screen</button>
        <button class="btn btn-receive" onclick="startReceiving()">🍏 View on iPad</button>
    </div>

    <div id="status">Status: Waiting for action...</div>

    <video id="remoteVideo" autoplay playsinline controls></video>

    <script>
        const statusDiv = document.getElementById('status');
        const remoteVideo = document.getElementById('remoteVideo');
        
        // Configuration for WebRTC and Signaling
        const ROOM_ID = "unique_room_123456"; // Change this to a random string if sharing publicly
        const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        
        let peerConnection;
        let mqttClient;
        let localStream;

        // Initialize connection to public MQTT broker for signaling
        function initSignaling(onMessageCallback) {
            statusDiv.innerText = "Connecting to signaling server...";
            mqttClient = new Paho.MQTT.Client("broker.hivemq.com", Number(8000), "client_" + Math.random().toString(36).substring(7));
            
            mqttClient.onMessageArrived = (message) => {
                const data = JSON.parse(message.payloadString);
                onMessageCallback(data);
            };

            mqttClient.connect({
                onSuccess: () => {
                    mqttClient.subscribe(ROOM_ID);
                    statusDiv.innerText = "Connected! Ready to link devices.";
                },
                useSSL: false // Use true if hosting on a strict HTTPS site that blocks mixed content
            });
        }

        function sendSignal(payload) {
            const message = new Paho.MQTT.Message(JSON.stringify(payload));
            message.destinationName = ROOM_ID;
            mqttClient.send(message);
        }

        // --- SENDER CODE (Your Phone) ---
        async function startBroadcasting() {
            initSignaling(async (data) => {
                if (data.answer) {
                    statusDiv.innerText = "iPad connected! Broadcasting...";
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                } else if (data.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            try {
                // Request screen capture
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                remoteVideo.srcObject = localStream; // Show preview locally
            } catch (err) {
                statusDiv.innerText = "Error capturing screen: " + err.message;
                return;
            }

            peerConnection = new RTCPeerConnection(iceServers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) sendSignal({ candidate: event.candidate });
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            sendSignal({ offer: offer });
            statusDiv.innerText = "Waiting for iPad to join...";
        }

        // --- RECEIVER CODE (Your iPad) ---
        function startReceiving() {
            initSignaling(async (data) => {
                if (data.offer) {
                    statusDiv.innerText = "Receiving stream from phone...";
                    peerConnection = new RTCPeerConnection(iceServers);

                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate) sendSignal({ candidate: event.candidate });
                    };

                    peerConnection.ontrack = (event) => {
                        remoteVideo.srcObject = event.streams[0];
                    };

                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    sendSignal({ answer: answer });
                } else if (data.candidate && peerConnection) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });
        }
    </script>
</body>
</html>
