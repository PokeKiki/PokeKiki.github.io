<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Subway Surfers Keys</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none;
    overflow: hidden;
    font-family: -apple-system, sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,140,0,0.08) 0%, transparent 70%),
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: auto, 44px 44px, 44px 44px;
    pointer-events: none;
  }

  #pad {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(18,18,18,0.97);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 20px;
    width: 280px;
    touch-action: none;
    user-select: none;
    box-shadow: 0 32px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.07);
    transition: box-shadow 0.15s;
  }

  #pad.dragging {
    box-shadow: 0 52px 80px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    cursor: grab;
  }

  #pad.dragging .pad-header { cursor: grabbing; }

  .pad-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,140,0,0.7);
  }

  .dots {
    display: grid;
    grid-template-columns: repeat(3, 5px);
    grid-template-rows: repeat(2, 5px);
    gap: 3px;
    cursor: grab;
  }
  .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }

  .key-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .key {
    -webkit-appearance: none;
    appearance: none;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-family: inherit;
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.08s, transform 0.08s, border-color 0.08s;
    position: relative;
    overflow: hidden;
  }

  .key::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(circle at center, rgba(255,140,0,0.3) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .key:active, .key.pressed {
    background: rgba(255,140,0,0.18);
    border-color: rgba(255,140,0,0.5);
    transform: scale(0.88);
  }

  .key:active::after, .key.pressed::after {
    opacity: 1;
  }

  .key.empty {
    background: transparent;
    border-color: transparent;
    pointer-events: none;
  }

  .key svg {
    width: 36px;
    height: 36px;
    stroke: rgba(255,255,255,0.85);
    stroke-width: 2.2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
    transition: stroke 0.08s;
  }

  .key:active svg, .key.pressed svg {
    stroke: #ff8c00;
  }

  .key-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    transition: color 0.08s;
    line-height: 1;
  }

  .key:active .key-label, .key.pressed .key-label {
    color: rgba(255,140,0,0.8);
  }

  /* Special up/down bigger emphasis */
  #btn-up { border-color: rgba(255,140,0,0.2); }
  #btn-down { border-color: rgba(100,180,255,0.2); }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 18px 0;
  }

  .feedback {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    text-align: center;
    text-transform: uppercase;
    height: 16px;
    transition: color 0.2s;
  }

  .feedback.active { color: rgba(255,140,0,0.7); }

  .tip {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }

  .tip strong { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div id="pad">
  <div class="pad-header" id="drag-handle">
    <span class="pad-title">⚡ Subway Keys</span>
    <div class="dots">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="key-grid">
    <!-- Row 1 -->
    <div class="key empty"></div>
    <button class="key" id="btn-up" data-key="ArrowUp" aria-label="Jump">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      <span class="key-label">Jump</span>
    </button>
    <div class="key empty"></div>

    <!-- Row 2 -->
    <button class="key" id="btn-left" data-key="ArrowLeft" aria-label="Left">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      <span class="key-label">Left</span>
    </button>
    <div class="key empty"></div>
    <button class="key" id="btn-right" data-key="ArrowRight" aria-label="Right">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="key-label">Right</span>
    </button>

    <!-- Row 3 -->
    <div class="key empty"></div>
    <button class="key" id="btn-down" data-key="ArrowDown" aria-label="Roll">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="key-label">Roll</span>
    </button>
    <div class="key empty"></div>
  </div>

  <div class="divider"></div>
  <div class="feedback" id="feedback">ready</div>
</div>

<div class="tip">Drag pad anywhere &nbsp;·&nbsp; <strong>Slide Over</strong> to float over Subway Surfers</div>

<script>
  const pad = document.getElementById('pad');
  const feedback = document.getElementById('feedback');
  const handle = document.getElementById('drag-handle');
  let feedbackTimer;

  // ── Drag ──────────────────────────────────────────────
  let dragging = false, ox = 0, oy = 0;

  function getXY(e) {
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX, y: src.clientY };
  }

  function startDrag(e) {
    dragging = true;
    pad.classList.add('dragging');
    const { x, y } = getXY(e);
    const r = pad.getBoundingClientRect();
    ox = x - r.left;
    oy = y - r.top;
    pad.style.transform = 'none';
    pad.style.left = r.left + 'px';
    pad.style.top  = r.top  + 'px';
    e.preventDefault();
  }

  handle.addEventListener('mousedown',  startDrag);
  handle.addEventListener('touchstart', startDrag, { passive: false });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    move(getXY(e));
  });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    move(getXY(e));
  }, { passive: false });

  function move({ x, y }) {
    const vw = window.innerWidth, vh = window.innerHeight;
    const w = pad.offsetWidth,   h  = pad.offsetHeight;
    pad.style.left = Math.max(0, Math.min(x - ox, vw - w)) + 'px';
    pad.style.top  = Math.max(0, Math.min(y - oy, vh - h)) + 'px';
  }

  document.addEventListener('mouseup',  () => { dragging = false; pad.classList.remove('dragging'); });
  document.addEventListener('touchend', () => { dragging = false; pad.classList.remove('dragging'); });

  // ── Key press ─────────────────────────────────────────
  const labels = {
    ArrowUp:    '↑  JUMP',
    ArrowDown:  '↓  ROLL',
    ArrowLeft:  '←  LEFT',
    ArrowRight: '→  RIGHT'
  };

  document.querySelectorAll('.key[data-key]').forEach(btn => {
    // prevent drag from firing on buttons
    btn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    btn.addEventListener('mousedown',  e => e.stopPropagation());

    function fire() {
      const key = btn.dataset.key;

      // Visual feedback
      feedback.textContent = labels[key] || key;
      feedback.classList.add('active');
      clearTimeout(feedbackTimer);
      feedbackTimer = setTimeout(() => {
        feedback.textContent = 'ready';
        feedback.classList.remove('active');
      }, 600);

      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 140);

      // Fire keydown + keyup to the document (works in same-origin context)
      const opts = { key, code: key, keyCode: keyCode(key), which: keyCode(key), bubbles: true, cancelable: true };
      try {
        document.dispatchEvent(new KeyboardEvent('keydown', opts));
        setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', opts)), 80);
      } catch(e) {}

      // Also try firing on window and body for maximum compatibility
      try {
        window.dispatchEvent(new KeyboardEvent('keydown', opts));
        window.dispatchEvent(new KeyboardEvent('keyup',   opts));
      } catch(e) {}
    }

    btn.addEventListener('touchstart', fire, { passive: true });
    btn.addEventListener('click', fire);
  });

  function keyCode(key) {
    return { ArrowUp: 38, ArrowDown: 40, ArrowLeft: 37, ArrowRight: 39 }[key] || 0;
  }

  // ── Physical keyboard also works ──────────────────────
  document.addEventListener('keydown', e => {
    const btn = document.querySelector(`.key[data-key="${e.key}"]`);
    if (btn) { btn.classList.add('pressed'); feedback.textContent = labels[e.key]; feedback.classList.add('active'); }
  });
  document.addEventListener('keyup', e => {
    const btn = document.querySelector(`.key[data-key="${e.key}"]`);
    if (btn) { btn.classList.remove('pressed'); clearTimeout(feedbackTimer); feedbackTimer = setTimeout(() => { feedback.textContent = 'ready'; feedback.classList.remove('active'); }, 400); }
  });
</script>
</body>
</html>
