<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Low-Poly Kart Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Bahnschrift', sans-serif; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; color: white; }
        
        /* The Joystick Zone */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 160px; height: 160px; z-index: 10; border: 2px solid rgba(0, 242, 255, 0.4); border-radius: 50%; }

        /* The UI Overlays from Image 1 */
        .ui-box { position: absolute; background: rgba(18, 18, 25, 0.9); border: 1px solid #333; }
        .ui-label { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: #888; }
        .ui-value { font-size: 2.5rem; font-weight: bold; line-height: 1; }
        .ui-sub-value { color: #f2f200; font-weight: bold; }

        #ui-lap { top: 20px; left: 20px; padding: 10px 20px; }
        #ui-time { top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 30px; text-align: center; }
        #ui-gear { bottom: 20px; left: 20px; padding: 10px 20px; color: #f2f200; font-size: 3rem; }
        #ui-tachometer { bottom: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 3px solid #666; background: radial-gradient(circle, #000 0%, #222 70%); }

        /* The floating text from Image 1 */
        #ui-prompt { position: absolute; top: 45%; left: 50%; transform: translateX(-50%); text-align: center; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-box" id="ui-lap">
        <div class="ui-label">LAP</div>
        <div class="ui-value" id="lap-val" style="color:red">0</div>
    </div>

    <div class="ui-box" id="ui-time">
        <div class="ui-label">TIME</div>
        <div class="ui-value" id="time-val">0.0S</div>
        <div class="ui-sub-value">—</div>
    </div>

    <div class="ui-box" id="ui-gear">
        <div class="ui-label">GEAR</div>
        <div class="ui-value">N</div>
    </div>

    <div id="ui-tachometer">
        </div>

    <div id="ui-prompt">
        <div style="font-size: 2rem;">CROSS THE LINE</div>
        <div style="font-size: 0.9rem; color:#888;">to begin your lap</div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24); // Dark blue from image
        
        // Changed Camera to Higher Third-Person
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const hemi = new THREE.HemisphereLight(0xffffff, 0x111111, 1.2);
        scene.add(hemi);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- THE WORLD FROM IMAGE 1 ---
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d3e2d }); // Dark green from image
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const innerRadius = 50;
        const outerRadius = 80;

        // The road surface
        const trackGeo = new THREE.RingGeometry(innerRadius, outerRadius, 64);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = Math.PI / 2;
        scene.add(track);

        // Grid lines (faded)
        const gridHelper = new THREE.GridHelper(200, 50, 0x444444, 0x222222);
        gridHelper.position.y = 0.05;
        scene.add(gridHelper);

        // --- ADDING PROPS (Trees, Lampposts, Walls) ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xaa2222 }); // Red blocks
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x152215 }); // Low-poly dark green
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

        for(let i=0; i<32; i++) {
            const angle = (i/32) * Math.PI * 2;
            
            // Lampposts
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 6), poleMat);
            pole.position.set(Math.cos(angle) * (outerRadius + 3), 3, Math.sin(angle) * (outerRadius + 3));
            scene.add(pole);
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xffffaa}));
            lamp.position.y = 3;
            pole.add(lamp);

            // Red/White Barrier Walls
            const blockMat = (i % 2 === 0) ? wallMat : new THREE.MeshStandardMaterial({color: 0xffffff});
            const block = new THREE.Mesh(new THREE.BoxGeometry(10, 1.5, 0.8), blockMat);
            block.position.set(Math.cos(angle) * (outerRadius + 0.5), 0.75, Math.sin(angle) * (outerRadius + 0.5));
            block.rotation.y = -angle;
            scene.add(block);
        }

        // Add some Trees
        for(let i=0; i<10; i++) {
            const angle = (i/10) * Math.PI * 2 + 1;
            const tree = new THREE.Mesh(new THREE.ConeGeometry(3, 10, 6), treeMat);
            tree.position.set(Math.cos(angle) * (outerRadius + 10), 5, Math.sin(angle) * (outerRadius + 10));
            scene.add(tree);
        }

        // --- THE KART MODEL ---
        const kartGroup = new THREE.Group();
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 2), new THREE.MeshStandardMaterial({color: 0xaa2222}));
        chassis.position.y = 0.3;
        kartGroup.add(chassis);
        
        const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x000000});
        
        // Front wheels
        const wf1 = new THREE.Mesh(wheelGeo, wheelMat); wf1.rotation.z = Math.PI/2; wf1.position.set(0.4, 0.3, 0.8); kartGroup.add(wf1);
        const wf2 = wf1.clone(); wf2.position.x = -0.4; kartGroup.add(wf2);
        // Rear wheels
        const wr1 = wf1.clone(); wr1.position.set(0.4, 0.3, -0.8); kartGroup.add(wr1);
        const wr2 = wr1.clone(); wr2.position.x = -0.4; kartGroup.add(wr2);

        // Simple Driver Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({color: 0xffaa88}));
        head.position.y = 0.8;
        kartGroup.add(head);

        kartGroup.position.set(65, 0, 0); // Start on the track
        scene.add(kartGroup);

        // --- PHYSICS & CONTROLS ---
        let inputX = 0, inputY = 0, velocity = 0;
        const friction = 0.96;
        const maxSpeed = 1.0;
        const manager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: { left: '80px', bottom: '80px' }, color: '#00f2ff' });
        manager.on('move', (evt, data) => { const dist = data.distance / 75; inputX = Math.cos(data.angle.radians) * dist; inputY = Math.sin(data.angle.radians) * dist; });
        manager.on('end', () => { inputX = 0; inputY = 0; });

        // Timer State
        let timer = 0;
        let timerActive = false;

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (Math.abs(inputY) > 0.1) {
                velocity += inputY * 0.02;
                if (!timerActive) timerActive = true;
            }
            velocity *= friction;
            velocity = Math.max(Math.min(velocity, maxSpeed), -maxSpeed * 0.5);

            if (Math.abs(velocity) > 0.1) {
                kartGroup.rotation.y -= inputX * 0.04;
                // Simple lean
                kartGroup.rotation.z = THREE.MathUtils.lerp(kartGroup.rotation.z, -inputX * 0.3, 0.1);
            } else {
                kartGroup.rotation.z = THREE.MathUtils.lerp(kartGroup.rotation.z, 0, 0.1);
            }

            kartGroup.translateZ(velocity);

            // Boundary Logic
            const dist = Math.sqrt(kartGroup.position.x**2 + kartGroup.position.z**2);
            if (dist < innerRadius + 1 || dist > outerRadius - 1) {
                velocity *= 0.8;
                const angle = Math.atan2(kartGroup.position.z, kartGroup.position.x);
                const clamp = Math.max(innerRadius + 1, Math.min(dist, outerRadius - 1));
                kartGroup.position.x = Math.cos(angle) * clamp;
                kartGroup.position.z = Math.sin(angle) * clamp;
            }

            // Update UI
            if (timerActive) {
                timer += (1/60); // approximate
                document.getElementById('time-val').innerText = timer.toFixed(1) + "S";
            }

            // --- CAMERA FOLLOW (Higher Third Person) ---
            const relativeCameraOffset = new THREE.Vector3(0, 4, -10); // Elevated
            const cameraOffset = relativeCameraOffset.applyMatrix4(kartGroup.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(kartGroup.position.x, kartGroup.position.y + 1, kartGroup.position.z); // Focus on kart center

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
