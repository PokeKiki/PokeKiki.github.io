<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kart Racer Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a24; font-family: sans-serif; touch-action: none; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Custom Visible Joystick */
        #joy-base { 
            position: absolute; bottom: 50px; left: 50px; 
            width: 120px; height: 120px; 
            background: rgba(0, 242, 255, 0.2); 
            border: 3px solid #00f2ff; border-radius: 50%; 
            z-index: 100; touch-action: none;
        }
        #joy-stick { 
            position: absolute; top: 35px; left: 35px; 
            width: 50px; height: 50px; 
            background: #00f2ff; border-radius: 50%; 
            box-shadow: 0 0 15px #00f2ff;
        }

        /* UI Overlays */
        .overlay { position: absolute; color: white; pointer-events: none; z-index: 10; font-weight: bold; }
        #speed { top: 20px; width: 100%; text-align: center; font-size: 2rem; color: #00f2ff; }
        #lap-box { top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="speed">0 KM/H</div>
    <div id="lap-box" class="overlay">LAP <span style="color:red">1</span></div>
    
    <div id="joy-base">
        <div id="joy-stick"></div>
    </div>

    <div id="container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ENGINE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a24);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        // --- 2. THE TRACK (Visible & Direct) ---
        // Green Grass
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x2d3e2d}));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // Grey Road
        const trackGeo = new THREE.RingGeometry(40, 70, 64);
        const trackMat = new THREE.MeshStandardMaterial({color: 0x333333, side: THREE.DoubleSide});
        const road = new THREE.Mesh(trackGeo, trackMat);
        road.rotation.x = -Math.PI / 2;
        road.position.y = 0.01;
        scene.add(road);

        // Red/White Walls
        for(let i=0; i<40; i++) {
            const angle = (i/40) * Math.PI * 2;
            const mat = (i % 2 === 0) ? 0xaa2222 : 0xffffff;
            const wall = new THREE.Mesh(new THREE.BoxGeometry(8, 1, 0.5), new THREE.MeshStandardMaterial({color: mat}));
            wall.position.set(Math.cos(angle)*70.5, 0.5, Math.sin(angle)*70.5);
            wall.rotation.y = -angle;
            scene.add(wall);
        }

        // --- 3. THE MOTORCYCLE/KART ---
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 1.5), new THREE.MeshStandardMaterial({color: 0xaa2222}));
        body.position.y = 0.4;
        player.add(body);
        
        const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2), new THREE.MeshStandardMaterial({color: 0x000000}));
        wheel.rotation.z = Math.PI/2;
        const w1 = wheel.clone(); w1.position.set(0.4, 0.3, 0.6); player.add(w1);
        const w2 = wheel.clone(); w2.position.set(-0.4, 0.3, 0.6); player.add(w2);
        const w3 = wheel.clone(); w3.position.set(0.4, 0.3, -0.6); player.add(w3);
        const w4 = wheel.clone(); w4.position.set(-0.4, 0.3, -0.6); player.add(w4);

        player.position.set(55, 0, 0);
        scene.add(player);

        // --- 4. CUSTOM JOYSTICK LOGIC ---
        const base = document.getElementById('joy-base');
        const stick = document.getElementById('joy-stick');
        let inputX = 0, inputY = 0;
        let isTouching = false;

        const handleMove = (e) => {
            if(!isTouching) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const max = 50;

            if(dist > max) {
                dx *= max/dist;
                dy *= max/dist;
            }

            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            inputX = dx / max; // Horizontal (Steering)
            inputY = -dy / max; // Vertical (Speed) - Negative because Y is down in browsers
        };

        base.addEventListener('touchstart', (e) => { isTouching = true; handleMove(e); });
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => {
            isTouching = false;
            stick.style.transform = `translate(0px, 0px)`;
            inputX = 0; inputY = 0;
        });

        // --- 5. PHYSICS LOOP ---
        let velocity = 0;
        function animate() {
            requestAnimationFrame(animate);

            // Forward movement
            if (Math.abs(inputY) > 0.1) {
                velocity += inputY * 0.02;
            }
            velocity *= 0.95; // Friction
            
            // Steering
            if (Math.abs(velocity) > 0.05) {
                player.rotation.y += inputX * -0.05;
                player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, inputX * -0.4, 0.1);
            }

            player.translateZ(velocity);

            // Boundary Logic (Keep on track)
            const d = Math.sqrt(player.position.x**2 + player.position.z**2);
            if (d < 41 || d > 69) {
                velocity *= 0.5;
                const angle = Math.atan2(player.position.z, player.position.x);
                const clamp = Math.max(41, Math.min(d, 69));
                player.position.x = Math.cos(angle) * clamp;
                player.position.z = Math.sin(angle) * clamp;
            }

            document.getElementById('speed').innerText = Math.round(Math.abs(velocity) * 180) + " KM/H";

            // Camera follow
            const camOffset = new THREE.Vector3(0, 4, -8).applyMatrix4(player.matrixWorld);
            camera.position.lerp(camOffset, 0.1);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
