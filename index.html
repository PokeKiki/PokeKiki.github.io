<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Security Office</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Clock Style */
        #clock {
            position: absolute; top: 20px; right: 30px;
            color: #fff; font-size: 2rem; font-weight: bold;
            text-shadow: 2px 2px #000; pointer-events: auto;
        }

        /* Camera Button */
        #cam-button {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff; color: #fff;
            text-align: center; line-height: 50px;
            cursor: pointer; pointer-events: auto;
            transition: 0.3s;
        }
        #cam-button:hover { background: rgba(255, 255, 255, 0.5); }

        /* Camera Overlay */
        #cam-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 50, 0, 0.2);
            display: none; border: 20px solid #222; box-sizing: border-box;
        }
        #static {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: url('https://media.giphy.com/media/oEI9uWU0WMrQmZpG60/giphy.gif');
            opacity: 0.1; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="clock">12 AM</div>
        <div id="cam-button" onclick="toggleCams()">FLIP MONITOR</div>
        <div id="cam-overlay">
            <div id="static"></div>
            <div style="color: #0f0; padding: 20px; font-size: 1.5rem;">CAM 01: MAIN HALL</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, office;
        let isCamOpen = false;
        let hour = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.PointLight(0xffffff, 1, 10);
            light.position.set(0, 2, 0);
            scene.add(light);
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);

            // Create Office Room
            const geometry = new THREE.BoxGeometry(10, 5, 10);
            const material = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, side: THREE.BackSide });
            office = new THREE.Mesh(geometry, material);
            scene.add(office);

            // Desk
            const deskGeo = new THREE.BoxGeometry(4, 1, 2);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const desk = new THREE.Mesh(deskGeo, deskMat);
            desk.position.set(0, -1.5, -3);
            scene.add(desk);

            // Monitor on desk
            const monGeo = new THREE.BoxGeometry(1.5, 1, 0.1);
            const monMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const monitor = new THREE.Mesh(monGeo, monMat);
            monitor.position.set(0, -0.5, -3.5);
            scene.add(monitor);

            camera.position.z = 1;
            
            // Mouse Movement (Pan look)
            document.addEventListener('mousemove', (e) => {
                if (!isCamOpen) {
                    const x = (e.clientX / window.innerWidth) - 0.5;
                    camera.rotation.y = -x * 0.5;
                }
            });

            animate();
            startClock();
        }

        function toggleCams() {
            isCamOpen = !isCamOpen;
            const overlay = document.getElementById('cam-overlay');
            overlay.style.display = isCamOpen ? 'block' : 'none';
        }

        function startClock() {
            setInterval(() => {
                hour++;
                if (hour > 6) hour = 6;
                document.getElementById('clock').innerText = (hour === 0 ? "12" : hour) + " AM";
                if (hour === 6) alert("6 AM: You Survived!");
            }, 45000); // 45 seconds per game hour
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
