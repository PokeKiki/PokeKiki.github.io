<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maze Runner Mobile Prototype</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* UI Overlay */
        #ui-layer { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 2px 2px 2px #000; }
        .hud-item { margin-bottom: 5px; font-size: 16px; font-weight: bold; }
        #timer { font-size: 24px; color: #ffcc00; }
        
        /* Mobile Controls */
        .joystick-container { position: absolute; bottom: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); touch-action: none; }
        #move-stick { left: 30px; width: 120px; height: 120px; }
        #look-stick { right: 30px; width: 120px; height: 120px; }
        .knob { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 40px; left: 40px; }
        
        /* Action Button */
        #action-btn { position: absolute; bottom: 170px; right: 45px; width: 90px; height: 90px; background: rgba(255, 0, 0, 0.4); border: 3px solid #ff3333; border-radius: 50%; color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; display: none; }
        
        /* Mini-Map Checkpoints */
        #minimap { position: absolute; top: 10px; right: 10px; width: 120px; height: 120px; background: rgba(0,0,0,0.7); border: 2px solid #555; border-radius: 8px; overflow: hidden; }
        #map-canvas { width: 100%; height: 100%; }

        /* Status Alerts */
        #alert-box { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); color: #ff3333; font-size: 30px; font-weight: bold; text-align: center; text-shadow: 3px 3px 5px #000; pointer-events: none; display: none; }
    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="timer" class="hud-item">DAY - 00:00</div>
        <div id="water-count" class="hud-item">Water Supply: 3/3</div>
        <div id="food-count" class="hud-item">Wheat Harvested: 0</div>
    </div>

    <div id="alert-box">⚠️ DOORS CLOSING RUN! ⚠️</div>

    <div id="minimap">
        <canvas id="map-canvas" width="120" height="120"></canvas>
    </div>

    <!-- Mobile Joysticks -->
    <div id="move-stick" class="joystick-container"><div class="knob" id="move-knob"></div></div>
    <div id="look-stick" class="joystick-container"><div class="knob" id="look-knob"></div></div>
    
    <!-- Action Interactor Context Button -->
    <div id="action-btn">INTERACT</div>

    <script>
        // --- GAME CONFIGURATION ---
        // Note: Real 5 mins = 300 seconds. For testing feedback, we set phases to 60 seconds (1 min). Change to 300 for full 5 mins!
        const PHASE_DURATION = 60; 
        let isDay = true;
        let gameTime = 0; // Tracks seconds
        let waterAvailable = 3;
        let wheatCount = 0;
        let exploredSectors = { center: true, north: false, south: false, east: false, west: false };

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111116, 0.015);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfffaed, 1.0);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // --- CREATING WORLD ---
        // The Glade Ground
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a5f0b, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // HUGE MASSIVE CAMP WALLS (The Glade boundaries)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444446, roughness: 0.7 });
        function createHugeWall(w, h, d, x, y, z) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // Surrounding Box Walls (100 units high!)
        createHugeWall(300, 100, 10, 0, 50, -150); // Back
        createHugeWall(10, 100, 300, -150, 50, 0); // Left
        createHugeWall(10, 100, 300, 150, 50, 0);  // Right
        // Front wall divided into two blocks to make space for the HUGE DOOR
        createHugeWall(130, 100, 10, -85, 50, 150);
        createHugeWall(130, 100, 10, 85, 50, 150);

        // --- THE GIANT SLIDING MAZE DOOR ---
        const doorGeo = new THREE.BoxGeometry(40, 100, 8);
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x222224, metalness: 0.5 });
        const leftDoor = new THREE.Mesh(doorGeo, doorMat);
        leftDoor.position.set(-20, 50, 150);
        scene.add(leftDoor);

        const rightDoor = new THREE.Mesh(doorGeo, doorMat);
        rightDoor.position.set(20, 50, 150);
        scene.add(rightDoor);

        // --- CAMP ASSETS (Farming & Sink) ---
        // Sink Structure
        const sinkGeo = new THREE.BoxGeometry(4, 4, 4);
        const sinkMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const sink = new THREE.Mesh(sinkGeo, sinkMat);
        sink.position.set(-20, 2, -20);
        scene.add(sink);

        // Crops / Wheat Field Visual
        const farmGeo = new THREE.BoxGeometry(15, 0.5, 15);
        const farmMat = new THREE.MeshStandardMaterial({ color: 0x997a3d });
        const farmZone = new THREE.Mesh(farmGeo, farmMat);
        farmZone.position.set(20, 0.2, -20);
        scene.add(farmZone);

        // --- DYNAMIC SHIFTING MAZE SECTORS ---
        const mazeContainer = new THREE.Group();
        scene.add(mazeContainer);

        function buildMazeWalls() {
            // Clear existing layout
            while(mazeContainer.children.length > 0){ 
                mazeContainer.remove(mazeContainer.children[0]); 
            }
            
            // Random variation generator based on midnight time step
            const pattern = Math.random() > 0.5 ? 1 : 2;
            
            // Generate rows of massive maze barriers in outer sector (z > 150)
            for(let i = -100; i <= 100; i += 50) {
                for(let j = 180; j <= 280; j += 40) {
                    if ((i + j) % (pattern === 1 ? 30 : 40) === 0) continue; 
                    const mWall = new THREE.Mesh(new THREE.BoxGeometry(30, 100, 10), wallMat);
                    mWall.position.set(i + (Math.sin(j)*5), 50, j);
                    mazeContainer.add(mWall);
                }
            }
        }
        buildMazeWalls(); // Initialize first layout

        // --- MONSTERS (Grievers) ---
        const monsters = [];
        const monsterMat = new THREE.MeshBasicMaterial({ color: 0xff0033 });
        function spawnMonster(x, z) {
            const mGeo = new THREE.SphereGeometry(3, 8, 8);
            const mMesh = new THREE.Mesh(mGeo, monsterMat);
            mMesh.position.set(x, 3, z);
            scene.add(mMesh);
            monsters.push(mMesh);
        }

        // --- PLAYER CONFIG ---
        const player = {
            position: new THREE.Vector3(0, 4, 0),
            rotation: new THREE.Vector3(),
            speed: 1.2,
            radius: 2
        };
        camera.position.copy(player.position);

        // --- GAME CONTROLS LOGIC (Mobile Friendly Joysticks) ---
        let moveInput = { x: 0, y: 0 };
        let lookInput = { x: 0, y: 0 };

        function setupJoystick(containerId, knobId, callback) {
            const stick = document.getElementById(containerId);
            const knob = document.getElementById(knobId);
            let active = false;
            let startX, startY;

            function handleStart(e) {
                active = true;
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX;
                startY = touch.clientY;
            }

            function handleMove(e) {
                if (!active) return;
                const touch = e.touches ? e.touches[0] : e;
                let dx = touch.clientX - startX;
                let dy = touch.clientY - startY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                
                const angle = Math.atan2(dy, dx);
                dx = Math.cos(angle) * dist;
                dy = Math.sin(angle) * dist;

                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                callback(dx / 40, dy / 40);
            }

            function handleEnd() {
                active = false;
                knob.style.transform = 'translate(0px, 0px)';
                callback(0, 0);
            }

            stick.addEventListener('touchstart', handleStart, {passive: true});
            window.addEventListener('touchmove', handleMove, {passive: false});
            window.addEventListener('touchend', handleEnd);
            
            // Desktop Mouse Backup
            stick.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
        }

        setupJoystick('move-stick', 'move-knob', (x, y) => { moveInput.x = x; moveInput.y = y; });
        setupJoystick('look-stick', 'look-knob', (x, y) => { lookInput.x = x; lookInput.y = y; });

        // Keyboard support for desktop testing
        window.addEventListener('keydown', (e) => {
            if(e.key === 'w' || e.key === 'ArrowUp') moveInput.y = -1;
            if(e.key === 's' || e.key === 'ArrowDown') moveInput.y = 1;
            if(e.key === 'a' || e.key === 'ArrowLeft') moveInput.x = -1;
            if(e.key === 'd' || e.key === 'ArrowRight') moveInput.x = 1;
        });
        window.addEventListener('keyup', (e) => {
            if(['w','s','ArrowUp','ArrowDown'].includes(e.key)) moveInput.y = 0;
            if(['a','d','ArrowLeft','ArrowRight'].includes(e.key)) moveInput.x = 0;
        });

        // --- INTERACTION BUTTON CONTEXT ---
        const actionBtn = document.getElementById('action-btn');
        actionBtn.addEventListener('click', () => {
            // Context Action Check
            const distToSink = player.position.distanceTo(sink.position);
            const distToFarm = player.position.distanceTo(farmZone.position);

            if (distToSink < 8 && waterAvailable > 0) {
                waterAvailable--;
                document.getElementById('water-count').innerText = `Water Supply: ${waterAvailable}/3`;
                alert("Drank refreshing well water!");
            } else if (distToFarm < 12) {
                wheatCount += 5;
                document.getElementById('food-count').innerText = `Wheat Harvested: ${wheatCount}`;
                alert("Harvested 5 Wheat crops!");
            }
        });

        // --- GAME LOOP CLOCK CALCULATION ---
        setInterval(() => {
            gameTime++;
            let currentPhaseTime = gameTime % (PHASE_DURATION * 2);

            if (currentPhaseTime < PHASE_DURATION) {
                // Day Mode
                isDay = true;
                const minutes = Math.floor(currentPhaseTime / 60).toString().padStart(2, '0');
                const seconds = (currentPhaseTime % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `DAY - ${minutes}:${seconds}`;
                document.getElementById('timer').style.color = '#ffcc00';
                
                // Keep alert screen hidden
                document.getElementById('alert-box').style.display = 'none';

                // Handle Day light values
                if (sunLight.intensity < 1) sunLight.intensity += 0.05;
                scene.fog.color.setHex(0xaaccff);

                // Monsters vanish in direct day sunlight
                while(monsters.length > 0) { scene.remove(monsters.pop()); }

            } else {
                // Night Mode
                isDay = false;
                let nightSecs = currentPhaseTime - PHASE_DURATION;
                const minutes = Math.floor(nightSecs / 60).toString().padStart(2, '0');
                const seconds = (nightSecs % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `NIGHT - ${minutes}:${seconds}`;
                document.getElementById('timer').style.color = '#ff3333';

                // Change environments to dark
                if (sunLight.intensity > 0) sunLight.intensity -= 0.05;
                scene.fog.color.setHex(0x05050a);

                // Midnight Layout Shifting Mechanics
                if (nightSecs === Math.floor(PHASE_DURATION / 2)) {
                    buildMazeWalls();
                    document.getElementById('alert-box').innerText = "⚠️ THE MAZE IS SHIFTING! ⚠️";
                    document.getElementById('alert-box').style.display = 'block';
                    setTimeout(() => { document.getElementById('alert-box').style.display = 'none'; }, 2000);
                }

                // Spawn hunters if player wanders out into the darkness
                if(monsters.length === 0 && player.position.z > 150) {
                    spawnMonster(player.position.x + 30, player.position.z + 40);
                    spawnMonster(player.position.x - 30, player.position.z + 50);
                }
            }

            // Warning right before gate closes shut
            if (isDay && currentPhaseTime > (PHASE_DURATION - 10)) {
                document.getElementById('alert-box').innerText = "⚠️ DOORS CLOSING RUN! ⚠️";
                document.getElementById('alert-box').style.display = 'block';
            }

            // Morning Resource Refills
            if (currentPhaseTime === 0) {
                waterAvailable = 3;
                document.getElementById('water-count').innerText = `Water Supply: ${waterAvailable}/3`;
            }

        }, 1000);

        // --- MAP CHECKPOINT DISCOVERY SYSTEM ---
        const mapCanvas = document.getElementById('map-canvas');
        const mapCtx = mapCanvas.getContext('2d');

        function updateMiniMap() {
            mapCtx.clearRect(0, 0, 120, 120);
            mapCtx.fillStyle = '#222';
            mapCtx.fillRect(0,0,120,120);

            // Track discoveries
            if (player.position.z > 160) exploredSectors.north = true;
            if (player.position.x > 50 && player.position.z > 160) exploredSectors.east = true;
            if (player.position.x < -50 && player.position.z > 160) exploredSectors.west = true;

            // Render discovered zones
            mapCtx.fillStyle = exploredSectors.center ? '#555' : '#111';
            mapCtx.fillRect(40, 60, 40, 40); // Base camp layout block

            mapCtx.fillStyle = exploredSectors.north ? '#777' : '#111';
            mapCtx.fillRect(40, 20, 40, 40); // Deep Corridor

            // Draw player position marker dot
            const pX = 60 + (player.position.x / 300) * 60;
            const pZ = 80 + ((player.position.z - 150) / 300) * 60;
            mapCtx.fillStyle = '#00ffcc';
            mapCtx.beginPath();
            mapCtx.arc(pX, pZ, 4, 0, Math.PI*2);
            mapCtx.fill();
        }

        // --- CORE ANIMATION & INTERACTION RENDER LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. Smoothly Animate Massive Sliding Metal Doors
            let targetDoorX = isDay ? 40 : 0; // 40 units apart on day, closed flat on night
            leftDoor.position.x = THREE.MathUtils.lerp(leftDoor.position.x, -targetDoorX/2, 0.05);
            rightDoor.position.x = THREE.MathUtils.lerp(rightDoor.position.x, targetDoorX/2, 0.05);

            // 2. Camera Rotations Controls Look Input
            player.rotation.y -= lookInput.x * 0.05;
            player.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, player.rotation.x - lookInput.y * 0.05));
            camera.rotation.set(0,0,0);
            camera.rotation.y = player.rotation.y;
            camera.rotation.x = player.rotation.x;

            // 3. Vector Movement calculation
            const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);
            const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);
            
            let moveVec = new THREE.Vector3();
            moveVec.addScaledVector(forward, -moveInput.y);
            moveVec.addScaledVector(side, moveInput.x);
            moveVec.normalize().multiplyScalar(player.speed);

            // Wall Collisions Box Bounds checks
            let nextX = player.position.x + moveVec.x;
            let nextZ = player.position.z + moveVec.z;

            // Simple boundary stops for Camp Outer Boundary walls
            if (Math.abs(nextX) < 145 && nextZ > -145) {
                // Door open check barrier logic
                if (nextZ >= 148 && nextZ <= 152) {
                    if (Math.abs(leftDoor.position.x - rightDoor.position.x) > 5) {
                        player.position.x = nextX;
                        player.position.z = nextZ;
                    }
                } else {
                    player.position.x = nextX;
                    player.position.z = nextZ;
                }
            }
            camera.position.copy(player.position);

            // 4. Update Monster AI Tracking
            monsters.forEach(m => {
                const dir = new THREE.Vector3().subVectors(player.position, m.position).normalize();
                m.position.addScaledVector(dir, 0.6); // Dangerous hunter follow speeds
                
                // Check fail state kill contact
                if(m.position.distanceTo(player.position) < 4) {
                    alert("A Griever caught you in the dark! Teleporting back safely to base camp.");
                    player.position.set(0,4,0);
                }
            });

            // 5. Context UI Engine prompts toggle
            const distToSink = player.position.distanceTo(sink.position);
            const distToFarm = player.position.distanceTo(farmZone.position);
            if (distToSink < 8 || distToFarm < 12) {
                actionBtn.style.display = 'flex';
            } else {
                actionBtn.style.display = 'none';
            }

            updateMiniMap();
            renderer.render(scene, camera);
        }

        // Screen Adjust Dynamic handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
