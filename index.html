<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes"/>
<title>Kyan Browser - Gaming Proxy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0e0e12;--surface:#13131a;--surface2:#1a1a24;
  --border:#25252f;--accent:#00e5b0;--accent2:#ff5e7d;
  --txt:#eeeef5;--muted:#4a4a62;--bar:#0a0a0e;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
body{display:flex;flex-direction:column}

/* ── TABS ── */
#tabstrip{
  display:flex;align-items:center;
  background:var(--bar);border-bottom:1px solid var(--border);
  padding:6px 10px 0;gap:4px;height:42px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
#tabstrip::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px 7px;border-radius:8px 8px 0 0;
  background:transparent;border:1px solid transparent;border-bottom:none;
  cursor:pointer;font-size:12px;color:var(--muted);
  white-space:nowrap;max-width:160px;min-width:80px;
  transition:background .12s,color .12s;flex-shrink:0;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
.tab:hover{background:var(--surface);color:var(--txt)}
.tab.active{background:var(--surface);color:var(--txt);border-color:var(--border)}
.tab img{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.tab-lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
.tab-x{font-size:11px;color:var(--muted);flex-shrink:0;padding:1px 4px;border-radius:4px;transition:background .1s,color .1s}
.tab-x:hover{background:#ff5e7d22;color:var(--accent2)}
#add-tab{
  width:28px;height:28px;border-radius:7px;border:none;
  background:transparent;color:var(--muted);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center;
  transition:background .12s,color .12s;
}
#add-tab:hover{background:var(--surface2);color:var(--txt)}

/* ── NAVBAR ── */
#navbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.nbtn{
  width:36px;height:36px;border-radius:8px;border:none;
  background:transparent;color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;flex-shrink:0;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
.nbtn:hover:not(:disabled){background:var(--surface2);color:var(--txt)}
.nbtn:disabled{opacity:.25;cursor:default}
.nbtn:active{background:var(--surface2);transform:scale(0.96);}
#urlbar{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:999px;padding:0 8px 0 14px;height:40px;
  transition:border-color .2s,box-shadow .2s;
}
#urlbar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px #00e5b015}
#lock{font-size:13px;flex-shrink:0}
#urlinput{
  flex:1;background:none;border:none;outline:none;
  font-size:14px;color:var(--txt);min-width:0;
}
#urlinput::placeholder{color:var(--muted)}
#gobtn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--accent);color:#000;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .12s,filter .12s;
}
#gobtn:hover{transform:scale(1.1);filter:brightness(1.1)}
#gobtn:active{transform:scale(0.96);}

/* ── PROGRESS ── */
#prog{
  height:2px;background:linear-gradient(90deg,var(--accent),#6ee7ff);
  width:0%;opacity:0;transition:width .25s,opacity .2s;flex-shrink:0;
}
#prog.on{opacity:1}

/* ── VIEWPORT ── */
#vpwrap{flex:1;position:relative;overflow:hidden;-webkit-overflow-scrolling:touch}
.frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
.frame.active{display:block}

/* ── NEW TAB PAGE ── */
.ntp{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:26px;background:var(--bg);overflow-y:auto;padding:40px 20px;
  -webkit-overflow-scrolling:touch;
}
.ntp.active{display:flex}
.ntp-logo{
  font-size:48px;font-weight:800;letter-spacing:-2px;
  background:linear-gradient(120deg,var(--accent),#6ee7ff,var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;
}
.ntp-sub{font-size:13px;color:var(--muted);margin-top:-16px}
.ntp-search{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:999px;padding:0 8px 0 20px;
  width:min(540px,95vw);height:50px;
  transition:border-color .2s,box-shadow .2s;
}
.ntp-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px #00e5b012}
.ntp-search input{flex:1;background:none;border:none;outline:none;font-size:16px;color:var(--txt);min-width:0}
.ntp-search input::placeholder{color:var(--muted)}
.ntp-search button{
  background:var(--accent);border:none;cursor:pointer;
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#000;font-size:18px;font-weight:700;flex-shrink:0;
  transition:transform .12s,filter .12s;
}
.ntp-search button:hover{transform:scale(1.08);filter:brightness(1.1)}
.ntp-search button:active{transform:scale(0.96);}
.ql{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;width:min(640px,95vw)}
.ql-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:16px 10px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;text-decoration:none;color:var(--txt);
  transition:border-color .15s,transform .15s,background .15s;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
.ql-item:hover{border-color:var(--accent);background:#0f211e;transform:translateY(-3px)}
.ql-item:active{background:#0f211e;transform:translateY(-1px);}
.ql-item .ico{font-size:26px;line-height:1}
.ql-item .lbl{font-size:11.5px;color:var(--muted);text-align:center}

/* ── GAMING SECTION ── */
.gaming-section{
  width:min(640px,95vw);
  margin-top:20px;
}
.gaming-title{
  font-size:16px;
  font-weight:600;
  color:var(--accent);
  margin-bottom:12px;
  text-align:left;
}
.gaming-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:8px;
}
.gaming-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  padding:12px 8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:all .15s;
}
.gaming-item:hover{
  border-color:var(--accent2);
  background:#2a1a22;
  transform:translateY(-2px);
}
.gaming-item .ico{font-size:22px;}
.gaming-item .lbl{font-size:10px;color:var(--muted);text-align:center;}

/* ── BLOCKED PAGE ── */
.blocked{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:var(--bg);text-align:center;padding:30px;
  -webkit-overflow-scrolling:touch;
}
.blocked.active{display:flex}
.blocked .b-icon{font-size:52px}
.blocked h2{font-size:20px;font-weight:700}
.blocked p{font-size:13px;color:var(--muted);max-width:380px;line-height:1.7}
.proxy-options{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:10px 0;
}
.proxy-btn{
  background:var(--surface2);
  border:1px solid var(--border);
  cursor:pointer;
  padding:12px 20px;
  border-radius:999px;
  color:var(--txt);
  font-size:14px;
  font-weight:600;
  transition:all .12s;
  min-width:120px;
}
.proxy-btn:hover{
  border-color:var(--accent);
  background:#1a2a24;
  transform:translateY(-2px);
}
.proxy-btn:active{transform:translateY(0);}
.proxy-btn.main{
  background:var(--accent);
  color:#000;
  border-color:var(--accent);
}
.proxy-btn.main:hover{
  filter:brightness(1.1);
}
.blocked .note{
  font-size:11px;
  color:var(--muted);
  max-width:360px;
  line-height:1.6;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  margin-top:10px;
}
</style>
</head>
<body>

<div id="tabstrip">
  <div id="add-tab" title="New Tab">+</div>
</div>

<div id="navbar">
  <button class="nbtn" id="btn-back">←</button>
  <button class="nbtn" id="btn-fwd">→</button>
  <button class="nbtn" id="btn-reload">↻</button>
  <button class="nbtn" id="btn-home">⌂</button>
  <div id="urlbar">
    <span id="lock">🔍</span>
    <input id="urlinput" placeholder="Search or enter address..." autocomplete="off" spellcheck="false"/>
    <button id="gobtn">→</button>
  </div>
</div>

<div id="prog"></div>
<div id="vpwrap"></div>

<script>
// ─── GAMING PROXY SYSTEM ───────────────────────────────────────────────
// Multiple proxy options for gaming sites like poxel.io

// Primary proxies (best for gaming)
const GAMING_PROXIES = [
  {
    name: '🎮 Game Proxy',
    url: (target) => `https://corsproxy.io/?${encodeURIComponent(target)}`,
    worksWith: ['poxel.io', 'game', 'io games']
  },
  {
    name: '⚡ All Origins',
    url: (target) => `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`,
    worksWith: ['poxel.io', 'general']
  },
  {
    name: '🔧 CORS Anywhere',
    url: (target) => `https://cors-anywhere.herokuapp.com/${target}`,
    worksWith: ['poxel.io', 'games']
  },
  {
    name: '🌐 Proxy Server',
    url: (target) => `https://thingproxy.freeboard.io/fetch/${target}`,
    worksWith: ['poxel.io', 'general']
  },
  {
    name: '🎯 Archive Today',
    url: (target) => `https://archive.is/${target}`,
    worksWith: ['poxel.io', 'games']
  }
];

// Dedicated gaming sites that need proxy
const GAMING_SITES = [
  { name: 'Poxel.io', url: 'https://poxel.io', ico: '🎮', category: 'io Games' },
  { name: 'Slither.io', url: 'http://slither.io', ico: '🐍', category: 'io Games' },
  { name: 'Agar.io', url: 'http://agar.io', ico: '🟢', category: 'io Games' },
  { name: 'Paper.io', url: 'http://paper.io', ico: '📄', category: 'io Games' },
  { name: 'Wings.io', url: 'http://wings.io', ico: '✈️', category: 'io Games' },
  { name: 'Diep.io', url: 'http://diep.io', ico: '🔫', category: 'io Games' },
  { name: 'Crazy Games', url: 'https://www.crazygames.com', ico: '🎲', category: 'Game Sites' },
  { name: 'Kizi', url: 'https://kizi.com', ico: '🎯', category: 'Game Sites' },
  { name: 'Poki', url: 'https://poki.com', ico: '⭐', category: 'Game Sites' }
];

const KNOWN_BLOCKED = [
  'google.com','youtube.com','facebook.com','instagram.com',
  'x.com','twitter.com','linkedin.com','amazon.com','reddit.com',
  'spotify.com','bbc.com','tiktok.com','netflix.com','twitch.tv',
  'discord.com','whatsapp.com','telegram.org','github.com',
  'poxel.io', 'slither.io', 'agar.io', 'paper.io', 'wings.io', 'diep.io'
];

// Proxy selection
function getProxyUrl(url, proxyIndex = 0) {
  // Try different proxies based on index
  const proxy = GAMING_PROXIES[proxyIndex % GAMING_PROXIES.length];
  return proxy.url(url);
}

function isKnownBlocked(url) {
  try {
    const h = new URL(url).hostname.replace('www.','');
    return KNOWN_BLOCKED.some(d => h === d || h.endsWith('.'+d));
  } catch { return false; }
}

// ─── STATE ──────────────────────────────────────────────────────────────────
let tabs = [], activeId = null, counter = 0;

// ─── UTILS ──────────────────────────────────────────────────────────────────
function uid(){ return 't'+(++counter); }
function norm(raw) {
  raw = raw.trim(); if (!raw) return null;
  if (/^https?:\/\//i.test(raw)) return raw;
  if (/^[\w.-]+\.\w{2,}/.test(raw) && !raw.includes(' ')) return 'https://'+raw;
  return 'https://www.google.com/search?q='+encodeURIComponent(raw);
}
function hostOf(url){ try{ return new URL(url).hostname.replace('www.','') } catch{ return url } }
function faviconOf(url){ try{ return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32` } catch{ return '' } }

// ─── PROGRESS ───────────────────────────────────────────────────────────────
const prog = document.getElementById('prog');
let pt = null;
function startProg(){ prog.style.width='0%'; prog.classList.add('on'); let w=0; clearInterval(pt); pt=setInterval(()=>{w+=Math.random()*14;if(w>88)w=88;prog.style.width=w+'%'},180); }
function endProg(){ clearInterval(pt); prog.style.width='100%'; setTimeout(()=>{prog.classList.remove('on');prog.style.width='0%'},350); }

// ─── DOM REFS ────────────────────────────────────────────────────────────────
const strip  = document.getElementById('tabstrip');
const addBtn = document.getElementById('add-tab');
const vp     = document.getElementById('vpwrap');

// ─── TAB STRIP ──────────────────────────────────────────────────────────────
function renderTabs() {
  document.querySelectorAll('.tab').forEach(e=>e.remove());
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id===activeId?' active':'');
    el.innerHTML = `<img src="${t.url?faviconOf(t.url):''}" onerror="this.style.display='none'" style="${t.url?'':'display:none'}"/><span class="tab-lbl">${t.title||'New Tab'}</span><span class="tab-x" data-close="${t.id}">✕</span>`;
    el.addEventListener('click', e => { if(e.target.dataset.close) return; activate(t.id); });
    strip.insertBefore(el, addBtn);
  });
  strip.querySelectorAll('[data-close]').forEach(x => x.addEventListener('click', e => { e.stopPropagation(); closeTab(x.dataset.close); }));
}

// ─── CREATE TAB ─────────────────────────────────────────────────────────────
function newTab(url=null) {
  const id = uid();
  tabs.push({id, url:null, title:'New Tab', blocked:false, usingProxy:false, proxyIndex:0});

  // NTP
  const ntp = document.createElement('div');
  ntp.className = 'ntp'; ntp.id = 'ntp-'+id;
  ntp.innerHTML = buildNTP(id);
  vp.appendChild(ntp);

  // iframe
  const fr = document.createElement('iframe');
  fr.className = 'frame'; fr.id = 'fr-'+id;
  fr.allow = 'fullscreen; autoplay; gamepad; clipboard-write';
  fr.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-top-navigation-by-user-activation allow-downloads allow-modals');
  fr.addEventListener('load', () => { onFrameLoad(id); });
  fr.addEventListener('error', () => { showBlocked(id); });
  vp.appendChild(fr);

  // blocked notice
  const bl = document.createElement('div');
  bl.className = 'blocked'; bl.id = 'bl-'+id;
  bl.innerHTML = buildBlockedPage(id);
  vp.appendChild(bl);

  activate(id);
  if (url) navigate(id, url);
  return id;
}

function buildBlockedPage(id) {
  return `
    <div class="b-icon">🎮</div>
    <h2>Site Blocked</h2>
    <p>This site can't be embedded directly. Try one of our gaming proxies:</p>
    <div class="proxy-options">
      ${GAMING_PROXIES.map((proxy, idx) => `
        <button class="proxy-btn ${idx === 0 ? 'main' : ''}" data-blid="${id}" data-proxy="${idx}">
          ${proxy.name}
        </button>
      `).join('')}
    </div>
    <div class="note">
      💡 Tip: For gaming sites like Poxel.io, try the Game Proxy first.<br>
      If it doesn't work, try another proxy option.
    </div>`;
}

function onFrameLoad(id) {
  endProg();
  const t = tabs.find(x=>x.id===id); if(!t) return;
  t.loading = false;
  
  // Try to get the actual URL from the iframe
  try {
    const fr = document.getElementById('fr-'+id);
    const href = fr.contentWindow?.location?.href;
    if (href && href !== 'about:blank') {
      t.url = href;
    }
  } catch(e) {
    // Cross-origin - can't access, but that's fine
  }
  
  renderTabs();
  updateUrlBar();
}

// ─── ACTIVATE ───────────────────────────────────────────────────────────────
function activate(id) {
  activeId = id;
  vp.querySelectorAll('.ntp,.frame,.blocked').forEach(e=>e.classList.remove('active'));
  const t = tabs.find(x=>x.id===id); if(!t) return;
  if (t.blocked)     document.getElementById('bl-'+id)?.classList.add('active');
  else if (!t.url)   document.getElementById('ntp-'+id)?.classList.add('active');
  else               document.getElementById('fr-'+id)?.classList.add('active');
  renderTabs();
  updateUrlBar();
}

// ─── CLOSE TAB ──────────────────────────────────────────────────────────────
function closeTab(id) {
  if (tabs.length === 1) { 
    // Clear all and create new tab
    tabs.forEach(t => {
      ['ntp-','fr-','bl-'].forEach(p => document.getElementById(p+t.id)?.remove());
    });
    tabs=[]; counter=0; newTab(); 
    return; 
  }
  const idx = tabs.findIndex(t=>t.id===id);
  tabs.splice(idx,1);
  ['ntp-','fr-','bl-'].forEach(p => document.getElementById(p+id)?.remove());
  if (activeId===id) activate(tabs[Math.min(idx,tabs.length-1)].id);
  else renderTabs();
}

// ─── NAVIGATE ───────────────────────────────────────────────────────────────
function navigate(id, rawUrl, forceProxy=false, proxyIndex=0) {
  const t = tabs.find(x=>x.id===id); if(!t) return;

  const url = rawUrl;
  t.url = url; t.blocked = false; t.loading = true;
  t.title = hostOf(url);

  const useProxy = forceProxy || isKnownBlocked(url);
  t.usingProxy = useProxy;
  t.proxyIndex = proxyIndex;

  let loadUrl = url;
  if (useProxy) {
    loadUrl = getProxyUrl(url, proxyIndex);
    console.log(`Using proxy ${proxyIndex}: ${GAMING_PROXIES[proxyIndex].name} -> ${loadUrl}`);
  }

  vp.querySelectorAll('.ntp,.frame,.blocked').forEach(e=>e.classList.remove('active'));
  const fr = document.getElementById('fr-'+id);
  fr.classList.add('active');
  startProg();

  // Clear old src first to force reload
  fr.src = 'about:blank';
  
  // Use setTimeout to ensure clean reload
  setTimeout(() => { 
    fr.src = loadUrl; 
  }, 50);

  renderTabs(); 
  updateUrlBar();
  
  // Set a timeout to detect if loading fails
  setTimeout(() => {
    const currentT = tabs.find(x=>x.id===id);
    if (currentT && currentT.loading) {
      // Still loading - might be stuck
      showBlocked(id);
    }
  }, 10000);
}

function showBlocked(id) {
  endProg();
  const t = tabs.find(x=>x.id===id); if(!t||!t.loading) return;
  t.blocked = true; t.loading = false;
  
  // Update blocked page with current URL
  const bl = document.getElementById('bl-'+id);
  if (bl) {
    bl.innerHTML = buildBlockedPage(id);
  }
  
  vp.querySelectorAll('.ntp,.frame,.blocked').forEach(e=>e.classList.remove('active'));
  document.getElementById('bl-'+id)?.classList.add('active');
  renderTabs(); 
  updateUrlBar();
}

// ─── PROXY BUTTON ───────────────────────────────────────────────────────────
vp.addEventListener('click', e => {
  // proxy retry
  const blBtn = e.target.closest('[data-blid]');
  if (blBtn) {
    e.preventDefault();
    const id = blBtn.dataset.blid;
    const proxyIdx = blBtn.dataset.proxy ? parseInt(blBtn.dataset.proxy) : 0;
    const t = tabs.find(x=>x.id===id);
    if (t?.url) {
      console.log(`Retrying with proxy ${proxyIdx}`);
      navigate(id, t.url, true, proxyIdx);
    }
    return;
  }
  
  // quick link
  const ql = e.target.closest('.ql-item');
  if (ql) { 
    e.preventDefault(); 
    const url=ql.dataset.url; 
    if(url&&activeId) {
      // For gaming sites, use proxy automatically
      if (url.includes('io') || url.includes('game')) {
        navigate(activeId, url, true, 0);
      } else {
        navigate(activeId, url); 
      }
    }
    return; 
  }
  
  // gaming item
  const gameItem = e.target.closest('.gaming-item');
  if (gameItem) {
    e.preventDefault();
    const url = gameItem.dataset.url;
    if (url && activeId) {
      // Always use proxy for gaming sites
      navigate(activeId, url, true, 0);
    }
    return;
  }
  
  // ntp search button
  const ntpBtn = e.target.closest('button[data-ntpid]');
  if (ntpBtn) { 
    const inp=ntpBtn.closest('.ntp-search')?.querySelector('input'); 
    if(inp){
      const u=norm(inp.value);
      if(u) {
        // Check if it's a gaming site
        if (u.includes('io') || u.includes('game') || u.includes('play')) {
          navigate(ntpBtn.dataset.ntpid, u, true, 0);
        } else {
          navigate(ntpBtn.dataset.ntpid, u);
        }
      }
    } 
    return; 
  }
});

vp.addEventListener('keydown', e => {
  if (e.key==='Enter' && e.target.tagName==='INPUT' && e.target.dataset.ntpid) {
    const u=norm(e.target.value); 
    if(u) {
      // Check if it's a gaming site
      if (u.includes('io') || u.includes('game') || u.includes('play')) {
        navigate(e.target.dataset.ntpid, u, true, 0);
      } else {
        navigate(e.target.dataset.ntpid, u);
      }
    }
  }
});

// ─── URL BAR ────────────────────────────────────────────────────────────────
const urlinput = document.getElementById('urlinput');
const lockEl   = document.getElementById('lock');
function updateUrlBar() {
  const t = tabs.find(x=>x.id===activeId);
  const url = t?.url||'';
  urlinput.value = url;
  if (url.startsWith('https://')){lockEl.textContent='🔒';lockEl.style.color='var(--accent)'}
  else if (url.startsWith('http://')){lockEl.textContent='⚠️';lockEl.style.color='var(--accent2)'}
  else {lockEl.textContent='🔍';lockEl.style.color='var(--muted)'}
}
function goToUrl(raw) { 
  const u=norm(raw); 
  if(u&&activeId) {
    // Check if it's a gaming site
    if (u.includes('io') || u.includes('game') || u.includes('play')) {
      navigate(activeId, u, true, 0);
    } else {
      navigate(activeId, u);
    }
  } 
}
document.getElementById('gobtn').onclick = () => goToUrl(urlinput.value);
urlinput.addEventListener('keydown', e=>{ if(e.key==='Enter') goToUrl(e.target.value); });
urlinput.addEventListener('focus', ()=>urlinput.select());

// ─── NAV BUTTONS ────────────────────────────────────────────────────────────
document.getElementById('btn-back').onclick   = ()=>{ 
  try{
    document.getElementById('fr-'+activeId)?.contentWindow.history.back();
  }catch(e){}
};

document.getElementById('btn-fwd').onclick    = ()=>{ 
  try{
    document.getElementById('fr-'+activeId)?.contentWindow.history.forward();
  }catch(e){}
};

document.getElementById('btn-reload').onclick = ()=>{ 
  const t=tabs.find(x=>x.id===activeId); 
  if(t?.url) navigate(activeId, t.url, t.usingProxy, t.proxyIndex || 0); 
};

document.getElementById('btn-home').onclick   = ()=>{
  const t=tabs.find(x=>x.id===activeId); if(!t)return;
  t.url=null;t.blocked=false;
  vp.querySelectorAll('.ntp,.frame,.blocked').forEach(e=>e.classList.remove('active'));
  document.getElementById('ntp-'+activeId)?.classList.add('active');
  updateUrlBar();
};

addBtn.onclick = ()=>newTab();

// ─── NTP ────────────────────────────────────────────────────────────────────
const SITES=[
  {ico:'🎮',lbl:'Poxel.io',  url:'https://poxel.io'},
  {ico:'🔍',lbl:'Google',    url:'https://www.google.com'},
  {ico:'▶️',lbl:'YouTube',   url:'https://www.youtube.com'},
  {ico:'🤖',lbl:'Reddit',    url:'https://www.reddit.com'},
  {ico:'📖',lbl:'Wikipedia', url:'https://www.wikipedia.org'},
  {ico:'🐙',lbl:'GitHub',    url:'https://github.com'},
  {ico:'🎵',lbl:'Spotify',   url:'https://open.spotify.com'},
];

function buildNTP(id) {
  const h=new Date().getHours();
  const tod=h<12?'morning':h<18?'afternoon':'evening';
  
  // Regular quick links
  const ql=SITES.map(s=>`<a class="ql-item" href="#" data-url="${s.url}"><div class="ico">${s.ico}</div><div class="lbl">${s.lbl}</div></a>`).join('');
  
  // Gaming section
  const gamingByCategory = {};
  GAMING_SITES.forEach(game => {
    if (!gamingByCategory[game.category]) gamingByCategory[game.category] = [];
    gamingByCategory[game.category].push(game);
  });
  
  const gamingHtml = Object.keys(gamingByCategory).map(category => `
    <div class="gaming-section">
      <div class="gaming-title">${category}</div>
      <div class="gaming-grid">
        ${gamingByCategory[category].map(game => `
          <div class="gaming-item" data-url="${game.url}">
            <div class="ico">${game.ico}</div>
            <div class="lbl">${game.name}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  
  return `
    <div class="ntp-logo">Kyan</div>
    <div class="ntp-sub">Good ${tod} — ready to play?</div>
    <div class="ntp-search">
      <input type="text" placeholder="Search or enter address..." autocomplete="off" spellcheck="false" data-ntpid="${id}"/>
      <button data-ntpid="${id}">→</button>
    </div>
    ${gamingHtml}
    <div class="ql">${ql}</div>`;
}

// ─── iPad specific fixes ────────────────────────────────────────────────────
function fixForIPad() {
  // Detect iPad
  const isIPad = navigator.userAgent.includes('iPad') || 
                 (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) ||
                 navigator.userAgent.includes('Mac') && navigator.maxTouchPoints > 1;
  
  if (isIPad) {
    // Add iPad-specific class
    document.body.classList.add('ipad');
    
    // Fix for iPad keyboard
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('touchstart', (e) => {
        // Small delay to ensure keyboard appears
        setTimeout(() => {
          input.focus();
        }, 100);
      }, { passive: true });
    });
    
    // Prevent zoom on double tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });
  }
}

// Handle touch events properly
document.addEventListener('touchstart', (e) => {
  // Prevent default only on buttons to avoid zoom
  if (e.target.closest('button') || e.target.closest('.tab') || e.target.closest('.ql-item') || e.target.closest('.gaming-item')) {
    e.preventDefault();
  }
}, { passive: false });

// ─── INIT ────────────────────────────────────────────────────────────────────
// Fix encoding issues by ensuring all text is properly handled
document.charset = 'UTF-8';
fixForIPad();

// Create first tab with gaming focus
const firstTabId = newTab();
// Optionally load poxel.io automatically with proxy
setTimeout(() => {
  const t = tabs.find(x => x.id === firstTabId);
  if (t && !t.url) {
    navigate(firstTabId, 'https://poxel.io', true, 0);
  }
}, 500);
</script>
